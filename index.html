// 購買確認
// ════════════════════════════════════════
var confirmQty = 1;
var confirmData = null;

function showBuyConfirm(id, d, isEquip){
  confirmQty = 1;
  confirmData = {id:id, d:d, isEquip:isEquip, mode:'buy'};
  var canStack = !isEquip;

  var afterGil = PLAYER.gil - d.buy * confirmQty;

  var sheet = document.createElement('div');
  sheet.className = 'confirm-overlay';
  sheet.id = 'confirm-overlay';

  sheet.innerHTML =
    '<div class="confirm-sheet">' +
      '<div class="confirm-title">確認購買</div>' +
      '<div class="confirm-item">' +
        '<div class="confirm-ico">'+d.ico+'</div>' +
        '<div class="confirm-info">' +
          '<div class="confirm-name">'+d.name+'</div>' +
          '<div class="confirm-price" id="confirm-price">'+d.buy+' Gil × 1</div>' +
          '<div class="confirm-after" id="confirm-after">購買後：'+afterGil+' Gil</div>' +
        '</div>' +
      '</div>' +
      (canStack ?
        '<div class="qty-row">' +
          '<button class="qty-btn" id="qty-minus">－</button>' +
          '<div class="qty-num" id="qty-num">1</div>' +
          '<button class="qty-btn" id="qty-plus">＋</button>' +
        '</div>' : '') +
      '<div class="confirm-btns">' +
        '<button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">取消</button>' +
        '<button class="confirm-btn confirm-btn-ok" id="confirm-ok">購買</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(sheet);
  document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
  document.getElementById('confirm-ok').addEventListener('click', executeBuy);
  sheet.addEventListener('click', function(e){ if(e.target===sheet) closeConfirm(); });
  if(canStack){
    document.getElementById('qty-minus').addEventListener('click', function(){ adjustQty(-1, d); });
    document.getElementById('qty-plus').addEventListener('click', function(){ adjustQty(1, d); });
  }
}

function adjustQty(delta, d){
  var max = Math.floor(PLAYER.gil / d.buy);
  confirmQty = Math.max(1, Math.min(max, confirmQty + delta));
  document.getElementById('qty-num').textContent = confirmQty;
  document.getElementById('confirm-price').textContent = d.buy + ' Gil × ' + confirmQty + ' = ' + (d.buy*confirmQty) + ' Gil';
  document.getElementById('confirm-after').textContent = '購買後：' + (PLAYER.gil - d.buy*confirmQty) + ' Gil';
}

function executeBuy(){
  var cd = confirmData;
  var total = cd.d.buy * confirmQty;
  if(PLAYER.gil < total){ showToast('Gil 不足！', 'error'); closeConfirm(); return; }
  PLAYER.gil -= total;
  if(cd.isEquip){
    for(var bi=0; bi<confirmQty; bi++){ grantEquipToChar(activeCharKey(), makeGearItem(cd.id, 'white', false)); }
  } else {
    addToBag(cd.id, confirmQty, cd.isEquip);
  }
  closeConfirm();
  updateGilDisplay();
  showToast('購入 ' + cd.d.name + (confirmQty>1?' × '+confirmQty:'') + ' ！', 'success');
  renderShopList();
  if(typeof saveGame==='function') saveGame();
}

// ── 販賣確認 ──
function showSellConfirm(id, d, isEquip, bagIdx){
  confirmData = {id:id, d:d, isEquip:isEquip, bagIdx:bagIdx, mode:'sell'};
  var sheet = document.createElement('div');
  sheet.className = 'confirm-overlay';
  sheet.id = 'confirm-overlay';
  sheet.innerHTML =
    '<div class="confirm-sheet">' +
      '<div class="confirm-title">確認販賣</div>' +
      '<div class="confirm-item">' +
        '<div class="confirm-ico">'+d.ico+'</div>' +
        '<div class="confirm-info">' +
          '<div class="confirm-name">'+d.name+'</div>' +
          '<div class="confirm-price" style="color:#70f0a8">+'+d.sell+' Gil</div>' +
          '<div class="confirm-after">販賣後：'+(PLAYER.gil+d.sell)+' Gil</div>' +
        '</div>' +
      '</div>' +
      '<div class="confirm-btns">' +
        '<button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">取消</button>' +
        '<button class="confirm-btn confirm-btn-sell" id="confirm-ok">賣出</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(sheet);
  var cc = document.getElementById('confirm-cancel');
  var co2 = document.getElementById('confirm-ok');
  if(cc) cc.onclick = closeConfirm;
  if(co2) co2.onclick = executeSell;
  sheet.onclick = function(e){ if(e.target===sheet) closeConfirm(); };
}

function executeSell(){
  var cd = confirmData;
  PLAYER.gil += cd.d.sell;
  removeFromBag(cd.id, 1);
  closeConfirm();
  updateGilDisplay();
  showToast('賣出 '+cd.d.name+' + '+cd.d.sell+' Gil', 'success');
  renderShopList();
  if(typeof saveGame==='function') saveGame();
}

function closeConfirm(){
  var el = document.getElementById('confirm-overlay');
  if(el) el.remove();
  confirmData = null;
  confirmQty = 1;
}

// ════════════════════════════════════════
// 背包操作
// ════════════════════════════════════════
function addToBag(id, qty, isEquip){
  var slot = PLAYER.bag.find(function(s){ return s.id===id && !!s.isEquip===!!isEquip; });
  if(slot){ slot.qty += qty; }
  else { PLAYER.bag.push({id:id, qty:qty, isEquip:!!isEquip}); }
}
function removeFromBag(id, qty){
  var idx = PLAYER.bag.findIndex(function(s){ return s.id===id; });
  if(idx<0) return;
  PLAYER.bag[idx].qty -= qty;
  if(PLAYER.bag[idx].qty <= 0) PLAYER.bag.splice(idx, 1);
}
function getBagCount(){
  return PLAYER.bag.reduce(function(a,s){ return a+s.qty; }, 0);
}

function updateGilDisplay(){
  document.getElementById('gil-display').textContent = PLAYER.gil;
}
function updateFooter(){
  document.getElementById('bag-count').textContent = getBagCount();
}

// ── Toast 通知 ──
function showToast(msg, type){
  var toast = document.createElement('div');
  toast.className = 'toast ' + (type||'');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function(){ if(toast.parentNode) toast.remove(); }, 2100);
}

var TILE_SIZE = 28;

function buildMap(){
  var world = document.getElementById('map-world');
  world.innerHTML = '';
  world.style.width = (MAP_W * TILE_SIZE) + 'px';
  world.style.height = (MAP_H * TILE_SIZE) + 'px';

  // Tile 層
  for(var r=0;r<MAP_H;r++){
    var row = document.createElement('div');
    row.className = 'tile-row';
    for(var c=0;c<MAP_W;c++){
      var t = MAP_SHALLOI[r][c];
      var div = document.createElement('div');
      div.className = 'tile ' + (TILE_CLASS[t]||'wall');
      div.id = 'tile_'+c+'_'+r;
      if(TILE_EMO[t]) div.textContent = TILE_EMO[t];

      // 點擊移動
      (function(cx,cy,passable){
        if(passable){
          div.addEventListener('click', function(){ onTileClick(cx,cy); });
        }
      })(c,r,TILE_PASSABLE[t]);

      row.appendChild(div);
    }
    world.appendChild(row);
  }

  // 物件層（NPC / 道具）
  OBJECTS.forEach(function(obj,idx){
    var sprite = document.createElement('div');
    sprite.className = 'npc-sprite';
    sprite.id = 'npc_'+idx;
    sprite.style.left = (obj.x * TILE_SIZE) + 'px';
    sprite.style.top  = (obj.y * TILE_SIZE) + 'px';
    if(obj.type === 'building'){
      sprite.className = 'npc-sprite building-sprite';
      sprite.innerHTML = '<div class="bld-ico">'+obj.ico+'</div><div class="bld-name">'+obj.name+'</div>';
    } else {
      sprite.innerHTML = obj.ico + '<span class="npc-name">' + obj.name + '</span>';
    }
    sprite.addEventListener('click', function(){ onNpcClick(idx); });
    world.appendChild(sprite);
  });

  // 玩家 sprite
  var player = document.createElement('div');
  player.className = 'player-sprite';
  player.id = 'player';
  player.textContent = '🧙';
  world.appendChild(player);

  updatePlayerPos();
  centerViewport();
}

function updatePlayerPos(){
  var player = document.getElementById('player');
  if(!player) return;
  player.style.left = (GS.player.x * TILE_SIZE) + 'px';
  player.style.top  = (GS.player.y * TILE_SIZE) + 'px';
  updateMinimap();
}

function centerViewport(){
  var vp = document.getElementById('viewport');
  var world = document.getElementById('map-world');
  var vpW = vp.offsetWidth, vpH = vp.offsetHeight;
  var px = GS.player.x * TILE_SIZE + TILE_SIZE/2;
  var py = GS.player.y * TILE_SIZE + TILE_SIZE/2;
  var tx = Math.max(0, Math.min(px - vpW/2, MAP_W*TILE_SIZE - vpW));
  var ty = Math.max(0, Math.min(py - vpH/2, MAP_H*TILE_SIZE - vpH));
  world.style.transform = 'translate(' + (-tx) + 'px,' + (-ty) + 'px)';
}

function updateMinimap(){
  var mm = document.getElementById('minimap');

  var px = (GS.player.x / MAP_W) * 80;

function findPath(sx,sy,ex,ey){
  if(!TILE_PASSABLE[MAP_SHALLOI[ey]?MAP_SHALLOI[ey][ex]:0]) return null;

  var visited = {};
  var queue = [{x:sx,y:sy,path:[]}];
  visited[sx+','+sy] = true;
  var dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];

  while(queue.length > 0){
    var cur = queue.shift();
    if(cur.x===ex && cur.y===ey) return cur.path.concat([{x:ex,y:ey}]);

    for(var i=0;i<dirs.length;i++){
      var nx=cur.x+dirs[i].dx, ny=cur.y+dirs[i].dy;
      var key=nx+','+ny;
      if(visited[key]) continue;
      if(ny<0||ny>=MAP_H||nx<0||nx>=MAP_W) continue;
      if(!TILE_PASSABLE[MAP_SHALLOI[ny][nx]]) continue;
      // 不穿越 NPC 位置（但門可走）
      visited[key]=true;
      queue.push({x:nx,y:ny,path:cur.path.concat([{x:cur.x,y:cur.y}])});
    }
  }
  return null;
}

// 移動系統
// ════════════════════════════════════════
function onTileClick(x,y){
  if(GS.dialog) return; // 對話中不能移動
  if(GS.moving) stopMoving();

  var path = findPath(GS.player.x, GS.player.y, x, y);
  if(!path || path.length===0) return;

  // 顯示路徑高亮
  clearPathHighlight();
  highlightedPath = path;
  path.forEach(function(p){
    var tile = document.getElementById('tile_'+p.x+'_'+p.y);
    if(tile) tile.classList.add('path-highlight');
  });

  GS.movePath = path.slice(1); // 排除起點
  GS.moving = true;
  moveStep();
}

function moveStep(){
  if(!GS.moving || GS.movePath.length===0){
    GS.moving = false;
    clearPathHighlight();
    checkInteractable();
    return;
  }

  var next = GS.movePath.shift();
  GS.player.x = next.x;
  GS.player.y = next.y;
  GS.steps++;
  updatePlayerPos();

  // 步行動畫點
  var dot = document.createElement('div');
  dot.className = 'step-dot';
  dot.style.left = (next.x * TILE_SIZE + 11) + 'px';
  dot.style.top  = (next.y * TILE_SIZE + 11) + 'px';
  document.getElementById('map-world').appendChild(dot);
  setTimeout(function(){ if(dot.parentNode) dot.remove(); }, 600);

  centerViewport();

  // 隨機遭遇
  if(checkEncounter()) return;

  // 門觸發
  var tile = MAP_SHALLOI[GS.player.y][GS.player.x];
  if(tile === TILE_DOOR){
    GS.moving = false;
    clearPathHighlight();
    return;
  }

  setTimeout(moveStep, 140);
}

function stopMoving(){
  GS.moving = false;
  GS.movePath = [];
  clearPathHighlight();
}

function clearPathHighlight(){
  highlightedPath.forEach(function(p){
    var tile = document.getElementById('tile_'+p.x+'_'+p.y);
    if(tile) tile.classList.remove('path-highlight');
  });
  highlightedPath = [];
}

// ── 近距離可互動檢查 ──
function checkInteractable(){
  var px=GS.player.x, py=GS.player.y;
  OBJECTS.forEach(function(obj,idx){
    var dx=Math.abs(obj.x-px), dy=Math.abs(obj.y-py);
    if(dx+dy <= 1){
      showInteractHint(obj.x,obj.y,obj.name);
    }
  });
}

function showInteractHint(x,y,name){
  var old = document.getElementById('interact-hint');
  if(old) old.remove();
  var hint = document.createElement('div');
  hint.className = 'interact-hint';
  hint.id = 'interact-hint';
  hint.textContent = '▲ ' + name;
  hint.style.left = (x * TILE_SIZE - 4) + 'px';
  hint.style.top  = (y * TILE_SIZE - 20) + 'px';
  document.getElementById('map-world').appendChild(hint);
  setTimeout(function(){ if(hint.parentNode) hint.remove(); }, 2000);
}

// NPC 互動
// ════════════════════════════════════════
function onNpcClick(idx){
  if(GS.dialog) return;
  var obj = OBJECTS[idx];
  var px=GS.player.x, py=GS.player.y;
  var dx=Math.abs(obj.x-px), dy=Math.abs(obj.y-py);

  if(dx+dy > 2){
    // 先走過去
    var path = findPath(px,py,obj.x,obj.y-1);
    if(!path) path = findPath(px,py,obj.x-1,obj.y);
    if(!path) path = findPath(px,py,obj.x+1,obj.y);
    if(path){
      GS.movePath = path.slice(1);
      GS.moving = true;
      // 走到旁邊後觸發對話
      var origMoveStep = GS.movePath.length;
      var checkArrival = setInterval(function(){
        if(!GS.moving){
          clearInterval(checkArrival);
          startDialog(obj, null);
        }
      }, 100);
      moveStep();
      return;
    }
  }
  startDialog(obj, null);
}


// 城鎮對話橋接到 DLG 系統
function startDialog(obj, branchKey){
  if(GS.dialogCooldown) return;
  stopMoving();
  var rawLines = branchKey && obj.dialogBranch && obj.dialogBranch[branchKey]
    ? obj.dialogBranch[branchKey] : (obj.dialog || []);
  if(!rawLines || rawLines.length === 0) return;

  // 轉換格式：城鎮 dialog 格式 → DLG 格式
  var lines = rawLines.map(function(l){
    return {
      speaker: l.speaker || obj.name,
      ico:     l.ico || obj.ico,
      acc:     l.acc || obj.acc || 'var(--text2)',
      text:    l.text || '',
      choices: l.choices || null,
      triggerBattle: l.triggerBattle || null,
    };
  });

  GS.dialog = true;
  openDialog(lines, function(){
    GS.dialog = false;
  });
}

// 隨機遭遇
// ════════════════════════════════════════
function checkEncounter(){
  // 檢查是否裝備了隱匿戒指
  if(typeof PLAYER !== 'undefined' && PLAYER.bag){
    var hasNoEnc = PLAYER.bag.some(function(s){
      return s.id === 'no_encounter_ring' && s.isEquip;
    });
    if(hasNoEnc) return false;
  }
  var zone = getZone(GS.player.x, GS.player.y);
  var zoneData = ZONES[zone];
  if(!zoneData || !zoneData.encounter) return false;

  GS.encounterCounter++;
  if(GS.encounterCounter < GS.encounterThreshold) return false;
  GS.encounterCounter = 0;
  GS.encounterThreshold = 6 + Math.floor(Math.random()*6);

  if(Math.random() < 0.55){
    stopMoving();
    setTimeout(function(){
      var enemies = zone==='square'
        ? ['shadow_soldier','dark_mage']
        : ['shadow_soldier','shadow_soldier'];
      triggerBattle(enemies);
    }, 200);
    return true;
  }
  return false;
}

function triggerBattle(enemyKeys){
  // 遭遇閃白
  var flash = document.createElement('div');
  flash.className = 'encounter-flash';
  document.body.appendChild(flash);

  setTimeout(function(){
    if(flash.parentNode) flash.remove();
    // 如果主介面有 openBattle，呼叫它；否則跳到獨立戰鬥頁
    if(typeof openBattle === 'function'){
      openBattle(enemyKeys, ZONES[GS.zone] ? ZONES[GS.zone].name : '夏洛伊王都');
    } else {
      // 獨立測試模式
      alert('戰鬥觸發！敵人：' + enemyKeys.join(', ') + '\n（整合版才有完整戰鬥）');
    }
  }, 400);
}

// 進店前顯示掌櫃 greeting 對話（含頭像），對話結束後再開買賣畫面
function enterShop(shopKey){
  var shop = (typeof SHOP_STOCK !== 'undefined') ? SHOP_STOCK[shopKey] : null;
  if(!shop || !shop.npc){ openShop(shopKey); return; }
  var npc = shop.npc;
  var lines = (shop.greeting && shop.greeting.length ? shop.greeting : [{text:'歡迎光臨。'}]).map(function(g){
    return {speaker:npc.name, face:npc.face, ico:npc.ico, acc:npc.acc, text:g.text};
  });
  // 酒館：問候後提供「進入酒館／接任務」選單（莉卡加入後 likaJoined 開放）
  var canQuest = !!shop.rest && (typeof STORY!=='undefined' && STORY.likaJoined) && (typeof openQuestBoard==='function');
  if(canQuest && lines.length){
    lines[lines.length-1].choices = [
      {text:'🍶 進入酒館', next:'tavern_shop'},
      {text:'📋 接任務', next:'tavern_quest'}
    ];
    openDialog(lines, null, {
      tavern_shop_end: function(){ openShop(shopKey); },
      tavern_quest_end: function(){ openQuestBoard(); }
    });
    return;
  }
  openDialog(lines, function(){ openShop(shopKey); });
}

function openTown(townKey){
  var ov = document.getElementById('town-overlay');
  if(!ov) return;
  if(typeof BGM !== 'undefined'){ BGM.play('town'); }

  ov.setAttribute('style',
    'display:block;position:fixed;top:0;left:0;width:100%;height:100%;' +
    'z-index:600;background:#0a0c14;'
  );

  var hud = ov.querySelector('.hud');
  if(hud){
    hud.setAttribute('style',
      'position:absolute;top:0;left:0;right:0;z-index:2;' +
      'background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.95));' +
      'border-bottom:1px solid #28366a;padding:8px 14px;' +
      'display:flex;align-items:center;justify-content:space-between;'
    );
  }

  // scene = HUD 下方整塊區域（深色背景）
  var scene = ov.querySelector('#town-scene');
  if(!scene){
    scene = document.createElement('div');
    scene.id = 'town-scene';
    ov.appendChild(scene);
  }
  scene.setAttribute('style',
    'position:absolute;top:50px;left:0;right:0;bottom:0;overflow:hidden;' +
    'background:#0a0c14;' +
    'transition:opacity 0.35s ease;'
  );

  // frame = 16:9 圖片容器，hotspots 對齊它
  var frame = document.getElementById('town-frame');
  if(!frame){
    frame = document.createElement('div');
    frame.id = 'town-frame';
    scene.appendChild(frame);
  }
  // frame 維持 16:9，寬度撐滿 scene，垂直置中（少量左右裁切，下方少量黑邊）
  frame.setAttribute('style',
    'position:absolute;top:0;left:0;width:100%;height:100%;' +
    "background-image:url('https://wiml0718-commits.github.io/genba-chronicles-assets/IMG_0347.png');" +
    'background-size:cover;background-position:center top;background-repeat:no-repeat;'
  );

  // hotspots 放進 frame
  var hotspots = document.getElementById('town-hotspots');
  if(!hotspots){
    hotspots = document.createElement('div');
    hotspots.id = 'town-hotspots';
  }
  if(hotspots.parentNode !== frame) frame.appendChild(hotspots);
  hotspots.setAttribute('style', 'position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;');

  GS.dialog = false;
  buildSceneHotspots();
  showZoneNotice('夏洛伊王都');
  var closeBtn = document.getElementById('town-close-btn');
  if(closeBtn){ closeBtn.onclick = null; closeBtn.addEventListener('click', closeTown); }
}

function buildSceneHotspots(){
  var container = document.getElementById('town-hotspots');
  if(!container) return;
  container.innerHTML = '';
  for(var i=0;i<SHALLOI_SPOTS.length;i++){
    (function(spot){
      var btn = document.createElement('div');
      btn.id = spot.id;
      btn.setAttribute('style',
        'position:absolute;' +
        'left:' + spot.left + ';' +
        'top:' + spot.top + ';' +
        'width:' + spot.width + ';' +
        'height:' + spot.height + ';' +
        'cursor:pointer;' +
        'border:2px solid rgba(200,168,74,0);' +
        'border-radius:8px;' +
        'transition:border-color 0.2s;' +
        'display:flex;align-items:flex-end;justify-content:center;' +
        'padding-bottom:4px;'
      );
      var label = document.createElement('div');
      label.setAttribute('style',
        'background:rgba(0,0,0,0.65);' +
        'color:#c8a84a;' +
        'font-size:11px;' +
        'padding:2px 6px;' +
        'border-radius:4px;' +
        'pointer-events:none;' +
        'opacity:0;' +
        'transition:opacity 0.2s;' +
        'white-space:nowrap;'
      );
      label.textContent = spot.ico + ' ' + spot.label;
      btn.appendChild(label);
      btn.addEventListener('touchstart', function(){
        btn.style.borderColor = 'rgba(200,168,74,0.8)';
        label.style.opacity = '1';
      }, {passive:true});
      btn.addEventListener('touchend', function(){
        btn.style.borderColor = 'rgba(200,168,74,0)';
        label.style.opacity = '0';
        spot.action();
      }, {passive:true});
      btn.addEventListener('click', function(){
        spot.action();
      });
      container.appendChild(btn);
    })(SHALLOI_SPOTS[i]);
  }
}

  var old = document.getElementById('title-load-menu');
  if(old && old.parentNode) old.parentNode.removeChild(old);

  var entries = [];
  try { if(localStorage.getItem(SAVE_KEY)) entries.push({key:SAVE_KEY, label:'自動存檔'}); } catch(e){}
  if(typeof SAVE_SLOTS !== 'undefined'){
    for(var i=0;i<SAVE_SLOTS.length;i++){
      if(slotMeta(SAVE_SLOTS[i])) entries.push({key:SAVE_SLOTS[i], label:'SLOT '+(i+1)});
    }
  }

  var ov = document.createElement('div');
  ov.id = 'title-load-menu';
  ov.setAttribute('style',
    'position:fixed;top:0;left:0;right:0;bottom:0;z-index:5100;background:rgba(4,5,10,0.96);' +
    'display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;' +
    'opacity:0;transition:opacity 0.3s ease;');

  var box = document.createElement('div');
  box.setAttribute('style','width:100%;max-width:360px;padding:30px 28px;');

  var title = document.createElement('div');
  title.textContent = '讀取存檔';
  title.setAttribute('style',"font-family:'Cinzel','Noto Serif TC',serif;font-size:16px;letter-spacing:5px;text-indent:5px;color:#c8a84a;text-align:center;margin-bottom:22px;");
  box.appendChild(title);

  function p2(n){ return ('0'+n).slice(-2); }
  function makeEntry(e){
    var m = slotMeta(e.key);
    var card = document.createElement('div');
    card.setAttribute('style','border:1px solid rgba(200,168,74,0.4);border-radius:8px;padding:14px 16px;margin-bottom:12px;background:rgba(200,168,74,0.05);cursor:pointer;transition:border-color .2s,background .2s;');
    var dt = new Date(m.ts);
    var dstr = dt.getFullYear()+'/'+p2(dt.getMonth()+1)+'/'+p2(dt.getDate())+' '+p2(dt.getHours())+':'+p2(dt.getMinutes());
    card.innerHTML =
      '<div style="font-family:Cinzel,serif;font-size:12px;letter-spacing:2px;color:#e7d9a8;margin-bottom:6px">'+e.label+'</div>'+
      '<div style="font-size:12px;color:#cfd6ee">暗影 Lv.'+m.lv+'　'+m.gil+' Gil</div>'+
      '<div style="font-size:9px;color:rgba(180,190,225,0.6);margin-top:3px">'+dstr+'</div>';
    card.addEventListener('touchstart', function(){ card.style.borderColor='rgba(200,168,74,1)'; card.style.background='rgba(200,168,74,0.14)'; }, {passive:true});
    card.addEventListener('touchend', function(){ card.style.borderColor='rgba(200,168,74,0.4)'; card.style.background='rgba(200,168,74,0.05)'; }, {passive:true});
    card.addEventListener('click', function(){ doLoadFrom(e.key); });
    return card;
  }

  if(entries.length === 0){
    var none = document.createElement('div');
    none.textContent = '— 沒有可用的存檔 —';
    none.setAttribute('style','text-align:center;color:rgba(180,190,225,0.6);font-size:12px;margin-bottom:18px;');
    box.appendChild(none);
  } else {
    for(var k=0;k<entries.length;k++){ box.appendChild(makeEntry(entries[k])); }
  }

  var back = document.createElement('div');
  back.textContent = '返回';
  back.setAttribute('style','text-align:center;cursor:pointer;padding:12px 0;margin-top:8px;border-radius:6px;border:1px solid rgba(112,128,176,0.5);color:#ccd4f0;font-family:"Noto Serif TC",serif;font-size:13px;letter-spacing:3px;text-indent:3px;');
  back.addEventListener('click', function(){ var t=document.getElementById('title-load-menu'); if(t&&t.parentNode) t.parentNode.removeChild(t); });
  box.appendChild(back);

  ov.appendChild(box);
  document.body.appendChild(ov);
  setTimeout(function(){ ov.style.opacity = '1'; }, 20);
}

      '@media (prefers-reduced-motion: reduce){#title-screen *{animation:none !important}}';

  var ov = document.createElement('div');

    'display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;' +
    'transition:opacity 0.35s ease;');

    'position:absolute;top:34%;left:50%;width:360px;height:360px;margin-left:-180px;margin-top:-180px;' +
    'border-radius:50%;pointer-events:none;' +
    'background:radial-gradient(circle, rgba(200,168,74,0.30) 0%, rgba(200,168,74,0) 70%);' +
    'animation:gcBreath 6s ease-in-out infinite;');

  var box = document.createElement('div');

  box.appendChild(ruleTop);

  var title = document.createElement('div');
  title.textContent = '幻刃紀';
  title.setAttribute('style',
    "font-family:'Noto Serif TC',serif;font-weight:700;color:#e7d9a8;" +
    'font-size:60px;letter-spacing:16px;text-indent:16px;line-height:1.1;' +

  box.appendChild(title);

  var sub = document.createElement('div');
  sub.textContent = 'GENBA CHRONICLES';
  sub.setAttribute('style',
    "font-family:'Cinzel',serif;color:#c8a84a;font-size:13px;letter-spacing:6px;text-indent:6px;" +
    'margin-top:16px;opacity:0.92;');
  box.appendChild(sub);

  var ruleBot = document.createElement('div');
  ruleBot.setAttribute('style','width:64px;height:1px;background:rgba(200,168,74,0.55);margin-top:20px;margin-bottom:44px;');

  var btns = document.createElement('div');
  btns.setAttribute('style','width:100%;display:flex;flex-direction:column;align-items:stretch;');
  box.appendChild(btns);

  function makeBtn(label, primary){
    var b = document.createElement('div');
    var idle =

      'padding:15px 0;margin-bottom:14px;border-radius:6px;letter-spacing:5px;text-indent:5px;font-size:16px;' +
      'color:#e7d9a8;background:rgba(200,168,74,0.06);' +

      (primary ? 'box-shadow:0 0 16px rgba(200,168,74,0.22);' : '') +

    b.addEventListener('touchstart', function(){
      b.style.background = 'rgba(200,168,74,0.16)';
      b.style.borderColor = 'rgba(200,168,74,1)';
    }, {passive:true});
    b.addEventListener('touchend', function(){
      b.style.background = 'rgba(200,168,74,0.06)';
      b.style.borderColor = primary ? 'rgba(200,168,74,0.85)' : 'rgba(200,168,74,0.4)';

  function hideTitle(){

  function startContinue(){

  function startNew(){

    if(typeof render === 'function'){ try { render(); } catch(e){} }

    setTimeout(function(){ if(typeof playPrologue === 'function'){ try { playPrologue(); } catch(e){} } }, 420);

  ov.appendChild(foot);

  document.body.appendChild(ov);
}

// ════════════════════════════════════════
// 序章電影：黑月之變
// ════════════════════════════════════════
// 劇本：可逐拍編輯。kind 可為 narr(旁白) / title(標題卡) / line(角色台詞) / goal(任務卡)
var PROLOGUE_BEATS = [
  {kind:'narr', text:'幻刃洲——劍與咒並行的大陸。每一道刃，都封著一縷魔。'},
  {kind:'narr', text:'而魔之源頭，是夜空那輪銀月。那一夜，銀月無聲地，染上了黑。'},
  {kind:'title', moon:true, eyebrow:'序章', title:'黑月之變'},
  {kind:'narr', text:'十年前，一個黑暗組織策動政變。夏洛伊王國，在一夜之間傾覆。'},

  {kind:'narr', text:'王城在烈焰中崩塌。年幼的公主琳恩，眼睜睜看著雙親倒下。'},
  {kind:'line', speaker:'？？？', acc:'#9b7fd4', text:'父親！母親——！'},
  {kind:'narr', text:'王國最強劍士傑特，拼死將她帶出重圍。公主琳恩死在那一夜；活下來的，是一柄名為「暗影」的刃。'},

  {kind:'narr', text:'同一夜，城牆的另一端。一名傭兵團的新人，剛「完成」了一項任務。'},
  {kind:'line', speaker:'傭兵團新人', acc:'#7090c8', text:'防衛系統，已癱瘓……可是，為什麼偏偏是今晚？'},
  {kind:'narr', text:'多年以後他才懂——那道被他親手癱瘓的防線，奪走了王妃的命。他成了自己最痛恨的兇器。'},

  {kind:'narr', text:'貴族宅邸裡，一名女子，為「前來相助的夫家」打開了大門。'},
  {kind:'line', speaker:'貴族女子', acc:'#d46050', text:'快進來——你們是來保護國王的，對嗎……？'},
  {kind:'narr', text:'她以為自己在救人。直到家人與國王在眼前倒下——是她的信任，殺死了她所愛的一切。'},

  {kind:'narr', text:'戰火燒到了北境的邊陲小村。一個孩子，失去了她的父母。'},
  {kind:'line', speaker:'？？？', acc:'#d47040', text:'別走……別丟下我一個……'},
  {kind:'narr', text:'亂世裡，有人將她從灰燼中拉起、收留了她。那雙手背後的真相，要很久以後才會揭開。'},

  {kind:'narr', text:'四道傷口，在同一夜被刻下。而他們，尚未相遇。'},
  {kind:'title', eyebrow:'十年後', title:'夏洛伊・王都'},
  {kind:'narr', text:'王國已亡，夏洛伊落入當年前朝大臣之手。一封來歷不明的密信，將暗影引回這座她最不願踏足的城。'},
  {kind:'line', speaker:'暗影', face:'anei', acc:'#9b7fd4', text:'……夏洛伊。我回來了——為了那一夜的真相。'},
  {kind:'line', speaker:'暗影', face:'anei', acc:'#9b7fd4', text:'師父說，先找一個人。緋色酒館的「莉卡莉絲」。'},
  {kind:'narr', text:'線索的起點，是王都一隅、燭火搖曳的緋色酒館。'},
  {kind:'goal', text:'前往夏洛伊王都・緋色酒館，尋找線索'},
];

function playCutscene(beats, onEnd){
  if(!beats || !beats.length){ if(onEnd){ try { onEnd(); } catch(e){} } return; }

  if(!document.getElementById('gc-cut-style')){
    var cs = document.createElement('style');
    cs.id = 'gc-cut-style';
    cs.textContent =
      '@keyframes gcMoon{0%,100%{box-shadow:0 0 30px 6px rgba(155,127,212,0.30),0 0 60px 18px rgba(120,90,180,0.16)}50%{box-shadow:0 0 42px 10px rgba(155,127,212,0.46),0 0 84px 26px rgba(120,90,180,0.26)}}' +
      '@keyframes gcHint{0%,100%{opacity:0.25}50%{opacity:0.7}}' +
      '@media (prefers-reduced-motion: reduce){#cutscene-overlay *{animation:none !important;transition:none !important}}';
    document.head.appendChild(cs);
  }

  var old = document.getElementById('cutscene-overlay');
  if(old && old.parentNode) old.parentNode.removeChild(old);

  var ov = document.createElement('div');
  ov.id = 'cutscene-overlay';
  ov.setAttribute('style',
    'position:fixed;top:0;left:0;right:0;bottom:0;z-index:5000;background:#04050a;' +
    'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
    'overflow:hidden;opacity:0;transition:opacity 0.6s ease;');

  var vig = document.createElement('div');
  vig.setAttribute('style',
    'position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;' +
    'background:radial-gradient(120% 80% at 50% 45%, rgba(20,22,34,0) 0%, rgba(4,5,10,0.88) 100%);');
  ov.appendChild(vig);

  var content = document.createElement('div');
  content.id = 'cutscene-content';
  content.setAttribute('style',
    'position:relative;z-index:2;width:100%;max-width:380px;padding:0 34px;' +
    'display:flex;flex-direction:column;align-items:center;text-align:center;' +
    'opacity:0;transition:opacity 0.45s ease;');
  ov.appendChild(content);

  var hint = document.createElement('div');
  hint.textContent = '輕觸繼續 ▸';
  hint.setAttribute('style',
    'position:absolute;bottom:32px;left:0;right:0;text-align:center;z-index:3;pointer-events:none;' +
    "font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:3px;text-indent:3px;color:rgba(180,190,225,0.6);" +
    'animation:gcHint 2.4s ease-in-out infinite;');
  ov.appendChild(hint);

  var skip = document.createElement('div');
  skip.textContent = '跳過';
  skip.setAttribute('style',
    'position:absolute;top:18px;right:18px;z-index:4;cursor:pointer;padding:6px 14px;border-radius:5px;' +
    'border:1px solid rgba(200,168,74,0.4);color:rgba(200,168,74,0.85);background:rgba(7,9,15,0.5);' +
    "font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:2px;text-indent:2px;");
  ov.appendChild(skip);

  document.body.appendChild(ov);
  setTimeout(function(){ ov.style.opacity = '1'; }, 20);

  var idx = -1;
  var lock = false;

  function renderBeat(b){
    content.innerHTML = '';
    if(b.kind === 'title'){
      if(b.moon){
        var moon = document.createElement('div');
        moon.setAttribute('style',
          'width:84px;height:84px;border-radius:50%;background:#06070c;margin-bottom:28px;' +
          'border:1px solid rgba(155,127,212,0.55);animation:gcMoon 4s ease-in-out infinite;');
        content.appendChild(moon);
      }
      if(b.eyebrow){
        var eb = document.createElement('div');
        eb.textContent = b.eyebrow;
        eb.setAttribute('style',
          "font-family:'Cinzel','Noto Serif TC',serif;font-size:13px;letter-spacing:8px;text-indent:8px;" +
          'color:#c8a84a;margin-bottom:16px;opacity:0.9;');
        content.appendChild(eb);
      }
      var tl = document.createElement('div');
      tl.textContent = b.title || '';
      tl.setAttribute('style',
        "font-family:'Noto Serif TC',serif;font-weight:700;font-size:38px;letter-spacing:8px;text-indent:8px;" +
        'color:#e7d9a8;line-height:1.3;text-shadow:0 0 22px rgba(200,168,74,0.4);');
      content.appendChild(tl);
    } else if(b.kind === 'goal'){
      var card = document.createElement('div');
      card.setAttribute('style',
        'border:1px solid rgba(200,168,74,0.6);border-radius:8px;padding:22px 24px;' +
        'background:rgba(200,168,74,0.06);box-shadow:0 0 24px rgba(200,168,74,0.12);');
      var ge = document.createElement('div');
      ge.textContent = '序章目標';
      ge.setAttribute('style',
        "font-family:'Cinzel','Noto Serif TC',serif;font-size:12px;letter-spacing:5px;text-indent:5px;color:#c8a84a;margin-bottom:12px;");
      card.appendChild(ge);
      var gt = document.createElement('div');
      gt.textContent = b.text || '';
      gt.setAttribute('style',
        "font-family:'Noto Serif TC',serif;font-size:16px;line-height:1.7;color:#e7d9a8;letter-spacing:1px;");
      card.appendChild(gt);
      content.appendChild(card);
    } else if(b.kind === 'line'){
      var faceMap = {licarise:'licarise_face.jpg',anei:'anei_face.jpg',fira:'fira_face.jpg',elweis:'elweis_face.jpg'};
      var ff = faceMap[b.face || ''] || '';
      var ac = b.acc || '#c8a84a';
      if(ff){
        var img = document.createElement('img');
        img.setAttribute('src','https://wiml0718-commits.github.io/genba-chronicles-assets/' + ff);
        img.setAttribute('style',
          'width:78px;height:78px;object-fit:cover;object-position:top;border-radius:10px;margin-bottom:14px;' +
          'border:2px solid ' + ac + ';box-shadow:0 0 18px rgba(0,0,0,0.6);');
        content.appendChild(img);
      }
      var nm = document.createElement('div');
      nm.textContent = b.speaker || '';
      nm.setAttribute('style',
        "font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;letter-spacing:2px;color:" + ac + ";margin-bottom:10px;");
      content.appendChild(nm);
      var tx = document.createElement('div');
      tx.textContent = b.text || '';
      tx.setAttribute('style',
        "font-family:'Noto Serif TC',serif;font-size:17px;line-height:1.9;color:#e4e8f6;letter-spacing:1px;");
      content.appendChild(tx);
    } else {
      var nr = document.createElement('div');
      nr.textContent = b.text || '';
      nr.setAttribute('style',
        "font-family:'Noto Serif TC',serif;font-size:17px;line-height:2.0;letter-spacing:1.5px;color:#cfd6ee;");
      content.appendChild(nr);
    }
  }

  function showBeat(i){
    idx = i;
    renderBeat(beats[i]);
    content.style.opacity = '1';
    hint.style.display = (i >= beats.length - 1) ? 'none' : 'block';
  }

  function next(){
    if(lock) return;
    if(idx >= beats.length - 1){ finish(); return; }
    lock = true;
    content.style.opacity = '0';
    setTimeout(function(){ showBeat(idx + 1); lock = false; }, 300);
  }

  function finish(){
    lock = true;
    var o = document.getElementById('cutscene-overlay');
    if(o){ o.style.opacity = '0'; }
    setTimeout(function(){
      if(o && o.parentNode) o.parentNode.removeChild(o);
      if(onEnd){ try { onEnd(); } catch(e){} }
    }, 640);
  }

  ov.addEventListener('click', function(e){
    if(e.target === skip) return;
    next();
  });
  skip.addEventListener('click', function(e){
    if(e.stopPropagation) e.stopPropagation();
    finish();
  });

  setTimeout(function(){ showBeat(0); }, 380);
}

function playPrologue(){
  playCutscene(PROLOGUE_BEATS, function(){
    if(typeof switchPage === 'function'){ try { switchPage(2); } catch(e){} }
  });
}

// ── 啟動：顯示標題畫面 ──
(function(){
  try { showTitleScreen(); } catch(e){}
})();
</script>
