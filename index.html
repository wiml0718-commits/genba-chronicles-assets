// ATB 引擎
// ════════════════════════════════════════
function startAtb(){
  if(BS.atbInterval) clearInterval(BS.atbInterval);
  BS.atbInterval = setInterval(atbTick, 80);
}
function pauseAtb(){ BS.atbRunning = false; }
function resumeAtb(){ BS.atbRunning = true; }

function atbTick(){
  if(!BS || !BS.atbRunning || BS.result) return;
  if(BS.pendingActor) return; // 有角色在行動，暫停

  let acted = false;

  // 掃描所有單位（依 atb 從大到小），找第一個滿的
  const all = [
    ...BS.party.filter(p=>p.alive).map(p=>({unit:p,isParty:true})),
    ...BS.enemies.filter(e=>e.alive).map(e=>({unit:e,isParty:false})),
  ];

  // 填充 ATB
  all.forEach(({unit})=>{
    const spdBuf = (unit.buffs ? unit.buffs.filter(b=>b.type==='spd').reduce((a,b)=>a+b.val,0) : 0);
    const quickLv = (typeof getTraitLevel==='function')? getTraitLevel(unit.key,'tr_quick'):0;
    const quickSpd = (quickLv>0 && unit.maxHp && unit.hp/unit.maxHp<0.4) ? (unit.spd*[0,0.05,0.10,0.15][quickLv]) : 0;
    const spd = (unit.spd || unit.atk/2 + 30) + spdBuf + quickSpd;
    unit.atb = Math.min(unit.maxAtb, unit.atb + spd * 0.08 * BS.globalAtbMult);
  });

  // 找最高 ATB 且滿的單位
  const readyUnits = all.filter(({unit})=>unit.atb>=unit.maxAtb);
  if(readyUnits.length > 0){
    // 取 atb 最高的
    readyUnits.sort((a,b)=>b.unit.atb - a.unit.atb);
    const {unit, isParty} = readyUnits[0];
    unit.atb = 0;
    BS.pendingActor = {unit, isParty};

    if(isParty){
      unit.defending = false; // 新回合解除防禦姿態
      BS.actionMenu = 'main';  // 重置選單到主層
      pauseAtb();
      renderAll();
    } else {
      // 敵方自動行動
      setTimeout(()=>enemyAction(unit), 400);
    }
  }

  renderPartyBars();
}

// ════════════════════════════════════════
// 玩家行動
// ════════════════════════════════════════
function selectSkill(skillId){
  if(!BS.pendingActor || !BS.pendingActor.isParty) return;
  const actor = BS.pendingActor.unit;
  const skill = actor.skills.find(s=>s.id===skillId);
  if(!skill) return;

  // 檢查 MP
  if(skill.mpCost && actor.mp < skill.mpCost){
    addLog('MP 不足，無法使用 '+skill.name, 'system'); return;
  }
  // 檢查 RB cost（縱橫之局等技能消耗 RB 槽）
  if(skill.rbCost && actor.rb < skill.rbCost){
    addLog('RB 值不足（需 '+skill.rbCost+'），無法使用 '+skill.name, 'system'); return;
  }
  // 檢查 LIMIT
  if(skill.isLimit && actor.rb < actor.maxRb){
    addLog('RB 值未滿，無法發動 LIMIT！', 'system'); return;
  }

  BS.pendingSkill = skill;

  if(skill.type==='heal_single' || skill.type==='buff_all'){
    // 對隊友的技能，自動選目標或全體
    if(skill.type==='heal_single'){
      BS.selectingTarget = 'party';
    } else {
      executeSkill(actor, skill, null);
      return;
    }
  } else if(skill.type==='all'){
    executeSkill(actor, skill, null);
    return;
  } else {
    BS.selectingTarget = 'enemy';
  }
  renderActionArea();
}

function selectTarget(targetId){
  if(!BS.pendingSkill) return;
  const actor = BS.pendingActor.unit;
  const skill = BS.pendingSkill;

  let target = null;
  if(BS.selectingTarget === 'enemy'){
    target = BS.enemies.find(e=>e.id===targetId);
  } else {
    target = BS.party.find(p=>p.key===targetId);
  }

  BS.selectingTarget = false;
  // 道具使用走獨立流程
  if(skill.isItem){
    useItemOnTarget(target);
    return;
  }
  executeSkill(actor, skill, target);
}

function executeSkill(actor, skill, target){
  BS.pendingSkill = null;
  BS.selectingTarget = false;

  // 扣 MP / RB
  if(skill.mpCost) actor.mp = Math.max(0, actor.mp - skill.mpCost);
  if(skill.rbCost) actor.rb = Math.max(0, actor.rb - skill.rbCost);
  if(skill.isLimit){ actor.rb = 0; limitFlashEffect(); }

  var actorName = actor.nameZh || actor.name;

  if(skill.type==='buff_all'){
    var buffPowerBonus = (typeof getPassiveBonus==='function') ? getPassiveBonus(actor.key,'buffPower') : 0;
    var bType = skill.buffType || 'atk';
    var bVal = (skill.buffVal || skill.buffAtk || 1.3) + buffPowerBonus;
    BS.party.forEach(p=>{
      if(p.alive) p.buffs.push({type:bType, val:bVal, turns:skill.buffDur});
    });
    addLog('✨ '+actorName+' 使出【'+skill.name+'】— 全隊'+(bType==='atk'?'攻擊力':bType==='def'?'防禦力':'速度')+'提升 '+skill.buffDur+' 回合！', 'important');
    floatText('BUFF!', 'center', '#e8cc80');
  }
  else if(skill.type==='buff_self'){
    actor.buffs.push({type:skill.buffType||'def', val:skill.buffVal||1.5, turns:skill.buffDur||3});
    addLog('🛡️ '+actorName+' 使出【'+skill.name+'】— 防禦力大幅提升 '+(skill.buffDur||3)+' 回合！', 'important');
    floatText('防禦UP', 'party_'+actor.key, '#80a0f0');
  }
  else if(skill.type==='heal_single'){
    var healBonus = (typeof getPassiveBonus==='function') ? getPassiveBonus(actor.key,'healPower') : 0;
    const healAmt = Math.round(actor.mag * skill.power * 3 * (1+healBonus));
    target.hp = Math.min(target.maxHp, target.hp + healAmt);
    addLog('💚 '+actorName+' 對 '+target.nameZh+' 使出【'+skill.name+'】— 回復 '+healAmt+' HP', 'heal');
    floatText('+'+healAmt, 'party_'+target.key, '#70f0a8', 'heal');
    if(skill.cleanse && target.ailments && target.ailments.length){
      var hadAilment = target.ailments.some(function(a){ return a.type==='poison'||a.type==='burn'||a.type==='bleed'; });
      target.ailments = target.ailments.filter(function(a){ return a.type!=='poison' && a.type!=='burn' && a.type!=='bleed'; });
      if(hadAilment) addLog('✨ '+target.nameZh+' 的異常狀態被解除了！', 'heal');
    }
  }
  else if(skill.type==='single'){
    applyDamage(actor, [target], skill);
  }
  else if(skill.type==='all'){
    const targets = BS.enemies.filter(e=>e.alive);
    applyDamage(actor, targets, skill);
  }

  // 增加 RB（只有普通攻擊累積）
  if(skill.isBasic){
    actor.rb = Math.min(actor.maxRb, actor.rb + 60);
  }

  finishActorTurn();
}

function applyDamage(actor, targets, skill){
  const actorName = actor.nameZh || actor.name;
  let hits = skill.hits || 1;
  // 雙劍精通（el_p3）：單體技能追加一擊
  if(skill.type==='single' && typeof hasPassive==='function' && hasPassive(actor.key,'el_p3')){
    hits += 1;
  }

  targets.forEach((target, ti)=>{
    if(!target.alive) return;

    for(let h=0;h<hits;h++){
      if(!target.alive) break;
      // ── 傷害來源分流：普攻→STR、技能→MAG、LIMIT→1.2STR+1.2MAG（統一倍率，調平衡只動 DMG_K）──
      var DMG_K = 2.3;
      let atkStat;
      if(skill.isLimit){
        atkStat = actor.str * 1.2 + actor.mag * 1.2;
      } else if(skill.isBasic){
        atkStat = actor.str;
      } else {
        atkStat = actor.mag;
      }
      let basePow = atkStat * skill.power * DMG_K;

      // 鬥爭心（tr_fight）：HP 40%以下攻擊力提升
      if(typeof getTraitLevel==='function'){
        var fightLv=getTraitLevel(actor.key,'tr_fight');
        if(fightLv>0 && actor.maxHp && actor.hp/actor.maxHp<0.4){
          basePow*=(1+[0,0.05,0.10,0.15][fightLv]);
        }
      }
      // 屬性技能傷害加成（被動）
      if(skill.attr && typeof hasPassive==='function'){
        if(skill.attr==='fire' && hasPassive(actor.key,'lk_p2')) basePow *= 1.18;
        if(skill.attr==='moon' && hasPassive(actor.key,'el_p5')) basePow *= 1.15;
      }

      // 裝備/buff 加成（簡化）
      const atkBuff = (actor.buffs ? actor.buffs.filter(b=>b.type==='atk').reduce((a,b)=>a*b.val,1) : 1) || 1;
      basePow *= atkBuff;

      // 防禦計算（比例式：100/(100+有效防禦)，平滑遞減、永不歸零也不破表）
      const defVal = target.def || 0;
      const defDownMult = (target.buffs ? target.buffs.filter(b=>b.type==='defDown').reduce((a,b)=>a*b.val,1) : 1) || 1;
      const effDef = defVal * (1 - (skill.pierceDef||0)) * defDownMult;
      const mitigation = 100 / (100 + Math.max(0, effDef));
      let dmg = Math.max(1, Math.round(basePow * mitigation));

      // 暴擊（10% + spd 加成 + 裝備爆擊率 + 被動爆擊率 + 技能本身爆擊加成 + 反擊姿態等臨時buff）
      const subA = actor.sub || {};
      const critBuffBonus = (actor.buffs ? actor.buffs.filter(b=>b.type==='critBuff').reduce((a,b)=>a+b.val,0) : 0);
      let critRate = 0.1 + (actor.spd||0)/1000 + (subA.crit||0) + (skill.critBonus||0) + critBuffBonus;
      if(typeof getPassiveBonus==='function'){
        critRate += getPassiveBonus(actor.key,'critRate');
      }
      const isCrit = Math.random() < critRate;
      if(isCrit) dmg = Math.round(dmg * (1.6 + (subA.critdmg||0) + (skill.critDmgBonus||0) + ((typeof getPassiveBonus==='function')?getPassiveBonus(actor.key,'critDmg'):0)));

      // LIMIT 特殊效果
      if(skill.halfHp) dmg = Math.round(target.hp * 0.5);

      target.hp = Math.max(0, target.hp - dmg);

      // 赤焰之觸（lk_p1）：普攻附加燃燒，3%HP/回合，最多5層
      if(skill.isBasic && typeof hasPassive==='function' && hasPassive(actor.key,'lk_p1')){
        var burnCount = target.ailments ? target.ailments.filter(function(a){return a.type==='burn';}).length : 0;
        if(burnCount < 5){
          if(!target.ailments) target.ailments=[];
          target.ailments.push({type:'burn',turns:2,pctHp:0.03});
          addLog('🔥 '+actorName+' 赤焰之觸！'+(target.nameZh||target.name)+' 著火！（第'+(burnCount+1)+'層）','dmg');
        }
      }

      // ── 裝備副屬效果（玩家攻擊時）──
      if(actor.sub){
        // 吸血：恢復造成傷害的 X%（Boss 減半）
        if(subA.lifesteal){
          var ls = Math.round(dmg * subA.lifesteal * (target.isBoss?0.5:1));
          if(ls>0){ actor.hp = Math.min(actor.maxHp, actor.hp + ls); addLog('🩸 '+actorName+' 吸取了 '+ls+' 點生命', 'heal'); }
        }
        // 即死：機率立即擊殺（Boss 無效）
        if(subA.instakill && !target.isBoss && target.alive && Math.random() < subA.instakill){
          target.hp = 0; target.alive = false;
          addLog('☠️ 即死！'+(target.nameZh||target.name)+' 被一擊斃命！', 'limit');
        }
        // 混亂：機率使目標攻擊友軍（Boss 無效）
        if(subA.confuse && !target.isBoss && target.alive && Math.random() < subA.confuse){
          target.confused = true;
          addLog('💫 '+(target.nameZh||target.name)+' 陷入混亂！', 'system');
        }
        // 中毒：附加中毒，每回合損失 X% 最大生命（Boss 減半）
        if(subA.poison && target.alive){
          if(!target.ailments) target.ailments = [];
          var pp = subA.poison * (target.isBoss?0.5:1);
          var ex = null;
          for(var ai=0; ai<target.ailments.length; ai++){ if(target.ailments[ai].type==='poison'){ ex=target.ailments[ai]; break; } }
          if(ex){ ex.turns = 3; ex.pctHp = Math.max(ex.pctHp||0, pp); }
          else { target.ailments.push({type:'poison', turns:3, pctHp:pp}); }
        }
      }

      // 技能本身吸血（艾爾薇斯主題：lifestealPct 欄位 + 被動 lifesteal 加成，Boss 減半）
      var lsPct = (skill.lifestealPct||0) + ((typeof getPassiveBonus==='function')?getPassiveBonus(actor.key,'lifesteal'):0);
      if(lsPct > 0){
        var ls2 = Math.round(dmg * lsPct * (target.isBoss?0.5:1));
        if(ls2 > 0){ actor.hp = Math.min(actor.maxHp, actor.hp + ls2); addLog('🩸 '+actorName+' 吸取了 '+ls2+' 點生命', 'heal'); }
      }

      // 技能本身即死（艾爾薇斯主題：instakillChance 欄位 + 被動 instakill 加成，Boss 無效）
      var ikChance = (skill.instakillChance||0) + ((typeof getPassiveBonus==='function')?getPassiveBonus(actor.key,'instakill'):0);
      if(ikChance > 0 && !target.isBoss && target.alive && Math.random() < ikChance){
        target.hp = 0; target.alive = false;
        addLog('☠️ 即死！'+(target.nameZh||target.name)+' 被一擊斃命！', 'limit');
      }

      // 麻痹（菲拉主題：stunChance 欄位 + 被動 stunPower 加成，Boss 無效）
      var stunCh = (skill.stunChance||0) + ((typeof getPassiveBonus==='function')?getPassiveBonus(actor.key,'stunPower'):0);
      if(stunCh > 0 && !target.isBoss && target.alive && Math.random() < stunCh){
        if(!target.ailments) target.ailments = [];
        target.ailments.push({type:'stun', turns:2});
        addLog('💫 '+(target.nameZh||target.name)+' 陷入麻痹，無法行動！', 'system');
      }

      // 降敵人buff（菲拉主題：enemyDebuff 欄位，套用被動 debuffPower 加成強化）
      if(skill.enemyDebuff && target.alive){
        if(!target.buffs) target.buffs = [];
        var dbBonus = (typeof getPassiveBonus==='function') ? getPassiveBonus(actor.key,'debuffPower') : 0;
        var dbVal = Math.max(0.3, skill.enemyDebuff.val - dbBonus);
        target.buffs.push({type:skill.enemyDebuff.type, val:dbVal, turns:skill.enemyDebuff.turns});
        addLog('📉 '+(target.nameZh||target.name)+(skill.enemyDebuff.type==='atkDown'?' 攻擊力下降了！':' 防禦力下降了！'), 'system');
      }

      // 吸血（莉卡莉絲妖刀赤鬼斬：吸MP用，跟上面吸血HP的lifestealPct不同）
      if(skill.drain){
        const drain = Math.round(dmg * 0.3);
        actor.mp = Math.min(actor.maxMp, actor.mp + drain);
      }

      // 狀態異常（燃燒/中毒，套用莉卡莉絲burnPower／菲拉poisonPower被動加成）
      if(skill.dot && Math.random() < 0.6){
        var dotBonus = (typeof getPassiveBonus==='function') ? getPassiveBonus(actor.key, skill.dot==='burn'?'burnPower':(skill.dot==='poison'?'poisonPower':'')) : 0;
        target.ailments.push({type:skill.dot, turns:3, power:Math.round(dmg*0.15*(1+dotBonus))});
      }

      // 增加目標 RB（被打到增加）
      if(target.rb !== undefined) target.rb = Math.min(target.maxRb, target.rb + 8);

      // Boss 第二階段觸發
      if(target.isBoss && !target.phase2 && target.hp <= target.phase2Hp){
        target.phase2 = true;
        addLog('💀 '+target.name+' 進入第二階段！', 'limit');
        limitFlashEffect();
        // 加 phase2 CSS class
        var bossEl = document.getElementById('enemy_'+target.id);
        if(bossEl) bossEl.classList.add('phase2');

        // phase2 進場屬性強化（雷恩：spd+15% atk+12% def+12%，直接永久調整基礎值，
        // 確保 ATB（讀 target.spd）與傷害公式（讀 target.atk / target.def，均為純屬性無buff轉接）皆即時生效）
        if(target.id && target.id.indexOf('rain_boss')===0){
          target.spd = Math.round(target.spd * 1.15);
          target.atk = Math.round(target.atk * 1.12);
          target.def = Math.round(target.def * 1.12);
          addLog('🔥 '+target.name+' 力量大幅提升！', 'limit');
        }
      }

      // 死亡判定
      if(target.hp <= 0){ target.hp = 0; target.alive = false; }

      // 飄字
      const isEnemy = !!target.isBoss || BS.enemies.includes(target);
      const prefix = isEnemy ? 'enemy_' : 'party_';
      const tid = isEnemy ? target.id : target.key;
      var floatColor = isCrit ? '#ffdd44' : (isEnemy ? '#f08080' : '#f0c0c0');
      var floatType  = skill.isLimit ? 'limit' : (isCrit ? 'crit' : '');
      floatText((isCrit?'暴擊！':'')+dmg, prefix+tid, floatColor, floatType);

      if(hits>1) addLog('⚔️ '+actorName+'【'+skill.name+'】Hit '+(h+1)+' → '+(target.name||target.nameZh)+' '+(isCrit?'暴擊！':'')+dmg, 'dmg');
    }

    // 單體 hits=1 的 log 已在迴圈內處理，這裡只補 hits=1 時的主 log
    if(hits===1){
      addLog('⚔️ '+actorName+'【'+skill.name+'】→ '+(target.name||target.nameZh)+' '+(skill.isLimit?'✦LIMIT ':'')+(target.hp<=0?'【擊倒！】':''), skill.isLimit?'limit':'dmg');
    }

    if(!target.alive && BS.enemies.includes(target)){
      addLog('💀 '+target.name+' 倒下了！', 'important');
    }
  });

  // 攻擊動畫
  targets.forEach(t=>{
    if(BS.enemies.includes(t)){
      const el = document.getElementById('enemy_'+t.id);
      if(el){ el.classList.add('shaking'); setTimeout(()=>el.classList.remove('shaking'),350); }
    }
  });

  checkBattleEnd();
}

// ════════════════════════════════════════
// 敵人 AI
// ════════════════════════════════════════
function enemyAction(enemy){
  if(!enemy.alive){ endActorTurn(); return; }

  var wasStunned = enemy.ailments && enemy.ailments.some(function(a){ return a.type==='stun'; });

  // 狀態異常優先處理（含麻痹倒數、燃燒/中毒傷害）
  processTurnEffects(enemy);
  if(!enemy.alive){ endActorTurn(); return; }

  if(wasStunned){
    addLog('💫 '+(enemy.nameZh||enemy.name)+' 處於麻痹狀態，無法行動！', 'system');
    endActorTurn();
    return;
  }

  // 技能選擇（按機率權重）
  const availSkills = enemy.skills.filter(s=>{
    if(s.phase2Only && !enemy.phase2) return false;
    if(s.type==='summon'){
      var _used = enemy._summonsUsed || 0;
      if(_used >= (s.maxSummons||1)) return false;
    }
    return true;
  });
  const r = Math.random();
  let cumProb = 0;
  let chosen = availSkills[0];
  for(const s of availSkills){
    // 第二階段增加特殊技機率（可由技能自訂 phase2Prob 覆寫，預設 0.4）
    const prob = (enemy.phase2 && s.phase2Only) ? (s.phase2Prob !== undefined ? s.phase2Prob : 0.4) : s.prob;
    cumProb += prob;
    if(r < cumProb){ chosen = s; break; }
  }

  const aliveParty = BS.party.filter(p=>p.alive);
  if(aliveParty.length === 0){ checkBattleEnd(); return; }

  // 混亂：改攻擊友軍
  if(enemy.confused){
    enemy.confused = false;
    var cAllies = BS.enemies.filter(function(x){ return x.alive && x !== enemy; });
    if(cAllies.length){
      var victim = cAllies[Math.floor(Math.random()*cAllies.length)];
      var craw = Math.max(1, Math.round((enemy.atk||40) * (100/(100+(victim.def||0)))));
      victim.hp = Math.max(0, victim.hp - craw);
      if(victim.hp<=0){ victim.hp=0; victim.alive=false; }
      addLog('💫 '+enemy.name+' 陷入混亂，攻擊同伴造成 '+craw+'！', 'dmg');
      if(typeof floatText==='function'){ try{ floatText(craw, 'enemy_'+victim.id, 'dmg'); }catch(e){} }
    } else {
      addLog('💫 '+enemy.name+' 陷入混亂，呆立原地。', 'system');
    }
    endActorTurn();
    return;
  }

  // 選目標（HP 最低優先，有時隨機）
  let target;
  if(chosen.type==='all'){
    target = null;
  } else {
    target = Math.random() < 0.6
      ? aliveParty.reduce((a,b)=>a.hp<b.hp?a:b)
      : aliveParty[Math.floor(Math.random()*aliveParty.length)];
  }

  // 執行
  if(chosen.type==='all'){
    applyEnemyDamage(enemy, aliveParty, chosen);
  } else if(chosen.type==='taunt'){
    addLog('😤 '+enemy.name+' 發出嘲諷！', 'system');
  } else if(chosen.type==='summon'){
    var sUsed = enemy._summonsUsed || 0;
    var sDef = (typeof ENEMY_DEFS!=='undefined') ? ENEMY_DEFS[chosen.summonKey] : null;
    if(sDef && BS.enemies.length < 6){
      var clone = Object.assign(JSON.parse(JSON.stringify(sDef)), {
        id: chosen.summonKey+'_s'+sUsed+'_'+Date.now(),
        atb: 0, maxAtb: 1000, ailments: [], buffs: [], alive: true, phase2: false,
      });
      BS.enemies.push(clone);
      enemy._summonsUsed = sUsed + 1;
      addLog('🐺 '+enemy.name+' 召喚了 '+clone.name+'！', 'important');
    }
  } else {
    applyEnemyDamage(enemy, [target], chosen);
  }

  endActorTurn();
}

function applyEnemyDamage(enemy, targets, skill){
  targets.forEach(target=>{
    if(!target.alive) return;
    const hits = skill.hits || 1;
    for(let h=0;h<hits;h++){
      // 迴避（被動：影避 sk_p4 +12%、月之眼員 fi_p3 +8%）
      let dodgeChance = 0;
      if(typeof getPassiveBonus==='function'){
        dodgeChance += getPassiveBonus(target.key,'dodge');
      }
      if(dodgeChance > 0 && Math.random() < dodgeChance){
        addLog('💨 '+(target.nameZh||target.name)+' 閃避了攻擊！', 'system');
        continue;
      }

      const atkDownMult = (enemy.buffs ? enemy.buffs.filter(b=>b.type==='atkDown').reduce((a,b)=>a*b.val,1) : 1) || 1;
      let dmg = Math.round(enemy.atk * skill.power * atkDownMult * (0.85 + Math.random()*0.3));
      const defMult = 1 - target.def/300;
      // 月盾等防禦buff（buffs 中 type==='def' 的乘數，越大減傷越多）
      const defBuff = (target.buffs ? target.buffs.filter(b=>b.type==='def').reduce((a,b)=>a*b.val,1) : 1) || 1;
      // 鐵壁（tr_iron）：HP 40%以下防禦力提升
      var ironLv=(typeof getTraitLevel==='function')?getTraitLevel(target.key,'tr_iron'):0;
      var ironMult=(ironLv>0&&target.maxHp&&target.hp/target.maxHp<0.4)?(1-[0,0.05,0.10,0.15][ironLv]):1;
      dmg = Math.max(1, Math.round(dmg * defMult / defBuff * ironMult));
      const isCrit = Math.random() < 0.08;
      if(isCrit) dmg = Math.round(dmg*1.5);

      // 防禦減傷 50%
      if(target.defending){
        dmg = Math.max(1, Math.round(dmg * 0.5));
      }

      // 鐵壁守護（el_p4）：20% 機率格擋，再減傷50%
      if(typeof hasPassive==='function' && hasPassive(target.key,'el_p4') && Math.random()<0.2){
        dmg = Math.max(1, Math.round(dmg * 0.5));
        addLog('🛡️ '+(target.nameZh||target.name)+' 格擋了攻擊！', 'system');
      }

      target.hp = Math.max(0, target.hp - dmg);
      target.rb = Math.min(target.maxRb, target.rb + 35);

      // 擒拿等技能：附加減速
      if(skill.applySlow && target.hp > 0){
        target.buffs.push({type:'spd', val:skill.applySlow.val, turns:skill.applySlow.turns});
        addLog('🥀 '+(target.nameZh||target.name)+' 被擒拿，速度大幅下降！', 'system');
      }

      // 影速反應（sk_p2）：被攻擊後SPD+30，持續3回合
      if(target.hp > 0 && typeof hasPassive==='function' && hasPassive(target.key,'sk_p2')){
        target.buffs.push({type:'spd',val:30,turns:3});
        addLog('💨 '+(target.nameZh||target.name)+' 影速反應！速度提升（3回合）','system');
      }

      // 焰盾反擊（lk_p2）：被攻擊時50%機率對攻擊者附加燃燒（最多5層）
      if(target.hp > 0 && typeof hasPassive==='function' && hasPassive(target.key,'lk_p2') && Math.random()<0.5){
        var eBurns=enemy.ailments?enemy.ailments.filter(function(a){return a.type==='burn';}).length:0;
        if(eBurns<5){
          if(!enemy.ailments) enemy.ailments=[];
          enemy.ailments.push({type:'burn',turns:2,pctHp:0.03});
          addLog('🔥 '+(target.nameZh||target.name)+' 焰盾反擊！'+(enemy.name||'敵人')+' 著火！（第'+(eBurns+1)+'層）','dmg');
        }
      }

      // 反擊：被擊中時機率反擊攻擊者（裝備副屬 + 反擊之刃等臨時buff + 被動表加成）
      var counterBuffBonus = (target.buffs ? target.buffs.filter(b=>b.type==='counterBuff').reduce((a,b)=>a+b.val,0) : 0);
      var counterPassiveBonus = (typeof getPassiveBonus==='function') ? getPassiveBonus(target.key,'counter') : 0;
      var totalCounter = ((target.sub&&target.sub.counter)||0) + counterBuffBonus + counterPassiveBonus;
      if(target.hp > 0 && totalCounter > 0 && Math.random() < totalCounter){
        var cdmg = Math.max(1, Math.round((target.str||0) * (100/(100+(enemy.def||0)))));
        enemy.hp = Math.max(0, enemy.hp - cdmg);
        if(enemy.hp<=0){ enemy.hp=0; enemy.alive=false; }
        addLog('⚔️ '+(target.nameZh||target.name)+' 反擊造成 '+cdmg+'！', 'dmg');
        if(typeof floatText==='function'){ try{ floatText(cdmg, 'enemy_'+enemy.id, 'dmg'); }catch(e){} }
      }

      if(skill.dot && Math.random()<0.5){
        target.ailments.push({type:skill.dot,turns:3,power:Math.round(dmg*0.12)});
      }
      if(skill.drain){
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + Math.round(dmg*0.25));
      }

      floatText((isCrit?'暴擊！':'')+dmg, 'party_'+target.key, '#f08080');
      addLog('👹 '+enemy.name+'【'+skill.name+'】→ '+target.nameZh+' '+(isCrit?'暴擊！':'')+dmg+'傷害'+(target.hp<=dmg?' 【倒下！】':''), 'dmg');
      if(target.hp<=0){ target.hp=0; target.alive=false; }
    }
    if(!target.alive) addLog('💔 '+target.nameZh+' 倒下了……', 'important');
  });
  checkBattleEnd();
}

// ── 回合效果（狀態異常處理）──
function processTurnEffects(unit){
  if(!unit.ailments) return;
  unit.ailments = unit.ailments.filter(a=>{
    if(a.type==='burn' || a.type==='poison' || a.type==='bleed'){
      const dot = a.pctHp ? Math.max(1, Math.round((unit.maxHp||unit.hp) * a.pctHp)) : (a.power || 30);
      unit.hp = Math.max(0, unit.hp - dot);
      const icon = a.type==='burn'?'🔥':a.type==='poison'?'☠️':'🩸';
      const name = unit.nameZh||unit.name;
      const atkName = a.type==='burn'?'燃燒':a.type==='poison'?'中毒':'流血';
      addLog(icon+' '+name+' 受到'+atkName+'傷害 '+dot, 'dmg');
      if(unit.hp<=0){ unit.hp=0; unit.alive=false; }
    }
    a.turns--;
    return a.turns > 0 && unit.alive;
  });
  // buff 倒計時
  if(unit.buffs) unit.buffs = unit.buffs.filter(b=>{ b.turns--; return b.turns>0; });

  // 妙手回春（lk_p3）：每回合自動回復5% HP
  if(unit.alive && typeof hasPassive==='function' && hasPassive(unit.key,'lk_p3')){
    var regen = Math.max(1, Math.round((unit.maxHp||unit.hp) * 0.05));
    if(unit.hp < unit.maxHp){
      unit.hp = Math.min(unit.maxHp, unit.hp + regen);
      addLog('💚 '+(unit.nameZh||unit.name)+'（妙手回春）回復 '+regen+' HP', 'heal');
    }
  }
}

// 勝負判定
// ════════════════════════════════════════
function checkBattleEnd(){
  if(BS.result) return;
  const allEnemiesDead = BS.enemies.every(e=>!e.alive);
  const allPartyDead = BS.party.every(p=>!p.alive);

  if(allEnemiesDead){
    BS.result = 'win';
    clearInterval(BS.atbInterval);
    setTimeout(()=>showResult('win'), 800);
  } else if(allPartyDead){
    BS.result = 'lose';
    clearInterval(BS.atbInterval);
    setTimeout(()=>showResult('lose'), 800);
  }
  renderAll();
}

function rollDrops(){
  // 計算所有敵人掉落，合併同 id
  var dropMap = {};
  BS.enemies.forEach(function(e){
    var drops = e.drops || [];
    drops.forEach(function(d){
      if(!d.id) return;
      if(Math.random() <= d.rate){
        dropMap[d.id] = (dropMap[d.id]||0) + (d.qty||1);
      }
    });
  });
  return dropMap;
}

function getItemInfo(id){
  // 從 ITEMS 或 EQUIPS 找名稱與圖示
  if(typeof ITEMS !== 'undefined' && ITEMS[id]) return {name:ITEMS[id].name, ico:ITEMS[id].ico||'📦'};
  if(typeof EQUIPS !== 'undefined' && EQUIPS[id]) return {name:EQUIPS[id].name, ico:EQUIPS[id].ico||'⚔️'};
  return {name:id, ico:'📦'};
}

function addDropsToBag(dropMap){
  if(typeof PLAYER === 'undefined' || !PLAYER.bag) return;
  Object.keys(dropMap).forEach(function(id){
    var qty = dropMap[id];
    var isEq = (typeof EQUIPS !== 'undefined' && EQUIPS[id]);
    if(isEq){
      // 裝備每個獨立加入
      for(var i=0;i<qty;i++){
        PLAYER.bag.push({id:id, qty:1, isEquip:true});
      }
    } else {
      var existing = null;
      for(var j=0;j<PLAYER.bag.length;j++){
        if(PLAYER.bag[j].id===id && !PLAYER.bag[j].isEquip){ existing = PLAYER.bag[j]; break; }
      }
      if(existing) existing.qty += qty;
      else PLAYER.bag.push({id:id, qty:qty});
    }
  });
}

function showResult(type){
  const div = document.createElement('div');
  div.className = 'result-overlay';
  const expTotal = type==='win' ? BS.enemies.reduce((a,e)=>a+(e.exp||0),0) : 0;
  var goldTotal = type==='win' ? BS.enemies.reduce((a,e)=>a+(e.gold||0),0) : 0;

  // 將戰鬥後 HP/MP/RB 存回持久狀態
  BS.party.forEach(function(p){
    var st = getPartyState(p.key);
    if(!st) return;
    st.hp = p.alive ? p.hp : 0;
    st.mp = p.mp;
    st.rb = p.rb; // RB 保留到下場（存著打 boss）
  });

  // 升級處理 + SP 經濟
  var levelUpLines = [];
  if(type==='win'){
    // 傭兵經驗（fi_p1）：戰後 Gil +20%
    if(typeof getPassiveBonus==='function'){
      var maxGilBonus = 0;
      BS.party.forEach(function(p){ if(p.alive) maxGilBonus = Math.max(maxGilBonus, getPassiveBonus(p.key,'gilBonus')); });
      if(maxGilBonus>0) goldTotal = Math.round(goldTotal * (1+maxGilBonus));
    }
    // 擊殺 SP：每隻敵人 +5，Boss +20（取代而非疊加）
    var killSp = BS.enemies.reduce(function(a,e){ return a + (e.isBoss?20:5); }, 0);
    BS.party.forEach(function(p){
      if(!p.alive) return; // 倒下的不獲得經驗
      var st = getPartyState(p.key);
      if(!st) return;
      st.exp += expTotal;
      var leveled = false, lvGain = 0;
      while(st.exp >= st.expNext){
        st.exp -= st.expNext;
        st.lv += 1;
        st.expNext = expNeeded(st.lv);
        leveled = true; lvGain++;
      }
      if(leveled){
        // 升級回復滿 HP/MP（含裝備加成，RB 保留）
        var def = PARTY_DEF.find(function(d){ return d.key===p.key; });
        var _eqbLv = (typeof getEquipBonus === 'function') ? getEquipBonus(p.key) : {hp:0,mp:0};
        st.hp = maxHpFor(def, st) + (_eqbLv.hp||0);
        st.mp = maxMpFor(def, st) + (_eqbLv.mp||0);
        levelUpLines.push(p.nameZh + ' → Lv.' + st.lv);
      }
      // SP：擊殺 + 升級（每級+5）
      var ch = (typeof findCharByKey==='function') ? findCharByKey(p.key) : null;
      if(ch) ch.sp = (ch.sp||0) + killSp + lvGain*5;
    });
  }

  // 掉落處理
  var dropHtml = '';
  if(type==='win'){
    var dropMap = rollDrops();
    addDropsToBag(dropMap);
    var gearGot = (typeof rollAndGrantGearDrops === 'function') ? rollAndGrantGearDrops() : [];
    // 加金錢進 PLAYER
    if(typeof PLAYER !== 'undefined') PLAYER.gil = (PLAYER.gil||0) + goldTotal;
    var dropKeys = Object.keys(dropMap);
    if(dropKeys.length > 0 || gearGot.length > 0){
      var dropItems = dropKeys.map(function(id){
        var info = getItemInfo(id);
        return '<div style="font-size:11px;color:var(--text);margin:2px 0">'+info.ico+' '+info.name+' ×'+dropMap[id]+'</div>';
      }).join('');
      dropItems += gearGot.map(function(g){
        var gc = g.rar==='red' ? '#d45a5a' : (g.rar==='blue' ? '#4a8fd4' : '#b8c0d0');
        var rn = g.rar==='red' ? '紅裝' : (g.rar==='blue' ? '藍裝' : '白裝');
        return '<div style="font-size:11px;color:'+gc+';margin:2px 0">'+g.ico+' '+g.name+'（'+rn+'）</div>';
      }).join('');
      dropHtml = '<div style="margin:8px 0 14px;padding:8px 12px;background:rgba(200,168,74,0.08);border:1px solid rgba(200,168,74,0.3);border-radius:8px"><div style="font-size:10px;color:var(--gold);margin-bottom:4px;letter-spacing:1px">獲得物品</div>'+dropItems+'</div>';
    }
  }

  // 自動存檔（戰鬥結算）
  if(typeof saveGame==='function') saveGame(true);

  var lvHtml = '';
  if(levelUpLines && levelUpLines.length > 0){
    lvHtml = '<div style="margin:8px 0 4px;padding:8px 12px;background:rgba(200,168,74,0.12);border:1px solid rgba(200,168,74,0.5);border-radius:8px"><div style="font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:4px">⬆ LEVEL UP</div>' +
      levelUpLines.map(function(l){ return '<div style="font-size:12px;color:var(--gold-l,#e8cc80)">'+l+'</div>'; }).join('') +
      '<div style="font-size:9px;color:var(--text2);margin-top:4px">HP / MP 已回復</div></div>';
  }
  var winInfo = type==='win' ? '<div style="font-size:10px;color:var(--text2);margin-bottom:8px;line-height:2">EXP +'+expTotal+'<br>Gil +'+goldTotal+'</div>'+lvHtml+dropHtml : '';
  var hasWinCb = (type==='win' && typeof BATTLE_ON_WIN !== 'undefined' && BATTLE_ON_WIN);
  var btnsHtml = hasWinCb
    ? '<button class="result-btn" id="rb-continue">繼續 ▸</button>'
    : '<button class="result-btn" id="rb-restart">再戰</button>' +
      '<button class="result-btn" style="background:var(--panel2);color:var(--text2);border:1px solid var(--border2);margin-top:6px" id="rb-back">返回地圖</button>';
  div.innerHTML = '<div class="result-panel">' +
    '<div class="result-title '+type+'">'+(type==='win'?'VICTORY':'DEFEAT')+'</div>' +
    '<div class="result-sub">'+(type==='win'?'戰鬥勝利！':'全員倒下……')+'</div>' +
    winInfo + btnsHtml +
    '</div>';
  document.body.appendChild(div);
  var rbc = document.getElementById('rb-continue');
  var rb1 = document.getElementById('rb-restart');
  var rb2 = document.getElementById('rb-back');
  if(rbc) rbc.addEventListener('click', function(){
    var cb = BATTLE_ON_WIN; BATTLE_ON_WIN = null; BATTLE_PARTY = null;
    closeBattleOverlay();
    setTimeout(function(){ if(typeof cb === 'function'){ try { cb(); } catch(e){} } }, 80);
  });
  if(rb1) rb1.addEventListener('click', restartBattle);
  if(rb2) rb2.addEventListener('click', closeBattleOverlay);
}

function restartBattle(){
  document.querySelectorAll('.result-overlay,.float-num').forEach(function(e){ e.remove(); });
  // 再戰：回復全隊 HP/MP（RB 保留），避免帶著瀕死狀態重來
  PARTY_STATE.forEach(function(st){
    var def = PARTY_DEF.find(function(d){ return d.key===st.key; });
    if(def){
      var _eqbR = (typeof getEquipBonus === 'function') ? getEquipBonus(st.key) : {hp:0,mp:0};
      st.hp = maxHpFor(def, st) + (_eqbR.hp||0);
      st.mp = maxMpFor(def, st) + (_eqbR.mp||0);
    }
  });
  var keys = BS.enemies.map(function(e){ return e.id.split('_').slice(0,-1).join('_'); });
  initBattle(keys);
}

// ════════════════════════════════════════
// 傷害飄字（升級版）
// ════════════════════════════════════════
function floatText(text, targetRef, color, type){
  var el = document.createElement('div');
  var cls = 'float-num';
  if(type) cls += ' ' + type;
  el.className = cls;
  el.textContent = text;

  if(type === 'crit' || type === 'limit'){
    el.style.color = color || '#ffdd44';
    el.style.fontSize = '22px';
  } else if(type === 'heal'){
    el.style.color = color || '#70f0a8';
    el.style.fontSize = '16px';
  } else if(type === 'miss'){
    el.style.color = 'var(--text2)';
    el.style.fontSize = '13px';
  } else {
    el.style.color = color || '#f08080';
    el.style.fontSize = String(text).length > 4 ? '16px' : '20px';
  }

  var refEl = null;
  if(targetRef === 'center') refEl = document.getElementById('enemy-area');
  else refEl = document.getElementById(targetRef);

  var x, y;
  if(refEl){
    var rect = refEl.getBoundingClientRect();
    x = rect.left + rect.width  * (0.3 + Math.random()*0.4);
    y = rect.top  + rect.height * (0.2 + Math.random()*0.4);
  } else {
    x = window.innerWidth / 2;
    y = window.innerHeight * 0.4;
  }
  el.style.left = Math.round(x) + 'px';
  el.style.top  = Math.round(y) + 'px';

  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.remove(); }, 1100);
}

function renderEnemies(){
  const cont = document.getElementById('enemies-container');
  if(!cont) return;
  const canTarget = BS.selectingTarget === 'enemy';
  cont.innerHTML = '';
  BS.enemies.forEach(function(e){
    const card = document.createElement('div');
    const cls = ['enemy-card'];
    if(!e.alive) cls.push('dead');
    if(canTarget) cls.push('targeted');
    card.className = cls.join(' ');
    card.id = 'enemy_' + e.id;
    if(canTarget && e.alive){
      card.style.cursor = 'pointer';

function renderActionArea(){
  const area = document.getElementById('action-area');
  if(!area) return;
  const indicator = document.getElementById('turn-indicator');
  area.innerHTML = '';

  if(BS.result) return;

  if(!BS.pendingActor || !BS.pendingActor.isParty){
    if(indicator) indicator.textContent = 'ATB 充能中';
    const w = document.createElement('div');
    w.className = 'waiting-msg';
    w.textContent = '— ATB 充能中 —';
    area.appendChild(w);
    return;
  }

  const actor = BS.pendingActor.unit;
  if(indicator) indicator.textContent = actor.nameZh + ' 的回合';

  if(BS.selectingTarget){
    const skillName = BS.pendingSkill ? BS.pendingSkill.name : '';
    const prompt = document.createElement('div');
    prompt.className = 'target-prompt';
    prompt.textContent = '【' + skillName + '】— 選擇目標';
    area.appendChild(prompt);
    renderPartyList();
    renderEnemies();
    return;
  }

  // 角色名稱提示
  const label = document.createElement('div');
  label.style.cssText = 'font-size:8px;color:'+actor.acc+';letter-spacing:2px;margin-bottom:6px;font-family:Cinzel,serif';
  label.textContent = actor.nameZh + ' — 選擇行動';
  area.appendChild(label);

  var menu = BS.actionMenu || 'main';

  // ── 技能子選單 ──
  if(menu === 'skill'){
    renderSkillSubmenu(area, actor);
    return;
  }
  // ── 道具子選單 ──
  if(menu === 'item'){
    renderItemSubmenu(area, actor);
    return;
  }

  // ── 主選單：攻擊/技能/防禦/道具 ──
  const grid = document.createElement('div');
  grid.className = 'skill-grid';

  var mainCmds = [
    {ico:'⚔️', name:'攻擊', sub:'普通攻擊', act:function(){ BS.pendingSkill={id:'basic_atk',name:'普通攻擊',type:'single',power:1.0,isBasic:true}; BS.selectingTarget='enemy'; renderActionArea(); }},
    {ico:'✨', name:'技能', sub:'消耗 MP/RB', act:function(){ BS.actionMenu='skill'; renderActionArea(); }},
    {ico:'🛡️', name:'防禦', sub:'減傷+回MP', act:function(){ doDefend(actor); }},
    {ico:'🎒', name:'道具', sub:'使用道具', act:function(){ BS.actionMenu='item'; renderActionArea(); }},
  ];

  mainCmds.forEach(function(cmd){
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.innerHTML =
      '<div class="skill-btn-ico">'+cmd.ico+'</div>' +
      '<div class="skill-btn-body">' +
        '<div class="skill-btn-name" style="color:'+actor.acc+'">'+cmd.name+'</div>' +
        '<div class="skill-btn-cost" style="color:var(--text2)">'+cmd.sub+'</div>' +
      '</div>';
    btn.addEventListener('click', cmd.act);
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function renderSkillSubmenu(area, actor){
  const grid = document.createElement('div');
  grid.className = 'skill-grid';

  actor.skills.forEach(function(sk){
    const noMp = sk.mpCost && actor.mp < sk.mpCost;
    const noLimit = sk.isLimit && actor.rb < actor.maxRb;
    const noRb = sk.rbCost && actor.rb < sk.rbCost;
    const disabled = noMp || noLimit || noRb;

    const btn = document.createElement('button');
    const btnCls = ['skill-btn'];
    if(sk.isLimit && !noLimit) btnCls.push('limit-ready');
    if(sk.rbCost && !noRb) btnCls.push('rb-ready');
    btn.className = btnCls.join(' ');
    if(disabled) btn.disabled = true;

    const costType = sk.isLimit ? 'cost-lmt-t' : sk.rbCost ? 'cost-rb-t' : sk.mpCost ? 'cost-mp-t' : 'cost-atb-t';
    const costText = sk.isLimit ? 'LIMIT' : sk.rbCost ? (sk.rbCost+' RB') : sk.mpCost ? (sk.mpCost+' MP') : '—';
    const nameColor = disabled ? 'var(--text2)' : actor.acc;

    btn.innerHTML =
      '<div class="skill-btn-ico">'+sk.ico+'</div>' +
      '<div class="skill-btn-body">' +
        '<div class="skill-btn-name" style="color:'+nameColor+'">'+sk.name+'</div>' +
        '<div class="skill-btn-cost '+costType+'">'+costText+'</div>' +
      '</div>';
    if(!disabled){
      (function(skId){ btn.addEventListener('click', function(){ selectSkill(skId); }); })(sk.id);
    }
    grid.appendChild(btn);
  });
  area.appendChild(grid);

  // 返回按鈕
  const backRow = document.createElement('div');
  backRow.className = 'extra-btns';
  backRow.style.marginTop = '6px';
  const backBtn = document.createElement('button');
  backBtn.className = 'extra-btn';
  backBtn.textContent = '← 返回';
  backBtn.addEventListener('click', function(){ BS.actionMenu='main'; renderActionArea(); });
  backRow.appendChild(backBtn);
  area.appendChild(backRow);
}

function renderItemSubmenu(area, actor){
  const grid = document.createElement('div');
  grid.className = 'skill-grid';

  // 只顯示可在戰鬥使用的消耗品（hp/mp/cure/all）
  var usable = [];
  if(typeof PLAYER !== 'undefined' && PLAYER.bag){
    PLAYER.bag.forEach(function(slot){
      if(slot.isEquip) return;
      var info = (typeof ITEMS !== 'undefined') ? ITEMS[slot.id] : null;
      if(info && info.type==='consume' && (slot.qty||0) > 0){
        usable.push({id:slot.id, info:info, qty:slot.qty});
      }
    });
  }

  if(usable.length === 0){
    const empty = document.createElement('div');
    empty.style.cssText = 'font-size:11px;color:var(--text2);padding:12px;text-align:center';
    empty.textContent = '沒有可用的道具';
    area.appendChild(empty);
  } else {
    usable.forEach(function(it){
      const btn = document.createElement('button');
      btn.className = 'skill-btn';
      var _isLiquor = (it.info.effect === 'liquor');
      if(_isLiquor && BS.drankSet && BS.drankSet[actor.key]){ btn.disabled = true; btn.style.opacity = '0.4'; }
      btn.innerHTML =
        '<div class="skill-btn-ico">'+(it.info.ico||'📦')+'</div>' +
        '<div class="skill-btn-body">' +
          '<div class="skill-btn-name" style="color:var(--text)">'+it.info.name+' ×'+it.qty+'</div>' +
          '<div class="skill-btn-cost" style="color:var(--text2)">'+(it.info.desc||'')+'</div>' +
        '</div>';
      (function(item){ btn.addEventListener('click', function(){ selectItem(item); }); })(it);
      grid.appendChild(btn);
    });
  }
  area.appendChild(grid);

  const backRow = document.createElement('div');
  backRow.className = 'extra-btns';
  backRow.style.marginTop = '6px';
  const backBtn = document.createElement('button');
  backBtn.className = 'extra-btn';
  backBtn.textContent = '← 返回';
  backBtn.addEventListener('click', function(){ BS.actionMenu='main'; renderActionArea(); });
  backRow.appendChild(backBtn);
  area.appendChild(backRow);
}

// ── 防禦：減傷50% + 回15%MP ──
function doDefend(actor){
  actor.mp = Math.min(actor.maxMp, actor.mp + Math.round(actor.maxMp * 0.15));
  actor.defending = true; // applyEnemyDamage 會檢查並在下次受傷後清除
  addLog('🛡️ ' + (actor.nameZh||actor.name) + ' 進入防禦姿態 — 減傷 50%，回復 MP', 'system');
  floatText('DEFEND', 'party_'+actor.key, '#80b0e0');
  BS.actionMenu = 'main';
  finishActorTurn();
}

// ── 道具：選擇後決定目標 ──
function selectItem(item){
  BS.pendingItem = item;
  var eff = item.info.effect;
  if(eff === 'liquor'){ drinkLiquor(item); return; }
  // 回復/解除類 → 選隊友（含自己）；目前道具都是對我方
  BS.selectingTarget = 'party';
  BS.pendingSkill = {id:'use_item', name:item.info.name, type:'item', isItem:true};
  renderActionArea();
}

function drinkLiquor(item){
  var actor = BS.pendingActor.unit;
  var info = item.info;
  if(!BS.drankSet) BS.drankSet = {};
  if(BS.drankSet[actor.key]){
    showToast('本場戰鬥已經喝過酒了', 'error');
    return; // 不消耗回合，留在道具選單
  }
  if(!actor.buffs) actor.buffs = [];
  actor.buffs.push({type: info.buffType, val: info.buffVal, turns: info.turns || 5});
  var cost = Math.floor(actor.maxHp * 0.10);
  actor.hp = Math.max(1, actor.hp - cost);
  floatText('-' + cost, 'party_' + actor.key, '#f08080', 'dmg');
  BS.drankSet[actor.key] = true;
  if(typeof PLAYER !== 'undefined' && PLAYER.bag){
    for(var i=0;i<PLAYER.bag.length;i++){
      if(PLAYER.bag[i].id===item.id && !PLAYER.bag[i].isEquip){
        PLAYER.bag[i].qty -= 1;
        if(PLAYER.bag[i].qty <= 0) PLAYER.bag.splice(i,1);
        break;
      }
    }
  }
  addLog('🍶 ' + (actor.nameZh||actor.name) + ' 飲下【'+info.name+'】— ' + (info.desc||'') + '（-'+cost+' HP）', 'limit');
  BS.pendingItem = null;
  BS.selectingTarget = false;
  BS.actionMenu = 'main';
  finishActorTurn();
}

function useItemOnTarget(target){
  var item = BS.pendingItem;
  var actor = BS.pendingActor.unit;
  if(!item || !target){ BS.actionMenu='main'; renderActionArea(); return; }
  var info = item.info;
  var msg = '';

  if(info.effect==='hp'){
    var healed = Math.min(target.maxHp, target.hp + info.val) - target.hp;
    target.hp += healed;
    msg = '回復 '+healed+' HP';
    floatText('+'+healed, 'party_'+target.key, '#70f0a8', 'heal');
  } else if(info.effect==='mp'){
    var mphealed = Math.min(target.maxMp, target.mp + info.val) - target.mp;
    target.mp += mphealed;
    msg = '回復 '+mphealed+' MP';
    floatText('+'+mphealed, 'party_'+target.key, '#70a8f0', 'heal');
  } else if(info.effect==='all'){
    target.hp = target.maxHp; target.mp = target.maxMp;
    msg = '完全回復';
    floatText('FULL', 'party_'+target.key, '#e8cc80', 'heal');
  } else if(info.effect==='cure'){
    target.ailments = (target.ailments||[]).filter(function(a){ return a.type !== info.cureType; });
    msg = '解除' + (info.cureType==='poison'?'中毒':'燃燒');
    floatText('CURE', 'party_'+target.key, '#80f0c0', 'heal');
  }

  // 扣除背包道具
  if(typeof PLAYER !== 'undefined' && PLAYER.bag){
    for(var i=0;i<PLAYER.bag.length;i++){
      if(PLAYER.bag[i].id===item.id && !PLAYER.bag[i].isEquip){
        PLAYER.bag[i].qty -= 1;
        if(PLAYER.bag[i].qty <= 0) PLAYER.bag.splice(i,1);
        break;
      }
    }
  }

  addLog('🎒 ' + (actor.nameZh||actor.name) + ' 對 ' + (target.nameZh||target.name) + ' 使用【'+info.name+'】— '+msg, 'heal');
  BS.pendingItem = null;
  BS.selectingTarget = false;
  BS.actionMenu = 'main';
  finishActorTurn();
}

function openBattle(enemyKeys, locationName){
  var overlay = document.getElementById('battle-overlay');
  if(!overlay) return;
  overlay.style.display = 'flex';
  // 依敵人套用戰鬥背景圖（找不到對應圖則用預設純色背景）
  var bossBg = null;
  (enemyKeys||[]).some(function(k){
    if(BOSS_BATTLE_BG[k]){ bossBg = BOSS_BATTLE_BG[k]; return true; }
    return false;
  });
  if(bossBg){
    overlay.style.background =
      'linear-gradient(rgba(7,9,15,0.55),rgba(7,9,15,0.78)), url(\''+bossBg+'\') center/cover no-repeat';
  } else {
    overlay.style.background = 'var(--bg)';
  }
  // 記錄 town-overlay 是否開啟中（方便戰鬥結束後恢復）
  var townOv = document.getElementById('town-overlay');
  if(townOv && townOv.style.display !== 'none'){
    townOv.dataset.wasOpen = 'true';
    townOv.style.display = 'none';
  }
  var rsOv = document.getElementById('redshield-overlay');
  if(rsOv){
    rsOv.dataset.wasOpen = 'true';
    rsOv.style.display = 'none';
  }
  if(BS && BS.atbInterval) clearInterval(BS.atbInterval);
  if(typeof BGM !== 'undefined'){ BGM.play(bgmForBattle(enemyKeys)); }
  initBattle(enemyKeys, locationName);
}

function closeBattleOverlay(){
  var overlay = document.getElementById('battle-overlay');
  if(overlay){ overlay.style.display = 'none'; overlay.style.background = 'var(--bg)'; }
  if(BS && BS.atbInterval){ clearInterval(BS.atbInterval); BS.atbInterval = null; }
  BS = null;
  if(typeof BATTLE_PARTY !== 'undefined'){ BATTLE_PARTY = null; }
  if(typeof BATTLE_ON_WIN !== 'undefined'){ BATTLE_ON_WIN = null; }
  document.querySelectorAll('.float-num,.limit-flash,.battle-start-overlay,.result-overlay').forEach(function(e){ e.remove(); });
  // 從城鎮觸發的戰鬥，結束後恢復 town-overlay
  var townOv = document.getElementById('town-overlay');
  if(townOv && townOv.dataset.wasOpen === 'true'){
    townOv.style.display = 'flex';
    townOv.dataset.wasOpen = '';
    // 重新綁定城鎮按鈕事件
    if(typeof bindTownButtons === 'function') bindTownButtons();
  }
  var rsOv = document.getElementById('redshield-overlay');
  if(rsOv && rsOv.dataset.wasOpen === 'true'){
    rsOv.style.display = 'flex';
    rsOv.dataset.wasOpen = '';
  }
  // 戰後恢復 BGM：回到城鎮或標題畫面皆播城鎮曲
  if(typeof BGM !== 'undefined'){
    BGM.play('town');
  }
}

var TILE_SIZE = 40;
var highlightedPath = [];

function buildMap(){
  var world = document.getElementById('map-world');
  world.innerHTML = '';
  world.style.width = (MAP_W * TILE_SIZE) + 'px';
  world.style.height = (MAP_H * TILE_SIZE) + 'px';

      div.id = 'tile_'+c+'_'+r;
      if(TILE_ICONS[t]) div.textContent = TILE_ICONS[t];

      // 點擊移動
      (function(cx,cy,passable){
        if(passable){
          div.addEventListener('click', function(){ onTileClick(cx,cy); });
        }
      })(c,r,TILE_PASSABLE[t]);

      row.appendChild(div);
    }
    world.appendChild(row);
  }

  // 物件層（NPC / 道具）
  OBJECTS.forEach(function(obj,idx){
    var sprite = document.createElement('div');
    sprite.className = 'npc-sprite';
    sprite.id = 'npc_'+idx;
    sprite.style.left = (obj.x * TILE_SIZE) + 'px';
    sprite.style.top  = (obj.y * TILE_SIZE) + 'px';

  player.id = 'player';

}

function updatePlayerPos(){

  player.style.left = (GS.player.x * TILE_SIZE) + 'px';
  player.style.top  = (GS.player.y * TILE_SIZE) + 'px';

}

function centerViewport(){
  var vp = document.getElementById('viewport');

  var vpW = vp.offsetWidth, vpH = vp.offsetHeight;

  var py = GS.player.y * TILE_SIZE + TILE_SIZE/2;

  var ty = Math.max(0, Math.min(py - vpH/2, MAP_H*TILE_SIZE - vpH));
  world.style.transform = 'translate(' + (-tx) + 'px,' + (-ty) + 'px)';
}

function updateMinimap(){

// ════════════════════════════════════════
// 尋路（簡單 BFS）
// ════════════════════════════════════════
function findPath(sx,sy,ex,ey){
  if(!TILE_PASSABLE[MAP_SHALLOI[ey]?MAP_SHALLOI[ey][ex]:0]) return null;

  var visited = {};
  var queue = [{x:sx,y:sy,path:[]}];
  visited[sx+','+sy] = true;
  var dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];

  while(queue.length > 0){
    var cur = queue.shift();
    if(cur.x===ex && cur.y===ey) return cur.path.concat([{x:ex,y:ey}]);

    for(var i=0;i<dirs.length;i++){
      var nx=cur.x+dirs[i].dx, ny=cur.y+dirs[i].dy;
      var key=nx+','+ny;
      if(visited[key]) continue;
      if(ny<0||ny>=MAP_H||nx<0||nx>=MAP_W) continue;
      if(!TILE_PASSABLE[MAP_SHALLOI[ny][nx]]) continue;
      // 不穿越 NPC 位置（但門可走）
      visited[key]=true;
      queue.push({x:nx,y:ny,path:cur.path.concat([{x:cur.x,y:cur.y}])});
    }
  }
  return null;
}

// ════════════════════════════════════════
// 移動系統
// ════════════════════════════════════════
function onTileClick(x,y){
  if(GS.dialog) return; // 對話中不能移動
  if(GS.moving) stopMoving();

  var path = findPath(GS.player.x, GS.player.y, x, y);
  if(!path || path.length===0) return;

  // 顯示路徑高亮
  clearPathHighlight();
  highlightedPath = path;
  path.forEach(function(p){
    var tile = document.getElementById('tile_'+p.x+'_'+p.y);
    if(tile) tile.classList.add('path-highlight');
  });

  GS.movePath = path.slice(1); // 排除起點
  GS.moving = true;
  moveStep();
}

function moveStep(){
  if(!GS.moving || GS.movePath.length===0){
    GS.moving = false;
    clearPathHighlight();
    checkInteractable();
    return;
  }

  var next = GS.movePath.shift();
  GS.player.x = next.x;
  GS.player.y = next.y;
  GS.steps++;
  updatePlayerPos();

  // 步行動畫點
  var dot = document.createElement('div');
  dot.className = 'step-dot';
  dot.style.left = (next.x * TILE_SIZE + 17) + 'px';
  dot.style.top  = (next.y * TILE_SIZE + 17) + 'px';
  document.getElementById('map-world').appendChild(dot);
  setTimeout(function(){ if(dot.parentNode) dot.remove(); }, 600);

  centerViewport();

  // 隨機遭遇
  if(checkEncounter()) return;

  // 門觸發
  var tile = MAP_SHALLOI[GS.player.y][GS.player.x];
  if(tile === TILE_DOOR){
    GS.moving = false;
    clearPathHighlight();
    return;
  }

  setTimeout(moveStep, 140);
}

function stopMoving(){
  GS.moving = false;
  GS.movePath = [];
  clearPathHighlight();
}

function clearPathHighlight(){
  highlightedPath.forEach(function(p){
    var tile = document.getElementById('tile_'+p.x+'_'+p.y);
    if(tile) tile.classList.remove('path-highlight');
  });
  highlightedPath = [];
}

// ── 近距離可互動檢查 ──
function checkInteractable(){
  var px=GS.player.x, py=GS.player.y;
  OBJECTS.forEach(function(obj,idx){
    var dx=Math.abs(obj.x-px), dy=Math.abs(obj.y-py);
    if(dx+dy <= 1){
      showInteractHint(obj.x,obj.y,obj.name);
    }
  });
}

function showInteractHint(x,y,name){
  var old = document.getElementById('interact-hint');
  if(old) old.remove();
  var hint = document.createElement('div');
  hint.className = 'interact-hint';
  hint.id = 'interact-hint';
  hint.textContent = '▲ ' + name;
  hint.style.left = (x * TILE_SIZE - 10) + 'px';
  hint.style.top  = (y * TILE_SIZE - 24) + 'px';
  document.getElementById('map-world').appendChild(hint);
  setTimeout(function(){ if(hint.parentNode) hint.remove(); }, 2000);
}

// ════════════════════════════════════════
// NPC 互動
// ════════════════════════════════════════
function onNpcClick(idx){
  if(GS.dialog) return;
  var obj = OBJECTS[idx];
  var px=GS.player.x, py=GS.player.y;
  var dx=Math.abs(obj.x-px), dy=Math.abs(obj.y-py);

  if(dx+dy > 2){
    // 先走過去
    var path = findPath(px,py,obj.x,obj.y-1);
    if(!path) path = findPath(px,py,obj.x-1,obj.y);
    if(!path) path = findPath(px,py,obj.x+1,obj.y);
    if(path){
      GS.movePath = path.slice(1);
      GS.moving = true;
      // 走到旁邊後觸發對話
      var origMoveStep = GS.movePath.length;
      var checkArrival = setInterval(function(){
        if(!GS.moving){
          clearInterval(checkArrival);
          startDialog(obj, null);
        }
      }, 100);
      moveStep();
      return;
    }
  }
  startDialog(obj, null);

function startDialog(obj, branchKey){
  stopMoving();
  var rawLines = branchKey && obj.dialogBranch && obj.dialogBranch[branchKey]
    ? obj.dialogBranch[branchKey]
    : (obj.dialog || []);
  if(!rawLines || rawLines.length === 0) return;

  var lines = rawLines.map(function(l){
    return {
      speaker:      l.speaker || obj.name,
      ico:          l.ico || obj.ico,
      acc:          l.acc || obj.acc || 'var(--text2)',
      text:         l.text || '',
      choices:      l.choices || null,
      triggerBattle:l.triggerBattle || null,
    };
  });

  GS.dialog = true;
  openDialog(lines, function(){ GS.dialog = false; });
}

function endDialog(){
  // 先恢復場景（最優先，避免後面報錯導致場景卡暗）
  var scene = document.getElementById('town-scene');
  if(scene){ scene.style.opacity='1'; scene.style.pointerEvents=''; }
  var townOv = document.getElementById('town-overlay');
  if(townOv) townOv.style.pointerEvents = 'all';
  // 移除對話相關元素
  ['active-dialog','dlg-continue-btn','choices-overlay'].forEach(function(id){
    var el = document.getElementById(id);
    if(el && el.parentNode) el.parentNode.removeChild(el);
  });
  GS.dialog = false;
  GS.dialogCooldown = true;
  setTimeout(function(){ GS.dialogCooldown = false; }, 400);
  if(typeof DLG !== 'undefined'){
    DLG.active = false;
    if(DLG.timer){ clearInterval(DLG.timer); DLG.timer = null; }
  }
  var fn = DLG && DLG.onEnd ? DLG.onEnd : null;
  if(DLG) DLG.onEnd = null;
  if(fn){ try { fn(); } catch(e){} }
}</script>

var GEAR_UID = 0;
var GEAR_SUB_TYPES = ['crit','critdmg','lifesteal','instakill','confuse','poison','counter'];
function rarityClassOf(rar){ return rar==='red' ? 'rarity-red' : (rar==='blue' ? 'rarity-blue' : 'rarity-white'); }
function rollGearSub(rar){
  var t = GEAR_SUB_TYPES[Math.floor(Math.random()*GEAR_SUB_TYPES.length)];
  var lo, hi;
  if(rar==='red'){ lo=16; hi=25; } else if(rar==='blue'){ lo=9; hi=15; } else { lo=1; hi=8; }
  var pctInt = lo + Math.floor(Math.random()*(hi-lo+1));
  return {type:t, pct:pctInt/100};
}
function makeGearItem(equipsId, rar, withSub){
  var base = (typeof EQUIPS !== 'undefined') ? EQUIPS[equipsId] : null;
  if(!base) return null;
  GEAR_UID++;
  var it = {
    id: equipsId + '_g' + GEAR_UID,
    t: base.slot, name: base.name, ico: base.ico, slot: base.slot,
    str: base.str||0, mag: base.mag||0, def: base.def||0, spd: base.spd||0, hp: base.hp||0, mp: base.mp||0,
    rar: rar, r: rarityClassOf(rar)
  };
  if(withSub) it.sub = rollGearSub(rar);
  return it;
}
function activeCharKey(){
  if(typeof CHARS !== 'undefined' && typeof curChar !== 'undefined' && CHARS[curChar]) return CHARS[curChar].key;
  return 'anei';
}
function grantEquipToChar(charKey, item){
  if(!item) return false;
  var c = (typeof findCharByKey === 'function') ? findCharByKey(charKey) : null;
  if(!c && typeof CHARS !== 'undefined' && CHARS.length) c = CHARS[0];
  if(!c || !c.inventory) return false;
  c.inventory.push(item);
  return true;
}
// 依 EQUIPS 定義中固定的 sub 屬性產生裝備（boss專屬掉落用，不隨機）
function makeFixedGearItem(equipsId, rar){
  var base = (typeof EQUIPS !== 'undefined') ? EQUIPS[equipsId] : null;
  if(!base) return null;
  GEAR_UID++;
  var it = {
    id: equipsId + '_g' + GEAR_UID,
    t: base.slot, name: base.name, ico: base.ico, slot: base.slot,
    str: base.str||0, mag: base.mag||0, def: base.def||0, spd: base.spd||0, hp: base.hp||0, mp: base.mp||0,
    rar: rar, r: rarityClassOf(rar)
  };
  if(base.sub) it.sub = base.sub;
  return it;
}

function checkRankUp(){
  if(typeof STORY==='undefined') return;
  var idx = RANK_ORDER.indexOf(STORY.advRank||'E');
  if(idx<0) idx=0;
  if(idx>=RANK_ORDER.length-1) return;
  var need = RANK_THRESHOLDS[RANK_ORDER[idx]];
  if(need && STORY.advPoints>=need){
    STORY.advPoints -= need;
    var oldRank = RANK_ORDER[idx];
    STORY.advRank = RANK_ORDER[idx+1];
    if(typeof showToast==='function') showToast('🎉 冒險者等級提升！'+oldRank+' → '+STORY.advRank, 'success');
  }
}

function questWinCallback(q){
  if(typeof PLAYER!=='undefined'){ PLAYER.gil = (PLAYER.gil||0) + (q.reward.gil||0); }
  var gotGear = null;
  if(q.reward.gearTier && typeof rollGearDrop==='function' && typeof grantEquipToChar==='function' && typeof activeCharKey==='function'){
    gotGear = rollGearDrop(q.reward.gearTier);
    if(gotGear) grantEquipToChar(activeCharKey(), gotGear);
  }
  if(typeof STORY!=='undefined'){
    STORY.advPoints = (STORY.advPoints||0) + (q.points||0);
    checkRankUp();
  }
  var msg = '委託完成！+' + (q.reward.gil||0) + ' Gil';
  if(gotGear) msg += '，獲得 ' + gotGear.name;
  if(typeof showToast==='function') showToast(msg, 'success');
  if(typeof saveGame==='function') saveGame();
}

function acceptQuest(qid){
  var q = null;
  for(var r in QUEST_DEFS){ QUEST_DEFS[r].forEach(function(qq){ if(qq.id===qid) q = qq; }); }
  if(!q) return;
  var qb = document.getElementById('quest-board-overlay');
  if(qb && qb.parentNode) qb.parentNode.removeChild(qb);
  if(typeof BATTLE_PARTY !== 'undefined'){ BATTLE_PARTY = null; }
  if(typeof BATTLE_ON_WIN !== 'undefined'){ BATTLE_ON_WIN = function(){ questWinCallback(q); }; }
  setTimeout(function(){ triggerBattle(q.enemies); }, 200);
}

function openQuestBoard(){
  var old = document.getElementById('quest-board-overlay');
  if(old && old.parentNode) old.parentNode.removeChild(old);

  var rank = (typeof STORY!=='undefined' && STORY.advRank) ? STORY.advRank : 'E';
  var pts = (typeof STORY!=='undefined') ? (STORY.advPoints||0) : 0;
  var rankIdx = RANK_ORDER.indexOf(rank); if(rankIdx<0) rankIdx=0;
  var need = RANK_THRESHOLDS[rank] || null;
  var gearLabel = {white:'白',blue:'藍',red:'紅'};

  var ov = document.createElement('div');
  ov.id = 'quest-board-overlay';
  ov.setAttribute('style',
    'position:fixed;top:0;left:0;right:0;bottom:0;z-index:850;background:rgba(6,8,14,0.97);' +
    'display:flex;flex-direction:column;overflow-y:auto;opacity:0;transition:opacity 0.25s ease;');

  var head = document.createElement('div');
  head.setAttribute('style','padding:26px 20px 14px;text-align:center;border-bottom:1px solid rgba(200,168,74,0.25);flex-shrink:0;');
  head.innerHTML =
    '<div style="font-family:Cinzel,\'Noto Serif TC\',serif;font-size:14px;letter-spacing:4px;color:var(--gold)">委託公告板</div>' +
    '<div style="margin-top:8px;font-size:12px;color:#cfd6ee">冒險者等級 <b style="color:var(--gold)">' + rank + '</b>' +
    (need ? ('　進度 ' + pts + ' / ' + need) : '　已達最高等級') + '</div>';
  ov.appendChild(head);

  var body = document.createElement('div');
  body.setAttribute('style','flex:1;padding:16px;');

  RANK_ORDER.forEach(function(r){
    var list = QUEST_DEFS[r] || [];
    if(!list.length) return;
    var ridx = RANK_ORDER.indexOf(r);
    var locked = ridx > rankIdx;
    var sec = document.createElement('div');
    sec.setAttribute('style','margin-bottom:18px;');
    var secHead = document.createElement('div');
    secHead.setAttribute('style','font-size:11px;letter-spacing:2px;margin-bottom:8px;color:' + (locked?'#666':'var(--gold)'));
    secHead.textContent = r + ' 級委託' + (locked?'（尚未開放）':'');
    sec.appendChild(secHead);
    list.forEach(function(q){
      var card = document.createElement('div');
      card.setAttribute('style',
        'border:1px solid ' + (locked?'rgba(120,120,120,0.3)':'rgba(200,168,74,0.4)') + ';border-radius:8px;' +
        'padding:14px 16px;margin-bottom:10px;background:rgba(255,255,255,0.02);' +
        (locked ? 'opacity:0.45;' : 'cursor:pointer;'));
      var rewardTxt = (q.reward.gil||0) + ' Gil' + (q.reward.gearTier ? ('　＋' + (gearLabel[q.reward.gearTier]||'') + '裝') : '');
      card.innerHTML =
        '<div style="font-size:13px;color:#e7d9a8;margin-bottom:4px">' + q.title + '</div>' +
        '<div style="font-size:11px;color:#aab4d8;margin-bottom:6px">' + q.desc + '</div>' +
        '<div style="font-size:10px;color:#8a93b8">敵方 ' + q.enemies.length + ' 名　獎勵：' + rewardTxt + '　貢獻 +' + q.points + '</div>';
      if(!locked){
        card.addEventListener('click', function(){ acceptQuest(q.id); });
      }
      sec.appendChild(card);
    });
    body.appendChild(sec);
  });
  ov.appendChild(body);

  var back = document.createElement('div');
  back.textContent = '返回';
  back.setAttribute('style',
    'text-align:center;cursor:pointer;padding:14px 0;margin:0 16px 24px;border-radius:6px;' +
    'border:1px solid rgba(112,128,176,0.5);color:#ccd4f0;font-family:"Noto Serif TC",serif;' +
    'font-size:13px;letter-spacing:3px;flex-shrink:0;');
  back.addEventListener('click', function(){
    var o = document.getElementById('quest-board-overlay');
    if(o && o.parentNode) o.parentNode.removeChild(o);
  });
  ov.appendChild(back);

  document.body.appendChild(ov);
  setTimeout(function(){ ov.style.opacity = '1'; }, 20);
}

function rollAndGrantGearDrops(){
  var got = [];
  if(typeof BS === 'undefined' || !BS || !BS.enemies) return got;
  var key = activeCharKey();
  // 幸運體質（lk_p4）：獲得道具機率+15%
  var itemRateMult = 1;
  if(typeof hasPassive==='function' && BS.party && BS.party.some(function(p){ return p.alive && hasPassive(p.key,'lk_p4'); })){
    itemRateMult = 1.15;
  }
  BS.enemies.forEach(function(e){
    var ds = e.drops || [];
    ds.forEach(function(d){
      if(!d.gearTier) return;
      if(Math.random() <= d.rate * itemRateMult){
        var g = rollGearDrop(d.gearTier);
        if(g){ grantEquipToChar(key, g); got.push(g); }
      }
    });
  });
  return got;
}

// ════════════════════════════════════════
var SAVE_KEY = 'genba_save_v1';

function buildSaveData(){
  var party = [];
  if(typeof PARTY_STATE !== 'undefined' && PARTY_STATE){
    for(var i=0;i<PARTY_STATE.length;i++){
      var st = PARTY_STATE[i];
      party.push({ key:st.key, lv:st.lv, exp:st.exp, expNext:st.expNext, hp:st.hp, mp:st.mp, rb:st.rb });
    }
  }
  var chars = {};
  if(typeof CHARS !== 'undefined'){
    for(var ci=0; ci<CHARS.length; ci++){
      var cc = CHARS[ci];
      var traitUnlocked = {};
      if(cc.traitPool){
        for(var ti=0; ti<cc.traitPool.length; ti++){
          var trc = cc.traitPool[ti];
          traitUnlocked[trc.id] = {unlocked:!!trc.unlocked, level:trc.level||0};
        }
      }
      chars[cc.key] = {
        inventory: cc.inventory || [],
        equippedEquip: cc.equippedEquip || [],
        unlocked: (cc.unlocked === false) ? false : true,
        sp: cc.sp || 0,
        equippedActive: cc.equippedActive || [],
        equippedRB: cc.equippedRB || [],
        equippedPassive: cc.equippedPassive || [],
        equippedTraits: cc.equippedTraits || [],
        traitUnlocked: traitUnlocked
      };
    }
  }
  return {
    v: 2,
    ts: Date.now(),
    party: party,
    gil: (typeof PLAYER !== 'undefined' && PLAYER) ? (PLAYER.gil||0) : 0,
    bag:  (typeof PLAYER !== 'undefined' && PLAYER && PLAYER.bag) ? PLAYER.bag : [],
    story: (typeof STORY !== 'undefined') ? STORY : null,
    chars: chars,
    gearUid: (typeof GEAR_UID !== 'undefined') ? GEAR_UID : 0
  };
}

function applySaveData(data){
  if(!data) return false;
  if(data.party && typeof PARTY_STATE !== 'undefined' && PARTY_STATE){
    for(var i=0;i<data.party.length;i++){
      var sv = data.party[i];
      var st = getPartyState(sv.key);
      if(!st) continue;
      if(typeof sv.lv==='number')      st.lv = sv.lv;
      if(typeof sv.exp==='number')     st.exp = sv.exp;
      if(typeof expNeeded === 'function'){ st.expNext = expNeeded(st.lv); }
      else if(typeof sv.expNext==='number') st.expNext = sv.expNext;
      if(typeof sv.hp==='number')      st.hp = sv.hp;
      if(typeof sv.mp==='number')      st.mp = sv.mp;
      if(typeof sv.rb==='number')      st.rb = sv.rb;
    }
  }
  if(typeof PLAYER !== 'undefined' && PLAYER){
    if(typeof data.gil === 'number') PLAYER.gil = data.gil;
    if(data.bag && data.bag.length !== undefined) PLAYER.bag = data.bag;
  }
  if(data.story && typeof STORY !== 'undefined'){
    for(var sk in data.story){ if(data.story.hasOwnProperty(sk) && STORY.hasOwnProperty(sk)){ STORY[sk] = data.story[sk]; } }
  }
  if(data.chars && typeof findCharByKey === 'function'){
    for(var ckey in data.chars){
      if(!data.chars.hasOwnProperty(ckey)) continue;
      var cc2 = findCharByKey(ckey);
      if(!cc2) continue;
      var sv2 = data.chars[ckey];
      if(sv2.inventory) cc2.inventory = sv2.inventory;
      if(sv2.equippedEquip) cc2.equippedEquip = sv2.equippedEquip;
      if(typeof sv2.unlocked === 'boolean') cc2.unlocked = sv2.unlocked;
      if(typeof sv2.sp === 'number') cc2.sp = sv2.sp;
      if(sv2.equippedActive) cc2.equippedActive = sv2.equippedActive;
      if(sv2.equippedRB) cc2.equippedRB = sv2.equippedRB;
      if(sv2.equippedPassive) cc2.equippedPassive = sv2.equippedPassive;
      if(sv2.equippedTraits) cc2.equippedTraits = sv2.equippedTraits;
      if(sv2.traitUnlocked && cc2.traitPool){
        for(var ti2=0; ti2<cc2.traitPool.length; ti2++){
          var trc2 = cc2.traitPool[ti2];
          if(Object.prototype.hasOwnProperty.call(sv2.traitUnlocked, trc2.id)){
            var sv_tr=sv2.traitUnlocked[trc2.id];
            if(typeof sv_tr==='object'&&sv_tr!==null){
              trc2.unlocked=!!sv_tr.unlocked; trc2.level=sv_tr.level||0;
            } else {
              trc2.unlocked=!!sv_tr; trc2.level=sv_tr?1:0;
            }
          }
        }
      }
    }
  }
  if(typeof data.gearUid === 'number' && typeof GEAR_UID !== 'undefined' && data.gearUid > GEAR_UID){ GEAR_UID = data.gearUid; }
  if(typeof renderTabs === 'function'){ try { renderTabs(); } catch(e){} }
  return true;
}

var SAVE_SLOTS = ['genba_slot_1','genba_slot_2','genba_slot_3'];

function writeSlot(key, showMsg){
  try {
    localStorage.setItem(key, JSON.stringify(buildSaveData()));
    if(showMsg && typeof showToast === 'function') showToast('已存檔', 'success');
    return true;
  } catch(e){
    if(showMsg && typeof showToast === 'function') showToast('存檔失敗（瀏覽器限制）', 'error');
    return false;
  }
}
function readSlot(key){
  var raw=null;
  try { raw = localStorage.getItem(key); } catch(e){ return false; }
  if(!raw) return false;
  var data;
  try { data = JSON.parse(raw); } catch(e){ return false; }
  return applySaveData(data);
}
function slotMeta(key){
  try {
    var raw = localStorage.getItem(key);
    if(!raw) return null;
    var d = JSON.parse(raw);
    var lv = 0;
    if(d.party){ for(var i=0;i<d.party.length;i++){ if(d.party[i].key==='anei'){ lv=d.party[i].lv; break; } } }
    return { ts: d.ts||0, gil: d.gil||0, lv: lv };
  } catch(e){ return null; }
}

function saveGame(showMsg){ return writeSlot(SAVE_KEY, showMsg); }
function hasSave(){ try { return !!localStorage.getItem(SAVE_KEY); } catch(e){ return false; } }
function loadGame(){ return readSlot(SAVE_KEY); }

var DLG = {active:false, lines:[], idx:0, typing:false, timer:null, onEnd:null, branches:{}};

function openDialog(lines, onEnd, branches){
  DLG.active = true;
  DLG.lines = lines;
  DLG.idx = 0;
  DLG.onEnd = onEnd || null;
  DLG.branches = branches || {};

  // 移除舊的
  var old = document.getElementById('active-dialog');
  if(old && old.parentNode) old.parentNode.removeChild(old);
  var oldBtn = document.getElementById('dlg-continue-btn');
  if(oldBtn && oldBtn.parentNode) oldBtn.parentNode.removeChild(oldBtn);

  // 建立對話框
  var dlg = document.createElement('div');
  dlg.id = 'active-dialog';
  dlg.style.cssText =
    'position:fixed;left:0;right:0;bottom:0;z-index:1000;' +
    'background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.99));' +
    'border-top:1px solid #28366a;padding-bottom:20px;';
  // 內容區：頭像 + 文字
  var inner = document.createElement('div');
  inner.id = 'dialog-inner';
  inner.style.cssText = 'display:flex;align-items:flex-start;padding:14px 16px;min-height:70px;';
  dlg.appendChild(inner);
  // footer：點擊繼續
  var footer = document.createElement('div');
  footer.id = 'dialog-footer';
  footer.style.cssText = 'display:none;text-align:right;padding:4px 16px 12px;';
  footer.innerHTML = '<span style="font-size:11px;color:rgba(112,128,176,.8);letter-spacing:2px;">點擊繼續 ▶</span>';
  dlg.appendChild(footer);
  document.body.appendChild(dlg);

  // 整個對話框點擊 = 繼續
  dlg.style.cursor = 'pointer';
  dlg.addEventListener('click', function(e){
    if(e.target.classList && e.target.classList.contains('dialog-choice')) return;
    var p = e.target;
    while(p && p !== dlg){
      if(p.classList && p.classList.contains('dialog-choice')) return;
      p = p.parentNode;
    }
    dialogNext();
  });

  // 淡化場景
  var scene = document.getElementById('town-scene');
  if(scene){ scene.style.opacity='0.25'; scene.style.pointerEvents='none'; }
  showLine(0);
}


function endDialog(){
  // 先恢復場景（最優先，避免後面報錯導致場景卡暗）
  var scene = document.getElementById('town-scene');
  if(scene){ scene.style.opacity='1'; scene.style.pointerEvents=''; }
  var townOv = document.getElementById('town-overlay');
  if(townOv) townOv.style.pointerEvents = 'all';
  // 移除對話相關元素
  ['active-dialog','dlg-continue-btn','choices-overlay'].forEach(function(id){
    var el = document.getElementById(id);
    if(el && el.parentNode) el.parentNode.removeChild(el);
  });
  GS.dialog = false;
  GS.dialogCooldown = true;
  setTimeout(function(){ GS.dialogCooldown = false; }, 400);
  if(typeof DLG !== 'undefined'){
    DLG.active = false;
    if(DLG.timer){ clearInterval(DLG.timer); DLG.timer = null; }
  }
  var fn = DLG && DLG.onEnd ? DLG.onEnd : null;
  if(DLG) DLG.onEnd = null;
  if(fn){ try { fn(); } catch(e){} }
}


function showChoicesOverlay(choices, line){
  var old = document.getElementById('choices-overlay');
  if(old) old.remove();

var SPEAKER_FACE = {'月華':'yuehua','傑特':'jett'};

function showLine(idx){
  if(idx >= DLG.lines.length){
    var branchEndCb = DLG.activeBranchEnd || null;
    DLG.activeBranchEnd = null;
    if(branchEndCb && typeof branchEndCb === 'function'){
      endDialog();
      setTimeout(branchEndCb, 200);
    } else {
      endDialog();
    }
    return;
  }
  DLG.idx = idx;
  var line = DLG.lines[idx];
  // triggerBattle 處理
  if(line.triggerBattle){
    endDialog();
    if(typeof BATTLE_PARTY !== 'undefined'){ BATTLE_PARTY = line.battleParty || null; }
    if(typeof BATTLE_ON_WIN !== 'undefined'){ BATTLE_ON_WIN = line.onWin || null; }
    setTimeout(function(){ triggerBattle(line.triggerBattle); }, 200);
    return;
  }
  var acc = line.acc || 'var(--text2)';

  var inner = document.getElementById('dialog-inner');
  if(inner){
    var faceKey = line.face || SPEAKER_FACE[line.speaker] || '';
    var faceFile = FACE_MAP[faceKey] || '';
    var avatarHtml = '';
    if(faceFile){
      avatarHtml =
        '<div style="flex-shrink:0;width:64px;margin-right:10px;">' +
          '<img src="https://wiml0718-commits.github.io/genba-chronicles-assets/' + faceFile + '" ' +
          'style="width:64px;height:64px;object-fit:cover;object-position:top;border-radius:8px;border:2px solid ' + acc + ';" />' +
          '<div style="font-size:10px;margin-top:4px;color:' + acc + ';text-align:center;">' + (line.speaker||'') + '</div>' +
        '</div>';
    } else {
      avatarHtml =
        '<div style="flex-shrink:0;width:64px;text-align:center;margin-right:10px;">' +
          '<div style="font-size:34px;line-height:1;">' + (line.ico||'💬') + '</div>' +
          '<div style="font-size:10px;margin-top:4px;color:' + acc + ';">' + (line.speaker||'') + '</div>' +
        '</div>';
    }
    inner.innerHTML =
      avatarHtml +
      '<div style="flex:1;padding-top:2px;">' +
        '<div style="font-size:12px;font-weight:bold;margin-bottom:6px;color:' + acc + ';letter-spacing:1px;">' + (line.speaker||'') + '</div>' +
        '<div style="font-size:15px;line-height:1.6;color:#ccd4f0;">' + (line.text||'') + '</div>' +
      '</div>';
  }

  var footer = document.getElementById('dialog-footer');

  // 強制 active-dialog 可見
  var adlg = document.getElementById('active-dialog');
  if(adlg){
    adlg.style.display = 'block';
    adlg.style.position = 'fixed';
    adlg.style.left = '0';
    adlg.style.right = '0';
    adlg.style.bottom = '0';
    adlg.style.zIndex = '1000';
  }

  DLG.typing = false;
  if(line.choices && line.choices.length > 0){
    if(footer) footer.style.display = 'none';
    showChoicesOverlay(line.choices, line);
  } else {
    if(footer) footer.style.display = 'block';
  }
}

function typeText(text, onDone){
  var el = document.getElementById('dlg-text');
  if(!el){
    if(onDone) onDone();
    return;
  }
  DLG.typing = false;
  el.innerHTML = text + '<span class="dialog-cursor"></span>';
  if(onDone) onDone();
}

function dialogNext(){
  if(DLG.typing){
    // 打字中：立刻完成打字，然後直接前進
    clearInterval(DLG.timer);
    DLG.typing = false;
    var line = DLG.lines[DLG.idx];
    var el = document.getElementById('dlg-text');
    if(el) el.innerHTML = line.text + '<span class="dialog-cursor"></span>';
    if(line.choices && line.choices.length > 0){
      // 有選項：顯示選項，不前進
      var footer = document.getElementById('dialog-footer');
      if(footer) footer.style.display = 'none';
      var dlgEl = document.getElementById('dlg-text');
      if(dlgEl){
        var div = document.createElement('div');
        div.className = 'dialog-choices';
        line.choices.forEach(function(c){
          var btn = document.createElement('button');
          btn.className = 'dialog-choice';
          btn.textContent = c.text;
          (function(action){
            function doAct(e){
              e.preventDefault();
              e.stopImmediatePropagation();
              btn.removeEventListener('touchstart', doAct);
              btn.removeEventListener('click', doAct);
              if(action) action();
              else endDialog();
            }
            btn.addEventListener('touchstart', doAct, {passive:false});
            btn.addEventListener('click', doAct);
          })(c.action);
          div.appendChild(btn);
        });
        dlgEl.appendChild(div);
      }
    } else {
      // 沒有選項：直接前進到下一行
      showLine(DLG.idx + 1);
    }
    return;
  }
  showLine(DLG.idx + 1);
}

// endDialog → 由城鎮橋接版本統一處理

function onBackdropTap(){ if(!DLG.active) return; dialogNext(); }

var SHOP = {current:null, tab:'buy', filter:'all'};

function openShop(shopKey){
  var shop = SHOP_STOCK[shopKey];
  if(!shop) return;
  SHOP.current = shopKey;
  SHOP.tab = 'buy';
  SHOP.filter = 'all';
  showShopScreen(shop);
}

function showShopScreen(shop){
  // 確保對話框已關閉
  var activeDlg = document.getElementById('active-dialog');
  if(activeDlg && activeDlg.parentNode) activeDlg.parentNode.removeChild(activeDlg);
  var cb = document.getElementById('dlg-continue-btn');
  if(cb && cb.parentNode) cb.parentNode.removeChild(cb);
  if(typeof DLG !== 'undefined'){ DLG.active = false; }
  // 恢復地圖淡化
  var vp = document.getElementById('viewport');
  var mm = document.getElementById('minimap');
  if(vp){ vp.style.opacity='1'; vp.style.pointerEvents=''; }
  if(mm) mm.style.opacity='1';
  // town-overlay 恢復 pointer-events
  var townOv = document.getElementById('town-overlay');
  if(townOv) townOv.style.pointerEvents = 'all';

  var shopEl = document.getElementById('shop-screen');
  if(!shopEl) return;

  // 把 shop-screen 移到 body（確保在最頂層，不受 town-overlay stacking context 影響）
  document.body.appendChild(shopEl);
  shopEl.setAttribute('style',
    'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;' +
    'z-index:700;flex-direction:column;background:var(--bg);');

  // 設商店資訊
  document.getElementById('shop-ico').textContent = shop.ico;
  document.getElementById('shop-name').textContent = shop.name;
  document.getElementById('shop-sub').textContent = shop.sub;
  var _restTab = document.getElementById('tab-rest-btn');
  if(_restTab) _restTab.style.display = shop.rest ? '' : 'none';
  updateGilDisplay();
  switchTab('buy');
  bindShopButtons();
}

function bindShopButtons(){
  var tabBuy = document.getElementById('tab-buy-btn');
  if(tabBuy){ tabBuy.onclick = function(){ switchTab('buy'); }; }
  var tabSell = document.getElementById('tab-sell-btn');
  if(tabSell){ tabSell.onclick = function(){ switchTab('sell'); }; }
  var tabBag = document.getElementById('tab-bag-btn');
  if(tabBag){ tabBag.onclick = function(){ switchTab('bag'); }; }
  var tabRest = document.getElementById('tab-rest-btn');
  if(tabRest){ tabRest.onclick = function(){ switchTab('rest'); }; }
  var closeBtn = document.getElementById('close-shop-btn');
  if(closeBtn){ closeBtn.onclick = closeShop; }
}

function closeShop(){
  var shopEl = document.getElementById('shop-screen');
  if(shopEl){
    shopEl.setAttribute('style','display:none;');
    shopEl.classList.remove('visible');
    // 移回 town-overlay
    var townOv = document.getElementById('town-overlay');
    if(townOv) townOv.appendChild(shopEl);
  }
  SHOP.current = null;
}

function switchTab(tab){
  SHOP.tab = tab;
  SHOP.filter = 'all';
  document.querySelectorAll('.shop-tab').forEach(function(b){ b.classList.remove('active'); });
  var tabEl = document.getElementById('tab-'+tab+'-btn') || document.getElementById('tab-'+tab);
  if(tabEl) tabEl.classList.add('active');
  renderShopList();
}

var REST_COST = 300;
function renderRestPanel(list, shop){
  list.innerHTML =
    '<div style="padding:20px 16px;text-align:center;">' +
      '<div style="font-size:40px;margin-bottom:10px;">🛏️</div>' +
      '<div style="font-size:13px;color:var(--text);letter-spacing:1px;margin-bottom:6px;">住宿一晚</div>' +
      '<div style="font-size:10px;color:var(--text2);line-height:1.6;margin-bottom:18px;">恢復全隊 HP / MP（RB 保留不變）</div>' +
      '<button id="rest-btn" class="result-btn" style="width:80%;max-width:240px;margin:0 auto;">住宿　—　' + REST_COST + ' Gil</button>' +
    '</div>';
  var rb = document.getElementById('rest-btn');
  if(rb) rb.onclick = doRest;
}
function doRest(){
  if(typeof PLAYER==='undefined'){ return; }
  if((PLAYER.gil||0) < REST_COST){ showToast('Gil 不足！', 'error'); return; }
  PLAYER.gil -= REST_COST;
  if(typeof PARTY_STATE !== 'undefined' && typeof PARTY_DEF !== 'undefined'){
    PARTY_STATE.forEach(function(st){
      var def = PARTY_DEF.find(function(d){ return d.key===st.key; });
      if(!def) return;
      var eqb = (typeof getEquipBonus === 'function') ? getEquipBonus(st.key) : {hp:0,mp:0};
      st.hp = maxHpFor(def, st) + (eqb.hp||0);
      st.mp = maxMpFor(def, st) + (eqb.mp||0);
    });
  }
  updateGilDisplay();
  showToast('好好休息了一晚 — 全隊 HP / MP 已恢復', 'success');
  renderShopList();
  if(typeof saveGame==='function') saveGame();
}
function renderShopList(){
  var list = document.getElementById('shop-list');
  var shop = SHOP_STOCK[SHOP.current];
  if(!shop){ list.innerHTML=''; return; }

  list.innerHTML = '';

  if(SHOP.tab === 'buy'){
    renderBuyList(list, shop);
  } else if(SHOP.tab === 'sell'){
    renderSellList(list);
  } else if(SHOP.tab === 'rest'){
    renderRestPanel(list, shop);
  } else {
    renderBagList(list);
  }

  updateFooter();
}

function renderBuyList(list, shop){
  var allItems = shop.items.map(function(id){
    return {id:id, data:ITEMS[id], isEquip:false};
  }).concat(shop.equips.map(function(id){
    return {id:id, data:EQUIPS[id], isEquip:true};
