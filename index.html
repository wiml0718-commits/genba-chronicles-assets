<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>幻刃紀 v3 — 角色面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--panel:#0b0e1c;--panel2:#10152a;
  --border:#1c2540;--border2:#28366a;
  --gold:#c8a84a;--gold-l:#e8cc80;--gold-d:#7a6020;
  --text:#ccd4f0;--text2:#7080b0;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Noto Serif TC',serif;color:var(--text);}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;}
.app::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(74,100,200,.07),transparent 60%),var(--bg);
  pointer-events:none;z-index:0;}
.app::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(28,37,64,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(28,37,64,.3) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}

/* TOP */
.topbar{position:relative;z-index:10;background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.95));
  border-bottom:1px solid var(--border2);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 18px rgba(0,0,0,.6);}
.topbar-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 14px rgba(200,168,74,.5);}
.topbar-page{font-size:10px;color:var(--text2);letter-spacing:2px;}

/* CHAR TABS */
.char-tabs{position:relative;z-index:10;display:flex;background:rgba(11,14,28,.92);border-bottom:1px solid var(--border);padding:0 10px;gap:4px;}
.char-tab{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;}
.char-tab.active{border-bottom-color:var(--gold);}
.tab-av{width:46px;height:46px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border2);transition:all .2s;background:#0a0d1a;}
.char-tab.active .tab-av{border-color:var(--gold);box-shadow:0 0 14px rgba(200,168,74,.35);}
.tab-av img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.tab-name{font-size:9px;color:var(--text2);letter-spacing:1px;transition:color .2s;}
.char-tab.active .tab-name{color:var(--gold-l);}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;scrollbar-width:none;}
.main::-webkit-scrollbar{display:none;}
.page-in{animation:pageIn .3s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── STATUS PAGE ── */
.status-wrap{padding:12px 12px 20px;display:flex;flex-direction:column;gap:12px;}

/* Hero card: face LEFT, info RIGHT */
.hero-card{display:flex;background:var(--panel);border:1px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.5);}
.hero-face{width:130px;flex-shrink:0;position:relative;overflow:hidden;background:#070a14;min-height:180px;}
.hero-face img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-face::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--panel));pointer-events:none;}
.hero-info{flex:1;padding:12px 12px 10px;display:flex;flex-direction:column;gap:7px;min-width:0;}
.hero-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:2px;line-height:1;}
.hero-name-zh{font-size:12px;letter-spacing:3px;margin-top:2px;opacity:.65;}
.hero-class{font-size:8px;letter-spacing:1.5px;color:var(--text2);margin-top:1px;}
.lv-badge{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));
  color:#000;font-size:9px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:1px;margin-top:3px;width:fit-content;}

/* Bars */
.bars{display:flex;flex-direction:column;gap:4px;}
.bar-row{display:flex;align-items:center;gap:5px;}
.bar-lbl{font-size:8px;letter-spacing:.5px;width:20px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.fill-hp{background:linear-gradient(90deg,#38c878,#70f0a8);}
.fill-mp{background:linear-gradient(90deg,#3878c8,#70a8f0);}
.fill-rb{background:linear-gradient(90deg,#c83838,#f07050);animation:rbGlow 2.5s ease-in-out infinite;}
@keyframes rbGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px rgba(200,56,56,.7)}}
.fill-exp{background:linear-gradient(90deg,var(--gold),var(--gold-l));}
.bar-val{font-size:7px;color:var(--text2);width:46px;text-align:right;flex-shrink:0;}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.stat-cell{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:3px 2px;text-align:center;}
.stat-cell-lbl{font-size:7px;color:var(--text2);letter-spacing:1px;}
.stat-cell-val{font-size:12px;font-weight:700;}

/* Section header */
.sec{font-size:8px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sec::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--gold);}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

/* Equip: 3 columns × 2 rows */
.equip-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.equip-slot{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 8px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.equip-slot:hover{border-color:var(--border2);}
.equip-slot::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.rarity-s::before{background:#d4af37;}
.rarity-a::before{background:#9b7fd4;}
.rarity-b::before{background:#4a8fd4;}
.rarity-c::before{background:#508870;}
.equip-slot-top{display:flex;gap:6px;align-items:center;}
.equip-ico{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--border);}
.equip-body{flex:1;min-width:0;}
.equip-type{font-size:6px;color:var(--text2);letter-spacing:1.5px;margin-bottom:1px;}
.equip-name{font-size:9px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.equip-bonus{font-size:7px;color:#70f0a8;}

/* Skills */
.ab-list{display:flex;flex-direction:column;gap:5px;}
.ab-item{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;padding:7px 9px;cursor:pointer;transition:all .18s;}
.ab-item:hover{border-color:var(--border2);transform:translateX(3px);}
.ab-ico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.ab-name{font-size:10px;letter-spacing:.5px;}
.ab-desc{font-size:8px;color:var(--text2);margin-top:1px;}
.ab-cost{margin-left:auto;font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;white-space:nowrap;}
.cost-mp{background:rgba(56,120,200,.2);color:#70a8f0;border:1px solid rgba(56,120,200,.3);}
.cost-atb{background:rgba(200,168,74,.15);color:var(--gold-l);border:1px solid rgba(200,168,74,.25);}
.cost-lmt{background:rgba(200,50,50,.2);color:#f07878;border:1px solid rgba(200,50,50,.3);}

/* Status ailments */
.status-row{display:flex;gap:6px;flex-wrap:wrap;}
.status-none{font-size:9px;color:var(--text2);letter-spacing:1px;padding:4px 0;}

/* ── SKILL TREE PAGE ── */
.upper{display:flex;height:250px;position:relative;overflow:hidden;}
.sprite-bg{position:absolute;inset:0;pointer-events:none;}
.sprite-wrap{width:44%;flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.sprite-img{height:100%;width:auto;object-fit:cover;object-position:center top;display:block;mix-blend-mode:screen;filter:contrast(1.05) saturate(1.1);position:relative;z-index:2;}
.sprite-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--bg));z-index:3;pointer-events:none;}
.sprite-wrap::before{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,var(--bg));z-index:3;pointer-events:none;}
.upper-info{flex:1;padding:14px 12px 14px 6px;display:flex;flex-direction:column;gap:7px;position:relative;z-index:4;}
.upper-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:2px;line-height:1;}
.upper-name-zh{font-size:11px;letter-spacing:3px;margin-top:2px;opacity:.65;}
.upper-class{font-size:8px;letter-spacing:1.5px;color:var(--text2);margin-top:1px;}
.lv-chip{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;font-size:9px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:1px;margin-top:3px;width:fit-content;}
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.attr-cell{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:4px 6px;display:flex;justify-content:space-between;align-items:center;}
.attr-lbl{font-size:7px;color:var(--text2);letter-spacing:1px;}
.attr-val{font-size:12px;font-weight:700;}
.trait-row{display:flex;gap:4px;flex-wrap:wrap;}
.trait{font-size:7px;padding:2px 7px;border-radius:3px;letter-spacing:.5px;}

.tree-section{padding:10px 12px 0;}

/* Skill tree nodes */
.skill-tree{display:flex;flex-direction:column;gap:0;}
.tree-row{display:flex;align-items:flex-start;gap:0;padding:0 4px;position:relative;}
.tree-node{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative;cursor:pointer;padding:0 2px 12px;}
.node-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;z-index:2;border:2px solid;transition:all .22s;flex-shrink:0;}
.node-circle:hover{transform:scale(1.12);}
.node-unlocked .node-circle{background:rgba(255,255,255,.06);box-shadow:0 0 12px currentColor;}
.node-locked .node-circle{background:rgba(255,255,255,.03);border-color:var(--border2)!important;filter:grayscale(.8) brightness(.5);}
.node-maxed .node-circle{animation:maxPulse 2s ease-in-out infinite;}
@keyframes maxPulse{0%,100%{box-shadow:0 0 8px currentColor;}50%{box-shadow:0 0 22px currentColor,0 0 38px currentColor;}}
.node-name{font-size:8px;letter-spacing:.3px;text-align:center;line-height:1.3;}
.node-lv{font-size:7px;color:var(--text2);text-align:center;}
.node-desc{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,14,26,.96);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;width:110px;font-size:8px;color:var(--text);line-height:1.5;pointer-events:none;opacity:0;transition:opacity .2s;z-index:20;text-align:center;}
.tree-node:hover .node-desc{opacity:1;}
.tree-connector{position:absolute;left:50%;top:100%;width:1px;height:12px;transform:translateX(-50%);z-index:0;}

/* Passives */
.passive-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:7px 4px 0;}
.passive-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 7px 6px;display:flex;gap:7px;align-items:flex-start;cursor:pointer;transition:all .18s;}
.passive-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.passive-ico{font-size:15px;flex-shrink:0;margin-top:1px;}
.passive-name{font-size:9px;letter-spacing:.3px;margin-bottom:2px;}
.passive-desc{font-size:7px;color:var(--text2);line-height:1.5;}
.passive-lv{font-size:7px;margin-top:3px;}

/* Personal traits (SP system) */
.sp-traits{display:flex;flex-direction:column;gap:6px;padding:0 4px 16px;}
.sp-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;display:flex;gap:10px;align-items:center;position:relative;overflow:hidden;}
.sp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.sp-ico{font-size:18px;flex-shrink:0;}
.sp-body{flex:1;min-width:0;}
.sp-name{font-size:11px;letter-spacing:.5px;margin-bottom:2px;}
.sp-desc{font-size:8px;color:var(--text2);line-height:1.5;}
.sp-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.sp-lv-badge{font-size:8px;font-weight:900;padding:2px 7px;border-radius:3px;letter-spacing:1px;}
.sp-cost{font-size:7px;color:var(--text2);}

/* PLACEHOLDER */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;opacity:.35;}
.placeholder-ico{font-size:52px;}
.placeholder-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;color:var(--gold);}
.placeholder-sub{font-size:9px;color:var(--text2);letter-spacing:2px;}

/* BOTTOM NAV */
.bottom-nav{position:relative;z-index:10;background:linear-gradient(0deg,rgba(7,9,15,.98),rgba(11,14,28,.95));
  border-top:1px solid var(--border2);display:flex;flex-direction:column;}
.nav-btn-row{display:flex;width:100%;}
.nav-safe{height:env(safe-area-inset-bottom,20px);min-height:20px;background:rgba(7,9,15,.98);}
.nav-btn{flex:1;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border:none;background:transparent;transition:background .18s;font-family:'Noto Serif TC',serif;}
.nav-btn.active{background:rgba(200,168,74,.07);}
.nav-ico{font-size:17px;}
.nav-lbl{font-size:8px;letter-spacing:1px;color:var(--text2);}
.nav-btn.active .nav-lbl{color:var(--gold-l);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-title">幻刃紀　GENBA CHRONICLES</div>
    <div class="topbar-page" id="topbar-page">裝備 &amp; 狀態</div>
  </div>
  <div class="char-tabs" id="tabs"></div>
  <div class="main" id="main"></div>
  <div class="bottom-nav">
    <div class="nav-btn-row">
      <button class="nav-btn active" onclick="switchPage(0)"><span class="nav-ico">⚔️</span><span class="nav-lbl">狀態</span></button>
      <button class="nav-btn" onclick="switchPage(1)"><span class="nav-ico">🌿</span><span class="nav-lbl">技能樹</span></button>
      <button class="nav-btn" onclick="switchPage(2)"><span class="nav-ico">🗺️</span><span class="nav-lbl">地圖</span></button>
      <button class="nav-btn" onclick="switchPage(3)"><span class="nav-ico">📖</span><span class="nav-lbl">日誌</span></button>

    </div>
    <div class="nav-safe"></div>
  </div>
</div>

function pct(v,m){return Math.round(v/m*100);}

// Build tabs with crossorigin for GitHub images
document.getElementById('tabs').innerHTML=CHARS.map((c,i)=>`
  <div class="char-tab${i===0?' active':''}" onclick="switchChar(${i})">
    <div class="tab-av"><img src="${FACE[c.key]}" crossorigin="anonymous" alt="${c.nameZh}" onerror="this.style.opacity='.3'"></div>
    <div class="tab-name">${c.nameZh}</div>
  </div>`).join('');

function switchChar(i){
  curChar=i;
  document.querySelectorAll('.char-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  render();
}
function switchPage(p){
  curPage=p;
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',j===p));
  document.getElementById('topbar-page').textContent=PAGE_TITLES[p];
  render();
}

function img(src,alt,cls,style){
  return `<img src="${src}" crossorigin="anonymous" alt="${alt}" class="${cls||''}" style="${style||''}" onerror="this.style.opacity='.2'">`;
}

function renderStatus(c){
  const acc=c.acc;
  const equipHTML=c.equip.map(e=>`
    <div class="equip-slot ${e.r}">
      <div class="equip-slot-top">
        <div class="equip-ico">${e.ico}</div>
        <div class="equip-body">
          <div class="equip-type">${e.t}</div>
          <div class="equip-name" style="color:${acc}">${e.name}</div>
        </div>
      </div>
      <div class="equip-bonus">${e.bonus}</div>
    </div>`).join('');
  const abHTML=c.abilities.map(a=>`
    <div class="ab-item">
      <div class="ab-ico" style="background:${a.bg}30;border:1px solid ${a.bg}60">${a.ico}</div>
      <div><div class="ab-name">${a.name}</div><div class="ab-desc">${a.desc}</div></div>
      <div class="ab-cost ${a.cc}">${a.cost}</div>
    </div>`).join('');
  const rbLabel=c.rb>=100?`${c.rb}% ⚡`:`${c.rb}%`;
  const rbColor=c.rb>=100?'#f07050':'var(--text2)';
  const ailHTML=c.statusAilments.length
    ?c.statusAilments.map(s=>`<div style="font-size:22px" title="${s.name}">${s.ico}</div>`).join('')
    :`<div class="status-none">— 正常 —</div>`;

  return `<div class="page-in status-wrap">
    <div class="hero-card">
      <div class="hero-face" style="border-left:3px solid ${acc}">
        ${img(FACE[c.key],c.nameZh,'','width:100%;height:100%;object-fit:cover;object-position:center top;display:block')}
      </div>
      <div class="hero-info">
        <div>
          <div class="hero-name" style="color:${acc}">${c.nameEn}</div>
          <div class="hero-name-zh">${c.nameZh}</div>
          <div class="hero-class">${c.cls}</div>
          <div class="lv-badge">LV ${c.lv}</div>
        </div>
        <div class="bars">
          <div class="bar-row"><div class="bar-lbl" style="color:#38c878">HP</div><div class="bar-track"><div class="bar-fill fill-hp" style="width:${pct(c.hp,c.maxHp)}%"></div></div><div class="bar-val">${c.hp}/${c.maxHp}</div></div>
          <div class="bar-row"><div class="bar-lbl" style="color:#3878c8">MP</div><div class="bar-track"><div class="bar-fill fill-mp" style="width:${pct(c.mp,c.maxMp)}%"></div></div><div class="bar-val">${c.mp}/${c.maxMp}</div></div>
          <div class="bar-row"><div class="bar-lbl" style="color:#c83838">RB</div><div class="bar-track"><div class="bar-fill fill-rb" style="width:${pct(c.rb,c.maxRb)}%"></div></div><div class="bar-val" style="color:${rbColor}">${rbLabel}</div></div>
          <div class="bar-row"><div class="bar-lbl" style="color:var(--gold)">EXP</div><div class="bar-track"><div class="bar-fill fill-exp" style="width:${pct(c.exp,c.nextExp)}%"></div></div><div class="bar-val">${c.exp}/${c.nextExp}</div></div>
        </div>
        <div class="stat-grid">
          <div class="stat-cell"><div class="stat-cell-lbl">STR</div><div class="stat-cell-val" style="color:${acc}">${c.str}</div></div>
          <div class="stat-cell"><div class="stat-cell-lbl">MAG</div><div class="stat-cell-val">${c.mag}</div></div>
          <div class="stat-cell"><div class="stat-cell-lbl">DEF</div><div class="stat-cell-val">${c.def}</div></div>
          <div class="stat-cell"><div class="stat-cell-lbl">SPD</div><div class="stat-cell-val">${c.spd}</div></div>
        </div>
      </div>
    </div>
    <div><div class="sec">裝　備</div><div class="equip-grid">${equipHTML}</div></div>
    <div><div class="sec">技　能</div><div class="ab-list">${abHTML}</div></div>
    <div><div class="sec">狀態異常</div><div class="status-row">${ailHTML}</div></div>
  </div>`;
}

function nodeHTML(n,acc){
  const sc=n.s==='maxed'?'node-maxed':n.s==='locked'?'node-locked':'node-unlocked';
  const bc=n.s==='locked'?'var(--border2)':acc;
  return `<div class="tree-node ${sc}">
    <div class="node-circle" style="border-color:${bc};color:${bc}">${n.ico}</div>
    <div class="node-name" style="color:${n.s==='locked'?'var(--text2)':acc}">${n.name}</div>
    <div class="node-lv">${n.lv}</div>
    <div class="node-desc">${n.desc}</div>
    ${n.s!=='locked'?`<div class="tree-connector" style="background:${acc}40"></div>`:''}
  </div>`;
}

function renderSkillTree(c){
  const acc=c.acc;
  const traitsHTML=c.traits.map(t=>`<span class="trait" style="background:${t.c}25;border:1px solid ${t.c}60;color:${t.c}">${t.l}</span>`).join('');
  const treeHTML=c.tree.map(row=>`
    <div class="tree-row">
      <div style="position:absolute;top:19px;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,${acc}40,transparent);"></div>
      ${row.map(n=>nodeHTML(n,acc)).join('')}
    </div>`).join('');
  const passiveHTML=c.passives.map(p=>`
    <div class="passive-card" style="border-left:2px solid ${p.c}">
      <div class="passive-ico">${p.ico}</div>
      <div>
        <div class="passive-name" style="color:${p.c}">${p.name}</div>
        <div class="passive-desc">${p.desc}</div>
        <div class="passive-lv" style="color:${p.c}">${p.lv}</div>
      </div>
    </div>`).join('');
  const spHTML=c.spTraits.map(t=>`
    <div class="sp-card" style="border-color:${t.c}40">
      <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${t.c}"></div>
      <div class="sp-ico">${t.ico}</div>
      <div class="sp-body">
        <div class="sp-name" style="color:${t.c}">${t.name}</div>
        <div class="sp-desc">${t.desc}</div>
      </div>
      <div class="sp-right">
        <div class="sp-lv-badge" style="background:${t.c}25;color:${t.c};border:1px solid ${t.c}60">Lv.${t.lv}/${t.maxLv}</div>
        <div class="sp-cost">▲ ${t.nextCost}</div>
      </div>
    </div>`).join('');

  return `<div class="page-in">
    <div class="upper">
      <div class="sprite-bg" style="background:${c.bg}"></div>
      <div class="sprite-wrap">
        ${img(FULL[c.key],c.nameZh,'sprite-img','')}
      </div>
      <div class="upper-info">
        <div>
          <div class="upper-name" style="color:${acc};text-shadow:0 0 20px ${acc}80">${c.nameEn}</div>
          <div class="upper-name-zh">${c.nameZh}</div>
          <div class="upper-class">${c.cls}</div>
          <div class="lv-chip">LV ${c.lv}</div>
        </div>
        <div class="attr-grid">
          <div class="attr-cell"><div class="attr-lbl">STR</div><div class="attr-val" style="color:${acc}">${c.str}</div></div>
          <div class="attr-cell"><div class="attr-lbl">MAG</div><div class="attr-val">${c.mag}</div></div>
          <div class="attr-cell"><div class="attr-lbl">DEF</div><div class="attr-val">${c.def}</div></div>
          <div class="attr-cell"><div class="attr-lbl">SPD</div><div class="attr-val">${c.spd}</div></div>
        </div>
        <div class="trait-row">${traitsHTML}</div>
      </div>
    </div>
    <div class="tree-section">
      <div class="sec">主動技能樹</div>
      <div class="skill-tree">${treeHTML}</div>
      <div class="sec" style="margin-top:14px">被動特性</div>
      <div class="passive-row">${passiveHTML}</div>
      <div class="sec" style="margin-top:14px">個人特性　<span style="font-size:7px;color:var(--text2);letter-spacing:1px">SP 購買升級</span></div>
      <div class="sp-traits">${spHTML}</div>
    </div>
  </div>`;
}

function renderPlaceholder(title,ico){
  return `<div class="page-in placeholder">
    <div class="placeholder-ico">${ico}</div>
    <div class="placeholder-title">${title}</div>
    <div class="placeholder-sub">開發中</div>
  </div>`;
}

function render(){
  const c=CHARS[curChar];
  const main=document.getElementById('main');
  main.style.display=(curPage>=2)?'flex':'block';
  switch(curPage){
    case 0: main.innerHTML=renderStatus(c); break;
    case 1: main.innerHTML=renderSkillTree(c); break;
    case 2: main.innerHTML=renderPlaceholder('世界地圖','🗺️'); break;
    case 3: main.innerHTML=renderPlaceholder('冒險日誌','📖'); break;
    case 4: main.innerHTML=renderPlaceholder('系統設定','⚙️'); break;
  }
}

render();
