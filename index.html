<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>幻刃紀 v3.2 — 角色面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--panel:#0b0e1c;--panel2:#10152a;
  --border:#1c2540;--border2:#28366a;
  --gold:#c8a84a;--gold-l:#e8cc80;--gold-d:#7a6020;
  --text:#ccd4f0;--text2:#7080b0;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Noto Serif TC',serif;color:var(--text);}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;}
.app::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(74,100,200,.07),transparent 60%),var(--bg);
  pointer-events:none;z-index:0;}
.app::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(28,37,64,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(28,37,64,.3) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}
.topbar{position:relative;z-index:10;background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.95));
  border-bottom:1px solid var(--border2);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 18px rgba(0,0,0,.6);}
.topbar-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 14px rgba(200,168,74,.5);}
.topbar-page{font-size:10px;color:var(--text2);letter-spacing:2px;}
.char-tabs{position:relative;z-index:10;display:flex;background:rgba(11,14,28,.92);border-bottom:1px solid var(--border);padding:0 10px;gap:4px;}
.char-tab{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;}
.char-tab.active{border-bottom-color:var(--gold);}
.tab-av{width:46px;height:46px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border2);transition:all .2s;background:#0a0d1a;}
.char-tab.active .tab-av{border-color:var(--gold);box-shadow:0 0 14px rgba(200,168,74,.35);}
.tab-av img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.tab-name{font-size:9px;color:var(--text2);letter-spacing:1px;transition:color .2s;}
.char-tab.active .tab-name{color:var(--gold-l);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;scrollbar-width:none;}
.main::-webkit-scrollbar{display:none;}
.page-in{animation:pageIn .3s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.status-wrap{padding:12px 12px 20px;display:flex;flex-direction:column;gap:12px;}
.hero-card{display:flex;background:var(--panel);border:1px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.5);}
.hero-face{width:130px;flex-shrink:0;position:relative;overflow:hidden;background:#070a14;min-height:180px;}
.hero-face img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-face::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--panel));pointer-events:none;}
.hero-info{flex:1;padding:12px 12px 10px;display:flex;flex-direction:column;gap:7px;min-width:0;}
.hero-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:2px;line-height:1;}
.hero-name-zh{font-size:12px;letter-spacing:3px;margin-top:2px;opacity:.65;}
.hero-class{font-size:8px;letter-spacing:1.5px;color:var(--text2);margin-top:1px;}
.lv-badge{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));
  color:#000;font-size:9px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:1px;margin-top:3px;width:fit-content;}
.bars{display:flex;flex-direction:column;gap:4px;}
.bar-row{display:flex;align-items:center;gap:5px;}
.bar-lbl{font-size:8px;letter-spacing:.5px;width:20px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.fill-hp{background:linear-gradient(90deg,#38c878,#70f0a8);}
.fill-mp{background:linear-gradient(90deg,#3878c8,#70a8f0);}
.fill-rb{background:linear-gradient(90deg,#c83838,#f07050);animation:rbGlow 2.5s ease-in-out infinite;}
@keyframes rbGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px rgba(200,56,56,.7)}}
.fill-exp{background:linear-gradient(90deg,var(--gold),var(--gold-l));}
.bar-val{font-size:7px;color:var(--text2);width:46px;text-align:right;flex-shrink:0;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.stat-cell{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:3px 2px;text-align:center;}
.stat-cell-lbl{font-size:7px;color:var(--text2);letter-spacing:1px;}
.stat-cell-val{font-size:12px;font-weight:700;}
.sec{font-size:8px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sec::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--gold);}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.equip-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto auto;
  gap:6px;
}
/* 固定槽位：武器左上、鞋子左下、頭飾中上、防具中下、飾品右上、飾品右下 */
.equip-grid .equip-slot:nth-child(1){grid-column:1;grid-row:1;} /* 武器 */
.equip-grid .equip-slot:nth-child(2){grid-column:2;grid-row:2;} /* 防具 */
.equip-grid .equip-slot:nth-child(3){grid-column:2;grid-row:1;} /* 頭飾 */
.equip-grid .equip-slot:nth-child(4){grid-column:1;grid-row:2;} /* 鞋子 */
.equip-grid .equip-slot:nth-child(5){grid-column:3;grid-row:1;} /* 飾品1 */
.equip-grid .equip-slot:nth-child(6){grid-column:3;grid-row:2;} /* 飾品2 */
.equip-slot{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 8px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.equip-slot:hover{border-color:var(--border2);}
.equip-slot::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.rarity-s::before{background:#d4af37;}
.rarity-a::before{background:#9b7fd4;}
.rarity-b::before{background:#4a8fd4;}
.rarity-c::before{background:#508870;}
.rarity-white::before{background:#b8c0d0;}
.rarity-blue::before{background:#4a8fd4;}
.rarity-red::before{background:#d45a5a;}
.equip-slot-top{display:flex;gap:6px;align-items:center;}
.equip-ico{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--border);}
.equip-body{flex:1;min-width:0;}
.equip-type{font-size:6px;color:var(--text2);letter-spacing:1.5px;margin-bottom:1px;}
.equip-name{font-size:9px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.equip-bonus{font-size:7px;color:#70f0a8;}
.ab-list{display:flex;flex-direction:column;gap:5px;}
.ab-item{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;padding:7px 9px;cursor:pointer;transition:all .18s;}
.ab-item:hover{border-color:var(--border2);transform:translateX(3px);}
.ab-ico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.ab-name{font-size:10px;letter-spacing:.5px;}
.ab-desc{font-size:8px;color:var(--text2);margin-top:1px;}
.ab-cost{margin-left:auto;font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;white-space:nowrap;}
.cost-mp{background:rgba(56,120,200,.2);color:#70a8f0;border:1px solid rgba(56,120,200,.3);}
.cost-atb{background:rgba(200,168,74,.15);color:var(--gold-l);border:1px solid rgba(200,168,74,.25);}
.cost-lmt{background:rgba(200,50,50,.2);color:#f07878;border:1px solid rgba(200,50,50,.3);}
.status-row{display:flex;gap:6px;flex-wrap:wrap;}
.status-none{font-size:9px;color:var(--text2);letter-spacing:1px;padding:4px 0;}
.upper{display:flex;height:250px;position:relative;overflow:hidden;}
.sprite-bg{position:absolute;inset:0;pointer-events:none;}
.sprite-wrap{width:44%;flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.sprite-img{height:100%;width:auto;object-fit:cover;object-position:center top;display:block;mix-blend-mode:screen;filter:contrast(1.05) saturate(1.1);position:relative;z-index:2;}
.sprite-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--bg));z-index:3;pointer-events:none;}
.sprite-wrap::before{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,var(--bg));z-index:3;pointer-events:none;}
.upper-info{flex:1;padding:14px 12px 14px 6px;display:flex;flex-direction:column;gap:7px;position:relative;z-index:4;}
.upper-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:2px;line-height:1;}
.upper-name-zh{font-size:11px;letter-spacing:3px;margin-top:2px;opacity:.65;}
.upper-class{font-size:8px;letter-spacing:1.5px;color:var(--text2);margin-top:1px;}
.lv-chip{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;font-size:9px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:1px;margin-top:3px;width:fit-content;}
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.attr-cell{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:4px 6px;display:flex;justify-content:space-between;align-items:center;}
.attr-lbl{font-size:7px;color:var(--text2);letter-spacing:1px;}
.attr-val{font-size:12px;font-weight:700;}
.trait-row{display:flex;gap:4px;flex-wrap:wrap;}
.trait{font-size:7px;padding:2px 7px;border-radius:3px;letter-spacing:.5px;}

/* ══ SKILL MANAGEMENT PAGE ══ */
.sk-page{padding:0 0 16px;}
.sk-section-bar{padding:9px 14px 7px;background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.95));border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:8;}
.sk-section-title{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.sk-section-title::before{content:'';width:3px;height:10px;border-radius:2px;background:var(--gold);}
.sk-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
/* 裝備槽 grid */
.sk-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px;}
.sk-slot{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;cursor:pointer;transition:all .18s;min-height:54px;display:flex;align-items:center;gap:9px;position:relative;}
.sk-slot:hover{border-color:var(--border2);}
.sk-slot.filled{border-color:var(--border2);}
.sk-slot.empty{border-style:dashed;opacity:.5;}
.sk-slot-ico{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sk-slot-body{flex:1;min-width:0;}
.sk-slot-label{font-size:7px;color:var(--text2);letter-spacing:1.5px;margin-bottom:2px;}
.sk-slot-name{font-size:10px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sk-slot-cost{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap;margin-top:3px;display:inline-block;}
.sk-slot-num{position:absolute;top:5px;right:7px;font-size:7px;color:var(--border2);font-family:'Cinzel',serif;}
/* 技能池 */
.sk-pool{padding:6px 12px 0;}
.sk-pool-item{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.sk-pool-item:hover{border-color:var(--border2);transform:translateX(2px);}
.sk-pool-item.equipped{border-color:currentColor;}
.sk-pool-item.equipped::after{content:'裝備中';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:7px;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,.06);color:var(--text2);letter-spacing:.5px;}
.sk-pool-ico{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sk-pool-body{flex:1;min-width:0;padding-right:50px;}
.sk-pool-name{font-size:10px;letter-spacing:.3px;margin-bottom:2px;}
.sk-pool-desc{font-size:8px;color:var(--text2);line-height:1.5;}
.sk-pool-lv{font-size:7px;color:var(--text2);margin-top:3px;}
/* 特性區 */
.tr-slots{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;}
.tr-slot{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;flex:1;min-width:calc(50% - 3px);}
.tr-slot:hover{border-color:var(--border2);}
.tr-slot.filled{border-left-width:2px;}
.tr-slot.empty{border-style:dashed;opacity:.45;}
.tr-slot-ico{font-size:14px;flex-shrink:0;}
.tr-slot-body{flex:1;min-width:0;}
.tr-slot-name{font-size:9px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-slot-desc{font-size:7px;color:var(--text2);line-height:1.4;margin-top:1px;}
.tr-pool-item{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.tr-pool-item:hover{border-color:var(--border2);}
.tr-pool-item.equipped{border-color:currentColor;}
.tr-pool-item.equipped::after{content:'裝備中';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:7px;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,.06);color:var(--text2);letter-spacing:.5px;}
.tr-pool-item.locked{opacity:.35;cursor:default;}
.tr-pool-item.locked::after{content:'🔒 未解鎖';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:7px;padding:2px 6px;border-radius:2px;background:rgba(0,0,0,.3);color:var(--text2);}
.tr-pool-ico{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.tr-pool-body{flex:1;min-width:0;padding-right:55px;}
.tr-pool-name{font-size:10px;letter-spacing:.3px;margin-bottom:2px;}
.tr-pool-desc{font-size:8px;color:var(--text2);line-height:1.5;}
.tr-pool-meta{font-size:7px;margin-top:3px;}
/* 選擇 modal 覆用 .modal-* */
.sk-pick-modal .modal-sheet{max-height:70vh;overflow-y:auto;border-radius:16px 16px 0 0;}
.sk-pick-list{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.sk-pick-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .18s;}
.sk-pick-item:hover{border-color:var(--border2);background:rgba(255,255,255,.07);}
.sk-pick-item.cur{border-color:var(--gold);background:rgba(200,168,74,.06);}
.sk-pick-item-none{padding:10px 11px;border:1px dashed var(--border2);border-radius:8px;font-size:10px;color:var(--text2);text-align:center;cursor:pointer;transition:all .18s;letter-spacing:1px;}
.sk-pick-item-none:hover{border-color:#c83838;color:#f07070;}
.sk-counter{font-size:8px;color:var(--text2);letter-spacing:1px;margin-top:4px;}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;opacity:.35;}
.placeholder-ico{font-size:52px;}
.placeholder-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;color:var(--gold);}
.placeholder-sub{font-size:9px;color:var(--text2);letter-spacing:2px;}
.bottom-nav{position:relative;z-index:10;background:linear-gradient(0deg,rgba(7,9,15,.98),rgba(11,14,28,.95));
  border-top:1px solid var(--border2);display:flex;flex-direction:column;}
.nav-btn-row{display:flex;width:100%;}
.nav-safe{height:env(safe-area-inset-bottom,34px);min-height:34px;background:rgba(7,9,15,.98);}
.nav-btn{flex:1;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border:none;background:transparent;transition:background .18s;font-family:'Noto Serif TC',serif;}
.nav-btn.active{background:rgba(200,168,74,.07);}
.nav-ico{font-size:17px;}
.nav-lbl{font-size:8px;letter-spacing:1px;color:var(--text2);}
.nav-btn.active .nav-lbl{color:var(--gold-l);}

/* ══ MAP PAGE ══ */
.map-page{display:flex;flex-direction:column;height:100%;width:100%;}
.map-chapter-bar{padding:9px 14px 8px;background:linear-gradient(180deg,rgba(7,9,15,.98),rgba(11,14,28,.95));border-bottom:1px solid var(--border2);flex-shrink:0;}
.map-chapter-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 10px rgba(200,168,74,.4);margin-bottom:2px;}
.map-quest-text{font-size:9px;color:var(--text2);letter-spacing:1px;}
.map-img-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#04050a;min-height:0;}
.map-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
.map-info-area{flex-shrink:0;min-height:64px;padding:10px 14px;background:rgba(11,14,28,.95);border-top:1px solid var(--border);}
.map-info-placeholder{font-size:9px;color:var(--text2);letter-spacing:2px;text-align:center;padding:6px 0;}
.map-info-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:3px;}
.map-info-desc{font-size:9px;color:var(--text2);line-height:1.65;letter-spacing:.3px;}
.map-info-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.map-info-tag{font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);letter-spacing:.5px;}
.map-info-tag.chapter{border-color:var(--gold);color:var(--gold);}
.map-city-row{flex-shrink:0;padding:7px 10px;background:rgba(7,9,15,.98);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.city-btn{padding:4px 10px;font-size:9px;letter-spacing:1px;border:1px solid var(--border2);border-radius:3px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .18s;}
.city-btn:hover,.city-btn.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.07);}
.map-prog-row{flex-shrink:0;padding:6px 10px;background:rgba(11,14,28,.95);border-top:1px solid var(--border);display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.map-prog-row::-webkit-scrollbar{display:none;}
.prog-btn{padding:3px 9px;font-size:8px;letter-spacing:1.5px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Cinzel',serif;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.prog-btn.cur{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.08);}
.prog-btn.lk{opacity:.3;cursor:default;pointer-events:none;}
/* ══ JOURNAL PAGE ══ */
.jnl-page{display:flex;flex-direction:column;height:100%;width:100%;}
.jnl-subnav{display:flex;background:rgba(11,14,28,.92);border-bottom:1px solid var(--border2);flex-shrink:0;}
.jnl-subnav button{flex:1;padding:10px 0;font-family:'Noto Serif TC',serif;font-size:10px;letter-spacing:2px;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.jnl-subnav button.active{color:var(--gold-l);border-bottom-color:var(--gold);}
.jnl-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;scrollbar-width:none;}
.jnl-scroll::-webkit-scrollbar{display:none;}
.j-char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px;}
.j-ctab{position:relative;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--panel);cursor:pointer;transition:all .18s;}
.j-ctab.sel{border-color:var(--gold);background:var(--panel2);}
.j-ctab .jcn{font-size:12px;letter-spacing:2px;font-weight:700;}
.j-ctab .jcr{font-size:8px;color:var(--text2);margin-top:2px;letter-spacing:.5px;}
.j-card{display:none;background:var(--panel);border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
.j-card.show{display:block;}
.j-card-head{padding:13px 15px 11px;border-bottom:1px solid var(--border);}
.j-cname{font-family:'Cinzel',serif;font-size:15px;letter-spacing:2px;margin-bottom:1px;}
.j-crealname{font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:7px;}
.j-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.j-tag{padding:2px 7px;border-radius:3px;font-size:8px;letter-spacing:.5px;border:1px solid;}
.j-tag.lk{border-color:var(--border2);color:var(--text2);}
.j-tag.lk::before{content:'🔒 ';font-size:7px;}
.j-tag.ul{border-color:currentColor;background:rgba(255,255,255,.04);}
.j-card-body{padding:12px 15px;display:flex;flex-direction:column;gap:10px;}
.j-row-label{font-size:8px;letter-spacing:2px;color:var(--text2);font-family:'Cinzel',serif;margin-bottom:3px;}
.j-row-text{font-size:10px;line-height:1.7;color:var(--text);}
.j-row-text.lk{color:var(--text2);font-style:italic;}
.j-row-text.lk::before{content:'— ';}
.wound{border-left:2px solid #c83838;padding:7px 11px;background:rgba(200,56,56,.06);border-radius:0 4px 4px 0;font-size:10px;line-height:1.7;font-style:italic;color:#d4a0a0;}
.arc{border-left:2px solid var(--gold);padding:7px 11px;background:rgba(200,168,74,.06);border-radius:0 4px 4px 0;font-size:10px;line-height:1.7;color:var(--gold-l);}
.ev-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.ev-legend-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--text2);letter-spacing:.5px;}
.ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ev-dot.key{background:var(--gold);}
.ev-dot.rev{background:#8b5cf6;}
.ev-dot.loss{background:#c83838;}
.ev-dot.norm{background:var(--border2);}
.ev-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.ev-fbtn{padding:3px 10px;border-radius:3px;font-size:8px;letter-spacing:1px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;transition:all .18s;}
.ev-fbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.07);}
.ch-block{margin-bottom:16px;}
.ch-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.ch-label::after{content:'';flex:1;height:1px;background:var(--border2);}
.ev-card{display:flex;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:7px;background:var(--panel2);margin-bottom:6px;position:relative;overflow:hidden;transition:border-color .18s;}
.ev-card:hover{border-color:var(--border2);}
.ev-card.key{border-left:2px solid var(--gold);}
.ev-card.rev{border-left:2px solid #8b5cf6;}
.ev-card.loss{border-left:2px solid #c83838;}
.ev-card-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.ev-card-dot.key{background:var(--gold);}
.ev-card-dot.rev{background:#8b5cf6;}
.ev-card-dot.loss{background:#c83838;}
.ev-card-dot.norm{background:var(--border2);}
.ev-body{flex:1;}
.ev-title{font-size:10px;letter-spacing:.5px;margin-bottom:2px;color:var(--text);}
.ev-desc{font-size:8px;color:var(--text2);line-height:1.6;}
.ev-badges{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.ev-badge{font-size:7px;padding:1px 5px;border-radius:2px;border:1px solid;letter-spacing:.3px;}
.ev-badge.anei{border-color:#9b7fd4;color:#9b7fd4;}
.ev-badge.lika{border-color:#d46050;color:#d46050;}
.ev-badge.fira{border-color:#d47040;color:#d47040;}
.ev-badge.elweis{border-color:#7090c8;color:#7090c8;}
.ev-badge.other{border-color:var(--text2);color:var(--text2);}
.ev-type{position:absolute;top:7px;right:8px;font-size:7px;padding:1px 6px;border-radius:2px;letter-spacing:.5px;font-family:'Cinzel',serif;}
.ev-type.key{background:rgba(200,168,74,.12);color:var(--gold);}
.ev-type.rev{background:rgba(139,92,246,.12);color:#a78bfa;}
.ev-type.loss{background:rgba(200,56,56,.12);color:#f07070;}


/* ══ UNEQUIP MODAL ══ */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{width:100%;max-width:480px;background:var(--panel2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom,34px) + 16px);animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);margin-bottom:4px;}
.modal-item-name{font-size:15px;letter-spacing:.5px;margin-bottom:4px;}
.modal-item-bonus{font-size:10px;color:#70f0a8;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:11px 0;border-radius:8px;font-family:'Noto Serif TC',serif;font-size:11px;letter-spacing:1px;cursor:pointer;border:none;transition:all .18s;}
.modal-btn-cancel{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border2);}
.modal-btn-confirm{background:rgba(200,56,56,.15);color:#f08080;border:1px solid rgba(200,56,56,.3);}
.modal-btn-confirm:hover{background:rgba(200,56,56,.28);}
/* 空槽樣式 */
.equip-slot.empty{opacity:.4;border-style:dashed;}
.equip-slot.empty .equip-ico{opacity:.3;}



/* ══ BATTLE STYLES ══ */

/* ══ BATTLE STYLES ══ */

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--panel:#0b0e1c;--panel2:#10152a;
  --border:#1c2540;--border2:#28366a;
  --gold:#c8a84a;--gold-l:#e8cc80;--gold-d:#7a6020;
  --text:#ccd4f0;--text2:#7080b0;
  --hp:#38c878;--mp:#3878c8;--rb:#c83838;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:'Noto Serif TC',serif;color:var(--text);}

/* ── 背景格線 ── */
.app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.app::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(74,100,200,.08),transparent 60%),var(--bg);
  pointer-events:none;z-index:0;}
.app::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(28,37,64,.25) 1px,transparent 1px),
    linear-gradient(90deg,rgba(28,37,64,.25) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}

/* ════════════════════════════════
   敵方區域（上半部）
════════════════════════════════ */
.enemy-area{
  position:relative;z-index:5;
  flex:0 0 auto;
  padding:10px 12px 8px;
  background:linear-gradient(180deg,rgba(7,9,15,.95),rgba(11,14,28,.9));
  border-bottom:1px solid var(--border2);
}
.battle-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.battle-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold);
  text-shadow:0 0 12px rgba(200,168,74,.4);}
.turn-indicator{font-size:8px;color:var(--text2);letter-spacing:1.5px;padding:2px 8px;
  border:1px solid var(--border2);border-radius:3px;}

/* 敵人卡 */
.enemies{display:flex;gap:8px;justify-content:center;}
.enemy-card{flex:1;max-width:160px;background:var(--panel2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 10px 8px;text-align:center;position:relative;
  transition:all .2s;}
.enemy-card.targeted{border-color:#c83838;box-shadow:0 0 12px rgba(200,56,56,.25);}
.enemy-card.dead{opacity:.25;pointer-events:none;}
.enemy-card.shaking{animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.enemy-ico{font-size:36px;margin-bottom:5px;display:block;
  filter:drop-shadow(0 0 8px rgba(200,56,56,.3));}
.enemy-card.dead .enemy-ico{filter:grayscale(1);opacity:.4;}
.enemy-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:#e08080;margin-bottom:6px;}
.enemy-hp-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:3px;}
.enemy-hp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#c83838,#f07050);
  transition:width .5s ease;}
.enemy-hp-text{font-size:7px;color:var(--text2);}
.enemy-atb-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:3px;}
.enemy-atb-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#5878b0,#80a0d0);transition:width .12s linear;}
.enemy-ailments{display:flex;gap:3px;justify-content:center;margin-top:5px;min-height:16px;}
.ailment-badge{font-size:11px;}

/* 目標選擇箭頭 */
.target-arrow{position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--gold);animation:bounce .6s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* 戰鬥日誌 */
.battle-log{
  position:relative;z-index:5;
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 12px;scrollbar-width:none;
  min-height:60px;max-height:100px;
}
.battle-log::-webkit-scrollbar{display:none;}
.log-line{font-size:9px;line-height:1.7;color:var(--text2);letter-spacing:.3px;
  border-bottom:1px solid rgba(28,37,64,.3);padding:2px 0;}
.log-line.important{color:var(--text);}
.log-line.dmg{color:#f08080;}
.log-line.heal{color:#70f0a8;}
.log-line.limit{color:var(--gold);}
.log-line.system{color:var(--text2);font-style:italic;}

/* ════════════════════════════════
   隊伍區域（下半部）
════════════════════════════════ */
.party-area{
  position:relative;z-index:5;
  flex:0 0 auto;
  background:transparent;
  border-top:1px solid var(--border2);
}

/* 隊伍成員列 */
/* 戰鬥全身立繪（純裝飾靜態，去背 PNG，站於隊伍卡上方） */
.hero-art-row{display:flex;align-items:flex-end;justify-content:center;gap:2%;
  height:30vh;max-height:240px;min-height:120px;overflow:hidden;pointer-events:none;
  position:relative;z-index:4;}
.hero-art-fig{height:100%;width:auto;max-width:25%;object-fit:contain;object-position:bottom center;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));}
.party-list{display:flex;gap:0;border-bottom:1px solid var(--border);background:linear-gradient(0deg,rgba(7,9,15,.98),rgba(11,14,28,.95));}
.party-member{flex:1;padding:7px 6px 6px;position:relative;cursor:pointer;
  border-right:1px solid var(--border);transition:background .18s;}
.party-member:last-child{border-right:none;}
.party-member.active-turn{background:rgba(200,168,74,.06);}
.party-member.dead{opacity:.3;pointer-events:none;}
.pm-name{font-size:8px;letter-spacing:.5px;margin-bottom:4px;text-align:center;}
/* HP/MP/ATB 細條 */
.pm-bars{display:flex;flex-direction:column;gap:2px;}
.pm-bar{display:flex;align-items:center;gap:3px;}
.pm-bar-lbl{font-size:6px;width:14px;text-align:right;flex-shrink:0;color:var(--text2);}
.pm-bar-track{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.pm-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.fill-hp{background:linear-gradient(90deg,#38c878,#70f0a8);}
.fill-mp{background:linear-gradient(90deg,#3878c8,#70a8f0);}
.fill-rb{background:linear-gradient(90deg,#c83838,#f07050);}
/* ATB 條 */
.pm-atb-wrap{margin-top:3px;}
.pm-atb-track{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.pm-atb-fill{height:100%;border-radius:2px;transition:width .1s linear;}
.pm-atb-ready{font-size:7px;text-align:center;margin-top:2px;letter-spacing:1px;
  animation:readyPulse 1s ease-in-out infinite;}
@keyframes readyPulse{0%,100%{opacity:.7}50%{opacity:1}}
/* 狀態異常小圖示 */
.pm-ailments{display:flex;gap:2px;justify-content:center;margin-top:3px;min-height:12px;}
.pm-ail{font-size:9px;}

/* ── 行動介面 ── */
.action-area{padding:8px 10px;min-height:90px;background:rgba(7,9,15,.96);}

/* 技能按鈕 2×2 */
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.skill-btn{display:flex;align-items:center;gap:7px;background:var(--panel2);
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;
  cursor:pointer;transition:all .18s;text-align:left;}
.skill-btn:hover:not(:disabled){border-color:var(--border2);background:rgba(255,255,255,.04);}
.skill-btn:disabled{opacity:.3;cursor:not-allowed;}
.skill-btn.limit-ready{border-color:var(--gold)!important;
  background:rgba(200,168,74,.08)!important;
  box-shadow:0 0 10px rgba(200,168,74,.2);}
.skill-btn-ico{font-size:16px;flex-shrink:0;}
.skill-btn-body{flex:1;min-width:0;}
.skill-btn-name{font-size:9px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.skill-btn-cost{font-size:7px;margin-top:1px;}
.cost-mp-t{color:#70a8f0;}
.cost-atb-t{color:var(--gold-l);}
.cost-lmt-t{color:#f07878;}
.cost-rb-t{color:#e89060;}
.pm-stats-num{margin:4px 0;}
.pm-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;line-height:1.5;padding:0 2px;}
.pm-stat-lbl{font-weight:bold;font-size:10px;}
.pm-stat-val{color:var(--text);font-family:Cinzel,monospace;font-size:11px;}
.skill-btn.rb-ready{border-color:rgba(232,144,96,0.6);box-shadow:0 0 8px rgba(232,144,96,0.2);}

/* 目標選擇提示 */
.target-prompt{font-size:9px;color:var(--gold);text-align:center;letter-spacing:2px;
  padding:6px 0;animation:readyPulse 1.2s ease infinite;}

/* 等待提示 */
.waiting-msg{font-size:9px;color:var(--text2);letter-spacing:2px;text-align:center;
  padding:18px 0;}

/* 通過/道具按鈕列 */
.extra-btns{display:flex;gap:6px;margin-top:6px;}
.extra-btn{flex:1;padding:7px 0;font-size:8px;letter-spacing:1.5px;color:var(--text2);
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;
  cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .18s;}
.extra-btn:hover{border-color:var(--border2);color:var(--text);}

/* float-num CSS → moved to effects section */

/* ── 結算畫面 ── */
.result-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;
  justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.result-panel{background:var(--panel2);border:1px solid var(--border2);border-radius:16px;
  padding:28px 24px;text-align:center;width:80%;max-width:320px;}
.result-title{font-family:'Cinzel',serif;font-size:20px;letter-spacing:4px;margin-bottom:8px;}
.result-title.win{color:var(--gold);text-shadow:0 0 20px rgba(200,168,74,.5);}
.result-title.lose{color:#f07070;}
.result-sub{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:20px;}
.result-btn{display:block;width:100%;padding:12px 0;background:linear-gradient(135deg,var(--gold),var(--gold-d));
  color:#000;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;font-weight:700;
  border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;}

/* nav-safe */
.nav-safe{height:env(safe-area-inset-bottom,34px);min-height:34px;
  background:rgba(7,9,15,.98);}

/* ══ BATTLE EFFECTS ══ */

/* LIMIT 發動全屏閃光 */
.limit-flash{
  position:fixed;inset:0;z-index:150;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%, rgba(200,168,74,.55) 0%, rgba(200,100,50,.3) 40%, transparent 70%);
  animation:limitFlash .7s ease forwards;
}
@keyframes limitFlash{
  0%{opacity:0} 15%{opacity:1} 60%{opacity:.7} 100%{opacity:0}
}

/* 傷害飄字升級版 */
.float-num{
  position:fixed;font-family:'Cinzel',serif;font-weight:700;
  pointer-events:none;z-index:200;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
  animation:floatUp .95s cubic-bezier(.2,.8,.4,1) forwards;
}
@keyframes floatUp{
  0%  {opacity:0;transform:translateY(4px) scale(.8)}
  15% {opacity:1;transform:translateY(-8px) scale(1.2)}
  50% {opacity:1;transform:translateY(-24px) scale(1)}
  100%{opacity:0;transform:translateY(-50px) scale(.85)}
}
.float-num.crit{
  animation:floatUpCrit 1.1s cubic-bezier(.2,.8,.4,1) forwards;
  font-size:22px!important;
}
@keyframes floatUpCrit{
  0%  {opacity:0;transform:translateY(4px) scale(.6)}
  10% {opacity:1;transform:translateY(-14px) scale(1.5)}
  40% {opacity:1;transform:translateY(-32px) scale(1.1)}
  100%{opacity:0;transform:translateY(-60px) scale(.9)}
}
.float-num.heal{
  animation:floatUpHeal 1s ease forwards;
}
@keyframes floatUpHeal{
  0%  {opacity:0;transform:translateY(0) scale(.9)}
  20% {opacity:1;transform:translateY(-10px) scale(1.1)}
  100%{opacity:0;transform:translateY(-40px) scale(.95)}
}
.float-num.miss{
  font-size:13px!important;
  animation:floatUp .8s ease forwards;
}

/* RB 條滿時的金光 */
.pm-bar-fill.fill-rb.rb-full{
  background:linear-gradient(90deg,var(--gold),#ffdd44,var(--gold));
  background-size:200% 100%;
  animation:rbFullGlow 1.2s linear infinite;
  box-shadow:0 0 6px rgba(200,168,74,.8);
}
@keyframes rbFullGlow{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}

/* LIMIT 按鈕脈動（比之前更強）*/
.skill-btn.limit-ready{
  border-color:var(--gold)!important;
  background:rgba(200,168,74,.12)!important;
  animation:limitBtnPulse 1.4s ease-in-out infinite!important;
}
@keyframes limitBtnPulse{
  0%,100%{box-shadow:0 0 8px rgba(200,168,74,.3);border-color:var(--gold)!important}
  50%{box-shadow:0 0 20px rgba(200,168,74,.7),0 0 40px rgba(200,168,74,.2);border-color:var(--gold-l)!important}
}

/* 敵人受擊 */
.enemy-card.shaking{animation:shake .35s ease!important;}
@keyframes shake{
  0%,100%{transform:translateX(0) scale(1)}
  20%{transform:translateX(-7px) scale(1.02)}
  40%{transform:translateX(7px) scale(.98)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* 敵人死亡 */
.enemy-card.dead .enemy-ico{
  animation:deathFade .5s ease forwards;
}
@keyframes deathFade{
  0%{filter:grayscale(0) brightness(1)}
  100%{filter:grayscale(1) brightness(.3)}
}

/* 狀態異常 badge 動畫 */

html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;

.hud-location{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold);
  text-shadow:0 0 10px rgba(200,168,74,.4);}
.hud-sub{font-size:8px;color:var(--text2);letter-spacing:1px;}
.hud-right{display:flex;gap:8px;align-items:center;}
.hud-step{font-size:8px;color:var(--text2);letter-spacing:1px;}
.hud-btn{padding:4px 10px;border:1px solid var(--border2);border-radius:4px;
  font-size:8px;letter-spacing:1px;color:var(--text2);background:transparent;

/* ── 地圖視窗 ── */

.map-world{position:absolute;transition:transform .15s ease;}

/* ── Tile ── */
.tile-row{display:flex;}
.tile{
  width:40px;height:40px;flex-shrink:0;
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;

  user-select:none;-webkit-user-select:none;
}
.tile:hover:not(.wall):not(.building){filter:brightness(1.3);}
.tile.road{background:var(--t-road);}
.tile.wall{background:var(--t-wall);cursor:default;}
.tile.building{background:var(--t-build);cursor:default;}
.tile.grass{background:var(--t-grass);}
.tile.water{background:var(--t-water);}
.tile.inn-floor{background:var(--t-inn);}
.tile.castle-floor{background:var(--t-castle);}
.tile.door{background:var(--t-door);cursor:pointer;}
.tile.door:hover{filter:brightness(1.5);}
.tile.path{background:var(--t-path);}

/* 網格線（輕微） */

  border-right:1px solid rgba(28,37,64,.2);
  border-bottom:1px solid rgba(28,37,64,.2);
  pointer-events:none;}

}

  pointer-events:none;
}

  100%{opacity:0;transform:translateX(-50%) translateY(-4px)}

}
.confirm-btn-cancel{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border2);}
.confirm-btn-ok{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;font-weight:700;}

.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:900;background:rgba(11,14,28,.95);border:1px solid var(--border2);
  border-radius:8px;padding:8px 16px;font-size:10px;letter-spacing:.5px;
  color:var(--text);white-space:nowrap;
  animation:toastAnim 2s ease forwards;
  pointer-events:none;
}
.toast.success{border-color:rgba(56,200,120,.4);color:#70f0a8;}
.toast.error{border-color:rgba(200,56,56,.4);color:#f08080;}
@keyframes toastAnim{
  0%{opacity:0;transform:translateX(-50%) translateY(-8px)}
  15%{opacity:1;transform:translateX(-50%) translateY(0)}
  70%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-4px)}
}

function findCharByKey(key){ for(var i=0;i<CHARS.length;i++){ if(CHARS[i].key===key) return CHARS[i]; } return null; }
function hasPassive(key,pid){
  var c=findCharByKey(key);
  return !!(c && c.equippedPassive && c.equippedPassive.indexOf(pid)>=0);
}
function unlockTrait(ci,tid){
  var c=CHARS[ci];
  if(!c) return;
  var tr=c.traitPool.find(function(x){return x.id===tid;});
  if(!tr) return;
  var sp=c.sp||0;
  var lv=tr.level||0;
  if(tr.maxLevel && lv>=tr.maxLevel){
    if(typeof showToast==='function') showToast('已達最高等級 LV'+tr.maxLevel,'error');
    return;
  }
  var cost=(tr.upgradeCosts&&tr.upgradeCosts[lv]!==undefined)?tr.upgradeCosts[lv]:tr.spCost;
  if(sp<cost){
    if(typeof showToast==='function') showToast('SP不足（需要 '+cost+'，目前 '+sp+'）','error');
    return;
  }
  c.sp=sp-cost;
  tr.level=(lv+1);
  tr.unlocked=true;
  var msg=lv===0?'解鎖特性：'+tr.name:'升級特性：'+tr.name+' → LV'+tr.level;
  if(typeof showToast==='function') showToast(msg,'success');
  if(curPage===1) render();
  if(typeof saveGame==='function') saveGame();
}
function getTraitLevel(charKey,traitId){
  var c=(typeof findCharByKey==='function')?findCharByKey(charKey):null;
  if(!c||!c.traitPool||!c.equippedTraits) return 0;
  if(c.equippedTraits.indexOf(traitId)<0) return 0;
  var tr=c.traitPool.find(function(t){return t.id===traitId;});
  return (tr&&tr.unlocked&&tr.level)?tr.level:0;
}
function getEquipBonus(key){
  var z={str:0,mag:0,def:0,spd:0,hp:0,mp:0};
  var c=findCharByKey(key);
  if(!c||!c.equippedEquip||!c.inventory) return z;
  for(var i=0;i<c.equippedEquip.length;i++){
    var id=c.equippedEquip[i]; if(!id) continue;
    var it=null;
    for(var j=0;j<c.inventory.length;j++){ if(c.inventory[j].id===id){ it=c.inventory[j]; break; } }
    if(!it) continue;
    z.str+=it.str||0; z.mag+=it.mag||0; z.def+=it.def||0; z.spd+=it.spd||0; z.hp+=it.hp||0; z.mp+=it.mp||0;
  }
  return z;
}
function effStat(c,stat){ var b=getEquipBonus(c.key); return (c[stat]||0)+(b[stat]||0); }
function getEquipSubs(key){
  var s={crit:0,critdmg:0,lifesteal:0,instakill:0,confuse:0,poison:0,counter:0};
  var c=findCharByKey(key);
  if(!c||!c.equippedEquip||!c.inventory) return s;
  for(var i=0;i<c.equippedEquip.length;i++){
    var id=c.equippedEquip[i]; if(!id) continue;
    var it=null;
    for(var j=0;j<c.inventory.length;j++){ if(c.inventory[j].id===id){ it=c.inventory[j]; break; } }
    if(it&&it.sub&&it.sub.type&&s[it.sub.type]!==undefined){ s[it.sub.type]+=(it.sub.pct||0); }
  }
  return s;
}
function equipBonusText(e){
  var parts=[];
  if(e.str) parts.push('STR+'+e.str);
  if(e.mag) parts.push('MAG+'+e.mag);
  if(e.def) parts.push('DEF+'+e.def);
  if(e.spd) parts.push('SPD+'+e.spd);
  if(e.hp) parts.push('HP+'+e.hp);
  if(e.mp) parts.push('MP+'+e.mp);
  if(e.sub&&e.sub.type){ parts.push((SUB_LABEL_A[e.sub.type]||e.sub.type)+' '+Math.round((e.sub.pct||0)*100)+'%'); }
  return parts.join(' / ')||(e.bonus||'—');
}
function pct(v,m){return Math.round(v/m*100);}

  if(i>=_mapUnlocked)return;

function cityOpen(ct){
  if(!ct) return false;
  if(ct.name==='夏洛伊') return true;
  if(ct.name==='王都平原') return (typeof STORY!=='undefined' && STORY.likaJoined);
  var req=99;
  if(ct.ch){ var n=parseInt(ct.ch.replace('ch',''),10); if(!isNaN(n)) req=n; }
  var cur=(typeof STORY!=='undefined' && STORY.chapter) ? STORY.chapter : 1;
  if(req>cur) return false;
  // 第三章三城強制鎖序：灰牙鎮 → 晶峰院 → 霧冕城
  if(ct.name==='晶峰院') return (typeof STORY!=='undefined' && STORY.yuehuaSaved);
  if(ct.name==='霧冕城') return (typeof STORY!=='undefined' && STORY.crystalKeyObtained);
  return true;
}
function mapSelectCity(name){
  var ct=CITIES.find(function(c){return c.name===name;});
  if(!ct)return;
  document.querySelectorAll('.city-btn').forEach(function(b){
    b.classList.toggle('sel', b.textContent===name);
  });
  document.getElementById('map-info-ph').style.display='none';
  document.getElementById('map-info-detail').style.display='block';
  document.getElementById('map-info-name').textContent=name;
  document.getElementById('map-info-desc').textContent=ct.desc;

  var chLabel=null;
  if(ct.ch){
    var chObj=CHAPTERS.find(function(c){return c.id===ct.ch;});
    if(chObj) chLabel=chObj.label;
  }

  var tagsEl=document.getElementById('map-info-tags');
  tagsEl.innerHTML='';

  // 勢力標籤
  var factionSpan=document.createElement('span');
  factionSpan.className='map-info-tag';
  factionSpan.textContent=ct.faction;
  tagsEl.appendChild(factionSpan);

  // 章節標籤
  if(chLabel){
    var chSpan=document.createElement('span');
    chSpan.className='map-info-tag chapter';
    chSpan.textContent=chLabel+' 重要據點';
    tagsEl.appendChild(chSpan);
  }

  // 戰鬥按鈕（用 addEventListener，不用 onclick）
  var enc=typeof CITY_ENCOUNTERS!=='undefined'?CITY_ENCOUNTERS[name]:null;
  if(enc){
    if(typeof cityOpen==='function' && !cityOpen(ct)){
      var lockSpan=document.createElement('span');
      lockSpan.className='map-info-tag';
      lockSpan.style.borderColor='#555';
      lockSpan.style.color='#888';
      lockSpan.textContent='🔒 尚未開放';
      tagsEl.appendChild(lockSpan);
    } else {
      var battleSpan=document.createElement('span');
      battleSpan.className='map-info-tag chapter';
      battleSpan.style.cursor='pointer';
      battleSpan.style.borderColor='#c83838';
      battleSpan.style.color='#f08080';
      battleSpan.textContent=enc.enemies[0]==='captain_heartless'?'⚔️ BOSS 戰':'⚔️ 進入戰鬥';
      battleSpan.addEventListener('click',function(){
        if(name==='夏洛伊'){
          openTown('shalloi');
        } else if(name==='赤盾城'){
          openRedshieldTown();
        } else if(name==='晶峰院'){
          openJingfengTown();
        } else if(name==='霧冕城'){
          openWumianTown();
        } else if(name==='灰牙鎮'){
          openGreyfangTown();
        } else if(name==='暗淵城'){
          openAbyssTown();
        } else if(name==='艾爾登'){
          openEldonTown();
        } else if(name==='碧海港'){
          openBihaiTown();
        } else if(name==='王都平原'){
          if(typeof STORY!=='undefined' && !STORY.metMoonEye && typeof playMoonEyeEncounter==='function'){ playMoonEyeEncounter(); }
          else { mapEncounter(name); }
        } else {
          mapEncounter(name);
        }
      });
      if(name==='夏洛伊'){
        battleSpan.textContent='🏰 進入城鎮';
        battleSpan.style.borderColor='var(--gold)';
        battleSpan.style.color='var(--gold)';
      }
      if(name==='赤盾城'){
        battleSpan.textContent='🏰 進入城鎮';
        battleSpan.style.borderColor='var(--gold)';
        battleSpan.style.color='var(--gold)';
      }
      if(['晶峰院','霧冕城','灰牙鎮','暗淵城','艾爾登','碧海港'].indexOf(name)>=0){
        battleSpan.textContent='🏰 進入城鎮';
        battleSpan.style.borderColor='var(--gold)';
        battleSpan.style.color='var(--gold)';
      }
      if(name==='王都平原'){
        battleSpan.textContent=(typeof STORY!=='undefined' && !STORY.metMoonEye)?'🌾 前往平原':'⚔️ 平原練功';
        battleSpan.style.borderColor='#7bbf7b';
        battleSpan.style.color='#9fe09f';
      }
      tagsEl.appendChild(battleSpan);
    }
  }
}

// ════ MODAL HELPERS ════
function closeModal(){
  const o=document.getElementById('gen-overlay');
  if(o)o.remove();
}
function _makeOverlay(content){
  closeModal();
  const ov=document.createElement('div');
  ov.className='modal-overlay sk-pick-modal';
  ov.id='gen-overlay';
  ov.innerHTML=`<div class="modal-sheet" style="max-height:72vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,34px)+16px)">${content}</div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
}

// ════ EQUIP PICKER ════
function openEquipPicker(ci,slotIdx,slotType){
  const c=CHARS[ci];
  const currentId=c.equippedEquip[slotIdx]||null;
  // 飾品不可同名重複：排除另一飾品格已裝備的同名飾品
  let blockedName=null;
  if(slotType==='飾品'){
    const otherAcc=(slotIdx===4)?5:(slotIdx===5?4:-1);
    if(otherAcc>=0){
      const oid=c.equippedEquip[otherAcc];
      if(oid){ const oit=c.inventory.find(x=>x.id===oid); if(oit) blockedName=oit.name; }
    }
  }
  // 篩選：只顯示同類型裝備（飾品槽可裝飾品，其他嚴格對應）
  const filtered=c.inventory.filter(e=> e.t===slotType && !(blockedName && e.name===blockedName && e.id!==currentId));
  const items=filtered.map(e=>{
    const isCurrent=e.id===currentId;
    // 找出這個裝備目前裝在哪個槽
    const otherSlot=c.equippedEquip.findIndex((id,i)=>id===e.id&&i!==slotIdx);
    const isElsewhere=otherSlot>=0;
    const SLOT_NAMES=['武器','防具','頭飾','鞋子','飾品1','飾品2'];
    return `<div class="sk-pick-item${isCurrent?' cur':''}" onclick="confirmEquip(${ci},${slotIdx},'${e.id}')">
      <div class="equip-ico" style="font-size:20px;width:32px;text-align:center">${e.ico}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:${isCurrent?'var(--gold)':'var(--text)'};letter-spacing:.3px">${e.name}</div>
        <div style="font-size:8px;color:#70f0a8;margin-top:3px">${equipBonusText(e)}</div>
        ${isElsewhere?`<div style="font-size:7px;color:var(--text2);margin-top:2px">目前裝備於 ${SLOT_NAMES[otherSlot]}</div>`:''}
      </div>
      ${isCurrent?'<div style="font-size:7px;color:var(--gold);padding:2px 6px;border:1px solid var(--gold);border-radius:3px;flex-shrink:0">裝備中</div>':''}
    </div>`;
  }).join('');
  const currentItem=currentId?c.inventory.find(x=>x.id===currentId):null;
  _makeOverlay(`
    <div class="modal-title">${slotType} 更換</div>
    <div style="font-size:8px;color:var(--text2);margin-bottom:12px;letter-spacing:.5px">${currentItem?'當前：'+currentItem.name:'未裝備'}</div>
    ${filtered.length===0?'<div style="font-size:9px;color:var(--text2);padding:12px 0;text-align:center">背包中沒有可用的'+slotType+'</div>':''}
    <div class="sk-pick-item-none" onclick="confirmEquip(${ci},${slotIdx},null)">✕ 卸除裝備</div>
    <div class="sk-pick-list">${items}</div>
  `);
}
function confirmEquip(ci,slotIdx,eid){
  CHARS[ci].equippedEquip[slotIdx]=eid;
  closeModal();
  if(curPage===0)render();
}

// ════ SKILL PICKER ════
// slotIdx=-1 表示「直接裝入第一個空槽」; forceId 是直接指定要裝的技能
function openSkillPicker(ci,type,slotIdx,forceId){
  const c=CHARS[ci];
  const pool=type==='active'?c.activePool:type==='rb'?(c.rbPool||[]):c.passivePool;
  const equipped=type==='active'?c.equippedActive:type==='rb'?c.equippedRB:c.equippedPassive;
  const limit=type==='rb'?3:4;
  if(forceId){
    // 直接從技能池點擊 → 找空槽或詢問換哪格
    const emptyIdx=equipped.indexOf(null);
    const firstEmpty=equipped.findIndex(x=>!x);
    if(firstEmpty>=0){
      // 有空槽，直接裝
      confirmSkill(ci,type,firstEmpty,forceId);
      return;
    }
    // 沒有空槽，讓玩家選要換哪格
    slotIdx=-2; // 代表「選替換哪格」
  }
  if(slotIdx===-2){
    // 顯示現有4格，讓玩家選要替換哪格
    const sk=pool.find(x=>x.id===forceId);
    const slots=Array.from({length:limit},(_,i)=>{
      const sid=equipped[i]||null;
      const s=sid?pool.find(x=>x.id===sid):null;
      return `<div class="sk-pick-item" onclick="confirmSkill(${ci},'${type}',${i},'${forceId}')">
        <div style="font-family:'Cinzel',serif;font-size:8px;color:var(--text2);width:20px">${i+1}</div>
        ${s?`<div style="flex:1"><div style="font-size:10px;color:var(--text)">${s.name}</div><div style="font-size:8px;color:var(--text2)">${s.desc.slice(0,24)}…</div></div>`
           :`<div style="flex:1;font-size:9px;color:var(--border2)">空槽</div>`}
        <div style="font-size:8px;color:var(--gold)">換入</div>
      </div>`;
    }).join('');
    _makeOverlay(`
      <div class="modal-title">選擇替換槽位</div>
      <div style="font-size:9px;color:var(--text);margin-bottom:8px">將裝入：<span style="color:${c.acc}">${sk ? sk.name : ''}</span></div>
      <div class="sk-pick-list">${slots}</div>
    `);
    return;
  }
  // 正常：選擇要裝入 slotIdx 的技能
  const currentId=equipped[slotIdx]||null;
  const unlocked=pool.filter(s=>s.unlockLv<=c.lv);
  const items=unlocked.map(sk=>{
    const isCurrent=sk.id===currentId;
    const isElsewhere=equipped.includes(sk.id)&&!isCurrent;
    const isActive=type==='active';
    const bg=isActive?sk.bg:sk.c;
    return `<div class="sk-pick-item${isCurrent?' cur':''}" onclick="confirmSkill(${ci},'${type}',${slotIdx},'${sk.id}')">
      <div class="sk-pool-ico" style="background:${bg}40;border:1px solid ${bg}60">${sk.ico}</div>
      <div style="flex:1;min-width:0;padding-right:${isCurrent?40:isElsewhere?60:0}px">
        <div style="font-size:10px;color:${isCurrent?'var(--gold)':c.acc}">${sk.name}</div>
        <div style="font-size:8px;color:var(--text2);margin-top:1px">${sk.desc}</div>
        <div style="font-size:7px;color:var(--text2);margin-top:2px">解鎖 Lv.${sk.unlockLv}</div>
      </div>
      ${isCurrent?'<div style="font-size:7px;color:var(--gold);padding:1px 5px;border:1px solid var(--gold);border-radius:2px;flex-shrink:0">當前</div>':isElsewhere?'<div style="font-size:7px;color:var(--text2);flex-shrink:0">已裝</div>':''}
    </div>`;
  }).join('');
  _makeOverlay(`
    <div class="modal-title">${type==='active'?'主動技能':'被動技能'} 槽 ${slotIdx+1}</div>
    <div style="font-size:8px;color:var(--text2);margin-bottom:10px">Lv.${c.lv} · 已解鎖 ${unlocked.length} 個</div>
    <div class="sk-pick-item-none" onclick="confirmSkill(${ci},'${type}',${slotIdx},null)">✕ 移除技能</div>
    <div class="sk-pick-list">${items}</div>
  `);
}
function confirmSkill(ci,type,slotIdx,sid){
  const arr=type==='active'?CHARS[ci].equippedActive:type==='rb'?CHARS[ci].equippedRB:CHARS[ci].equippedPassive;
  arr[slotIdx]=sid||null;
  closeModal();
  if(curPage===1)render();
}
function removeSkill(ci,type,sid){
  const arr=type==='active'?CHARS[ci].equippedActive:type==='rb'?CHARS[ci].equippedRB:CHARS[ci].equippedPassive;
  const idx=arr.indexOf(sid);
  if(idx>=0)arr[idx]=null;
  closeModal();
  if(curPage===1)render();
}

function openTraitPicker(ci,slotIdx,forceId){
  const c=CHARS[ci];
  const equipped=c.equippedTraits;
  if(forceId){
    const firstEmpty=equipped.findIndex(x=>!x);
    if(firstEmpty>=0){ confirmTrait(ci,firstEmpty,forceId); return; }
    slotIdx=-2;
  }
  if(slotIdx===-2){
    const tr=c.traitPool.find(x=>x.id===forceId);

        <div style="font-size:10px;color:${isCurrent?'var(--gold)':tr.c}">${tr.name}</div>
        <div style="font-size:8px;color:var(--text2);margin-top:1px">${tr.desc}</div>
        <div style="font-size:7px;color:var(--text2);margin-top:2px">SP ${tr.spCost}</div>
      </div>
      ${isCurrent?'<div style="font-size:7px;color:var(--gold);padding:1px 5px;border:1px solid var(--gold);border-radius:2px;flex-shrink:0">當前</div>':isElsewhere?'<div style="font-size:7px;color:var(--text2);flex-shrink:0">已裝</div>':''}
    </div>`;
  }).join('');
  _makeOverlay(`
    <div class="modal-title">特性槽 ${slotIdx+1}</div>
    <div style="font-size:8px;color:var(--text2);margin-bottom:10px">已解鎖 ${unlocked.length} 個</div>
    <div class="sk-pick-item-none" onclick="confirmTrait(${ci},${slotIdx},null)">✕ 移除特性</div>
    <div class="sk-pick-list">${items}</div>
  `);
}
function confirmTrait(ci,slotIdx,tid){
  CHARS[ci].equippedTraits[slotIdx]=tid||null;
  closeModal();
  if(curPage===1)render();
}
function removeTrait(ci,tid){
  const idx=CHARS[ci].equippedTraits.indexOf(tid);
  if(idx>=0)CHARS[ci].equippedTraits[idx]=null;
  if(curPage===1)render();
}

function render(){
  const c=CHARS[curChar];
  const main=document.getElementById('main');
  main.style.display=(curPage>=2&&curPage!==1)?'flex':'block';
  switch(curPage){
    case 0: main.innerHTML=renderStatus(c); break;
    case 1: main.innerHTML=renderSkillTree(c); break;
    case 2: main.innerHTML=renderMap(c); break;
    case 3: main.innerHTML=renderJournal(c); break;
    case 4: main.innerHTML=(typeof renderSettings==='function')?renderSettings():renderPlaceholder('系統設定','⚙️'); break;
  }
}
render();

</script>

// 戰鬥狀態
// ════════════════════════════════════════
let BS = null; // BattleState

var BATTLE_PARTY = null;   // 單場出戰名單覆寫（key 陣列），null=全隊
var BATTLE_ON_WIN = null;  // 戰後勝利回呼

// ════════════════════════════════════════
// BGM 音樂系統（音檔放 github repo，檔名見 BGM_TRACKS）
// ════════════════════════════════════════
var BGM_BASE = 'https://wiml0718-commits.github.io/genba-chronicles-assets/';
var BGM_TRACKS = {
  town:   'bgm_town.mp3',      // 城鎮（含酒館、標題/開場）
  battle: 'bgm_battle.mp3',    // 戰鬥（一般戰、小兵戰、練功場）
  boss:   'bgm_boss.mp3',      // Boss 戰
};
var BGM = {
  el: null,
  current: null,
  enabled: true,
  volume: 0.5,
  init: function(){
    if(this.el) return;
    var a = document.createElement('audio');
    a.id = 'bgm-audio'; a.loop = true; a.preload = 'auto';
    a.crossOrigin = 'anonymous';
    a.volume = this.volume;
    document.body.appendChild(a);
    this.el = a;
    // 還原存檔設定
    if(typeof GS !== 'undefined' && GS){
      if(typeof GS.bgmEnabled === 'boolean') this.enabled = GS.bgmEnabled;
      if(typeof GS.bgmVolume === 'number'){ this.volume = GS.bgmVolume; a.volume = this.volume; }
    }
  },
  play: function(track){
    this.init();
    if(!BGM_TRACKS[track]) return;
    if(this.current === track && !this.el.paused) return;
    this.current = track;
    if(!this.enabled){ return; }
    var src = BGM_BASE + BGM_TRACKS[track];
    if(this.el.getAttribute('src') !== src){
      this.el.setAttribute('src', src);
      this.el.load();
    }
    var p = this.el.play();
    if(p && p.catch){ p.catch(function(){}); } // 行動裝置需使用者互動後才能播，靜默失敗
  },
  stop: function(){
    if(this.el){ this.el.pause(); }
    this.current = null;
  },
  setEnabled: function(on){
    this.init();
    this.enabled = on;
    if(typeof GS !== 'undefined' && GS){ GS.bgmEnabled = on; }
    if(!on){ this.el.pause(); }
    else if(this.current){ var c = this.current; this.current = null; this.play(c); }
  },
  setVolume: function(v){
    this.init();
    this.volume = Math.max(0, Math.min(1, v));
    this.el.volume = this.volume;
    if(typeof GS !== 'undefined' && GS){ GS.bgmVolume = this.volume; }
  },
  // 首次使用者互動時解鎖播放（行動裝置政策）
  unlock: function(){
    this.init();
    var self = this;
    if(this.current && this.enabled && this.el.paused){
      var p = this.el.play(); if(p && p.catch) p.catch(function(){});
    }
  }
};
// 任意點擊解鎖一次
document.addEventListener('click', function _unlockBgm(){
  BGM.unlock();
}, {once:false});

// 依敵人 key 判斷該放 boss 曲還是一般戰鬥曲
function bgmForBattle(enemyKeys){
  var bossKeys = ['rain_boss','captain_heartless','cult_archon','crystal_guardian','bandit_king',
                  'redshield_warden'];
  var isBoss = (enemyKeys||[]).some(function(k){
    if(bossKeys.indexOf(k)>=0) return true;
    var d = (typeof ENEMY_DEFS!=='undefined') ? ENEMY_DEFS[k] : null;
    return d && d.isBoss;
  });
  return isBoss ? 'boss' : 'battle';
}


function initBattle(enemyKeys, locationName){
  // 初始化隊伍
  var _keys;
  if(BATTLE_PARTY){ _keys = BATTLE_PARTY; }
  else if(typeof CHARS !== 'undefined'){ _keys = CHARS.filter(function(c){ return c.unlocked !== false; }).map(function(c){ return c.key; }); }
  else { _keys = PARTY_DEF.map(function(p){ return p.key; }); }
  var _pdefs = PARTY_DEF.filter(function(p){ return _keys.indexOf(p.key) >= 0; });
  const party = _pdefs.map(p=>{
    var st = getPartyState(p.key);
    var eqb = (typeof getEquipBonus === 'function') ? getEquipBonus(p.key) : {str:0,mag:0,def:0,spd:0,hp:0,mp:0};
    var mHp = maxHpFor(p, st) + (eqb.hp||0);
    var mMp = maxMpFor(p, st) + (eqb.mp||0);
    // ── 技能：依技能樹「裝備中」的主動技能（equippedActive）對應 SKILL_DB；找不到時回退舊版 p.skills ──
    var _ch = (typeof findCharByKey==='function') ? findCharByKey(p.key) : null;
    var _eqActive = (_ch && _ch.equippedActive) ? _ch.equippedActive.filter(Boolean) : null;
    var _eqRB = (_ch && _ch.equippedRB) ? _ch.equippedRB.filter(Boolean) : null;
    var _eqAll = [].concat(_eqActive||[], _eqRB||[]);
    var _skills = (_eqAll.length) ? _eqAll.map(function(sid){ var sk=(typeof SKILL_DB!=='undefined')?SKILL_DB[sid]:null; return sk?Object.assign({id:sid},sk):null; }).filter(Boolean) : null;
    if(!_skills || !_skills.length) _skills = p.skills;
    // 疾風步（fi_p4）：行動順序+1 → 戰鬥內 SPD +15
    var spdBonus = (typeof hasPassive==='function' && hasPassive(p.key,'fi_p4')) ? 15 : 0;
    return {
      ...p,
      str: (p.str||0) + (eqb.str||0),
      mag: (p.mag||0) + (eqb.mag||0),
      def: (p.def||0) + (eqb.def||0),
      spd: (p.spd||0) + (eqb.spd||0) + spdBonus,
      sub: (typeof getEquipSubs === 'function') ? getEquipSubs(p.key) : null,
      skills: _skills,
      lv: st.lv,
      hp: Math.min(st.hp, mHp),
      maxHp: mHp,
      mp: Math.min(st.mp, mMp),
      maxMp: mMp,
      rb: st.rb,           // 保留上場戰鬥的 RB
      maxRb: p.baseRb,     // 500
      atb: Math.random()*200,
      maxAtb: 1000,
      ailments: [],
      buffs: [],
      alive: st.hp > 0,
    };
  });

  const enemies = enemyKeys.map((k,i)=>{
    const def = ENEMY_DEFS[k];
    return {
      ...JSON.parse(JSON.stringify(def)),
      id: k+'_'+i,
      atb: Math.random()*300,
      maxAtb: 1000,
      ailments: [],
      buffs: [],
      alive: true,
      phase2: false,
    };
  });

  // 先手（tr_init）：戰鬥開始ATB即滿
  party.forEach(function(p){
    if(typeof getTraitLevel==='function' && getTraitLevel(p.key,'tr_init')>0){
      p.atb = p.maxAtb;
    }
  });
  BS = {
    party,
    enemies,
    pendingActor: null,    // 輪到誰行動
    pendingSkill: null,    // 選了哪個技能（等待選目標）
    selectingTarget: false,
    buffs: {},
    turn: 0,
    atbRunning: true,
    result: null,          // 'win'|'lose'|null
    logLines: [],
    atbInterval: null,
    globalAtbMult: 1.0,    // 全局 ATB 速率
    drankSet: {},          // 本場已喝酒的角色（每人限一次）
  };

  var isBoss = BS.enemies.some(function(e){ return e.isBoss; });
  battleStartAnim(isBoss ? 'BOSS BATTLE' : 'BATTLE START');
  addLog('⚔️ 戰鬥開始' + (locationName ? ' ― '+locationName : '') + '！', 'system');
  renderAll();
  startAtb();
}
